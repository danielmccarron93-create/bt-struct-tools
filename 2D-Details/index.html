<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StructDraw V12 — A1 Sheet Detail Editor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ========== THEME TOKENS ========== */
    /* DARK MODE (default) — dark red background, white text */
    body.theme-dark {
      --bg: #7B1818; --bg2: #5A1212; --bg3: #6B1515;
      --brd: #9A3030; --brd-subtle: #8A2525;
      --ink: #FFFFFF; --mute: #FFCCCC; --inputBg: #6B1515;
      --workspace-bg: #4A0E0E;
      --sheet-bg: #5A1212; --sheet-border: #9A3030;
      --grid-major: rgba(255,255,255,0.06); --grid-minor: rgba(255,255,255,0.025);
      --entity-color: #FFFFFF; --selected-color: #4A9EFF;
      --cut-color: #FF6B6B; --hid-color: rgba(255,255,255,0.30);
      --section-a-accent: #4ECDC4; --plan-b-accent: #FFE66D;
      --cl-color: rgba(255,120,120,0.4);
      --proj-line: rgba(255,255,255,0.10);
      --hover-bg: rgba(255,255,255,0.08);
      --active-bg: rgba(74,158,255,0.15); --active-brd: rgba(74,158,255,0.5);
      --scrollbar: rgba(255,255,255,0.15);
      --crosshair-color: rgba(255,255,255,0.2);
      --crosshair-text: rgba(255,255,255,0.6);
    }
    /* CLASSIC MODE — white background, black text */
    body.theme-classic {
      --bg: #F0F0F0; --bg2: #FFFFFF; --bg3: #F7F7F7;
      --brd: #D0D0D0; --brd-subtle: #E0E0E0;
      --ink: #000000; --mute: #555555; --inputBg: #FFFFFF;
      --workspace-bg: #D6D6D6;
      --sheet-bg: #FFFFFF; --sheet-border: #999999;
      --grid-major: rgba(0,0,0,0.06); --grid-minor: rgba(0,0,0,0.025);
      --entity-color: #000000; --selected-color: #0066FF;
      --cut-color: #CC3333; --hid-color: rgba(0,0,0,0.25);
      --section-a-accent: #008080; --plan-b-accent: #B8860B;
      --cl-color: rgba(200,0,0,0.35);
      --proj-line: rgba(0,0,0,0.12);
      --hover-bg: rgba(0,0,0,0.04);
      --active-bg: rgba(0,102,255,0.08); --active-brd: rgba(0,102,255,0.4);
      --scrollbar: rgba(0,0,0,0.15);
      --crosshair-color: rgba(0,0,0,0.15);
      --crosshair-text: rgba(0,0,0,0.5);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--ink);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ========== TOOLBAR ========== */
    .toolbar {
      padding: 0 8px; background: var(--bg2);
      border-bottom: 1px solid var(--brd);
      display: flex; align-items: center; flex-shrink: 0; height: 36px;
      gap: 2px; user-select: none;
    }
    .toolbar-title {
      font-size: 11px; font-weight: 600; color: var(--mute);
      padding: 0 8px 0 4px; white-space: nowrap; letter-spacing: -0.01em;
    }
    .toolbar-group { display: flex; gap: 1px; align-items: center; }
    .tool-btn {
      font-size: 10px; padding: 4px 7px; border: 1px solid transparent;
      border-radius: 4px; background: transparent; color: var(--ink);
      cursor: pointer; font-weight: 500; min-width: 26px; text-align: center;
      transition: all 0.1s; line-height: 1.2;
    }
    .tool-btn:hover { background: var(--hover-bg); border-color: var(--brd-subtle); }
    .tool-btn.active { background: var(--active-bg); border-color: var(--active-brd); color: var(--selected-color); }
    .toolbar-sep { width: 1px; height: 16px; background: var(--brd); margin: 0 4px; flex-shrink: 0; }
    .toolbar-label { font-size: 9px; color: var(--mute); margin-right: 2px; }
    select, input[type="number"], input[type="text"] {
      font-size: 10px; padding: 2px 4px; border: 1px solid var(--brd);
      border-radius: 3px; background: var(--inputBg); color: var(--ink); min-width: 48px;
      height: 22px;
    }
    select:focus, input:focus { outline: none; border-color: var(--selected-color); }
    #themeBtn {
      font-size: 9px; padding: 3px 8px; border: 1px solid var(--brd);
      border-radius: 3px; background: transparent; color: var(--mute);
      cursor: pointer; margin-left: auto; white-space: nowrap;
    }
    #themeBtn:hover { background: var(--hover-bg); color: var(--ink); }

    /* ========== MAIN LAYOUT ========== */
    .main {
      display: grid;
      grid-template-columns: 140px 1fr;
      flex: 1; min-height: 0;
    }

    /* Library sidebar */
    #libraryPanel-wrap {
      background: var(--bg2); border-right: 1px solid var(--brd);
      display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    }
    .panel-header {
      padding: 6px 8px; border-bottom: 1px solid var(--brd);
      font-size: 9px; font-weight: 600; color: var(--mute);
      letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0;
    }
    .panel-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 4px; }

    /* Canvas container */
    #canvas-container {
      position: relative; overflow: hidden; cursor: crosshair;
    }
    #canvas-container canvas { display: block; width: 100%; height: 100%; }
    #canvas-container.pan-cursor { cursor: grab; }
    #canvas-container.grabbing { cursor: grabbing; }

    /* Library items */
    .lib-title {
      font-size: 8px; font-weight: 700; color: var(--mute); text-transform: uppercase;
      margin: 6px 0 3px 2px; letter-spacing: 0.05em;
    }
    .lib-item {
      font-size: 10px; padding: 3px 5px; margin-bottom: 0;
      background: transparent; border: 1px solid transparent;
      border-radius: 3px; cursor: pointer; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; line-height: 1.4;
    }
    .lib-item:hover { background: var(--hover-bg); }
    .library-section { margin-bottom: 4px; }

    /* ========== PROPERTIES (floating overlay) ========== */
    #propsPanel {
      position: absolute; bottom: 6px; right: 6px; z-index: 10;
      width: 180px; background: var(--bg2); border: 1px solid var(--brd);
      border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      font-size: 10px; display: none;
      max-height: 50%; overflow-y: auto;
    }
    #propsPanel.visible { display: block; }
    #propsPanel .panel-header { padding: 5px 8px; font-size: 8px; }
    .prop-row { padding: 3px 8px; }
    .prop-label { font-size: 7.5px; font-weight: 600; color: var(--mute); text-transform: uppercase; margin-bottom: 1px; letter-spacing: 0.04em; }
    .prop-value { padding: 2px 4px; background: rgba(128,128,128,0.1); border-radius: 2px; color: var(--ink); font-size: 10px; }
    .prop-input-group { display: flex; gap: 2px; }
    .prop-input-group input { flex: 1; font-size: 9px; padding: 2px 4px; height: 20px; }

    /* ========== STATUS BAR ========== */
    .status-bar {
      padding: 2px 10px; background: var(--bg2); border-top: 1px solid var(--brd);
      display: flex; gap: 14px; align-items: center; font-size: 9px; color: var(--mute);
      flex-shrink: 0; height: 22px; user-select: none;
    }
    .status-item { display: flex; gap: 3px; align-items: center; }
    .status-value { color: var(--ink); font-weight: 600; font-family: 'SF Mono','Monaco','Menlo',monospace; font-size: 9px; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* Dialogs */
    .dialog-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 9999;
    }
    .dialog-overlay.visible { display: flex; }
    .dialog {
      background: var(--bg2); border: 1px solid var(--brd); border-radius: 8px;
      padding: 16px; min-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .dialog-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .dialog-body { font-size: 11px; margin-bottom: 12px; color: var(--mute); }
    .dialog-buttons { display: flex; gap: 6px; justify-content: flex-end; }
    .dialog-btn {
      padding: 5px 14px; border: 1px solid var(--brd); border-radius: 4px;
      background: transparent; color: var(--ink); cursor: pointer; font-size: 11px;
    }
    .dialog-btn:hover { background: var(--hover-bg); }
    .dialog-btn.primary { background: var(--active-bg); border-color: var(--active-brd); color: var(--selected-color); }
    .plate-dialog label { display: block; margin-bottom: 8px; font-size: 11px; }
    .plate-dialog input { width: 80px; height: 24px; }
  </style>
</head>
<body class="theme-classic">

<!-- TOOLBAR -->
<div class="toolbar">

      <option value="5">5</option>
      <option value="10" selected>10</option>
      <option value="25">25</option>

  </div>
  <button id="themeBtn">Dark</button>
</div>

<!-- MAIN LAYOUT -->
<div class="main">

    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">

// ============================================================
// 3D OBJECT MODEL (same as V4)
// ============================================================

let objects3D = [];
let entities2D = { elevation: [], sectionA: [], planB: [] };
let selected3D = [];
let objIdN = 1;

let secCutX = 0;   // X position where Section A cuts (in real-world mm)
let planCutY = 0;   // Y position where Plan B cuts (in real-world mm)
let draggingCutLine = null; // 'secA' or 'planB' when dragging a cut line

let undoStack = [];
let redoStack = [];

function mkObj(type, props) { return { id: objIdN++, type, ...props }; }

function addObj(obj) {
  objects3D.push(obj);
  undoStack.push({ act: 'addObj', obj: JSON.parse(JSON.stringify(obj)) });
  if (undoStack.length > 100) undoStack.shift();
  redoStack = [];
  if (typeof v3dMarkDirty === 'function') v3dMarkDirty();
}

function delObj(id) {
  const i = objects3D.findIndex(o => o.id === id);
  if (i < 0) return;
  const obj = objects3D.splice(i, 1)[0];
  selected3D = selected3D.filter(s => s.id !== id);
  undoStack.push({ act: 'delObj', obj: JSON.parse(JSON.stringify(obj)), idx: i });
  redoStack = [];
  if (typeof v3dMarkDirty === 'function') v3dMarkDirty();
}

let ent2dIdN = 1;
function mkEnt2D(viewKey, type, props) {
  return { id: ent2dIdN++, type, view: viewKey, layer: "0", lw: 0.35, ls: "solid", ...props };
}
function addEnt2D(ent) {
  entities2D[ent.view].push(ent);
  undoStack.push({ act: 'addEnt2D', ent: JSON.parse(JSON.stringify(ent)) });
  if (undoStack.length > 100) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (!undoStack.length) return;
  const a = undoStack.pop();
  redoStack.push(a);
  if (a.act === 'addObj') objects3D = objects3D.filter(o => o.id !== a.obj.id);
  else if (a.act === 'delObj') objects3D.splice(a.idx, 0, JSON.parse(JSON.stringify(a.obj)));
  else if (a.act === 'moveObj') {
    a.before.forEach(snap => {
      const o = objects3D.find(obj => obj.id === snap.id);
      if (o) Object.assign(o, JSON.parse(JSON.stringify(snap)));
    });
  }
  else if (a.act === 'addEnt2D') {
    const v = a.ent.view;
    entities2D[v] = entities2D[v].filter(e => e.id !== a.ent.id);
  }
  selected3D = [];
  if (typeof v3dMarkDirty === 'function') v3dMarkDirty();
  requestRender();
}

function redo() {
  if (!redoStack.length) return;
  const a = redoStack.pop();
  undoStack.push(a);
  if (a.act === 'addObj') objects3D.push(JSON.parse(JSON.stringify(a.obj)));
  else if (a.act === 'delObj') objects3D = objects3D.filter(o => o.id !== a.obj.id);
  else if (a.act === 'moveObj') {
    a.after.forEach(snap => {
      const o = objects3D.find(obj => obj.id === snap.id);
      if (o) Object.assign(o, JSON.parse(JSON.stringify(snap)));
    });
  }
  else if (a.act === 'addEnt2D') entities2D[a.ent.view].push(JSON.parse(JSON.stringify(a.ent)));
  selected3D = [];
  if (typeof v3dMarkDirty === 'function') v3dMarkDirty();
  requestRender();
}

// ============================================================
// DETAIL BLOCKS — positioned views on the A1 sheet
// ============================================================
// Each detail block represents one orthographic view placed on the sheet.
// It has a position (in sheet-mm), a viewKey, and a projection function.
// At drawingScale 10 (1:10), 1mm real = 0.1mm on sheet.

class DetailBlock {
  constructor(viewKey, projFn, sheetX, sheetY, boxW, boxH) {
    this.viewKey = viewKey;   // 'elevation', 'sectionA', 'planB'
    this.projFn = projFn;
    this.sheetX = sheetX;    // origin position on sheet (mm)
    this.sheetY = sheetY;
    this.boxW = boxW || 200;  // explicit view box width in sheet-mm
    this.boxH = boxH || 150;  // explicit view box height in sheet-mm
    this.hidden = false;      // toggle visibility
  }

  // Project 3D object to 2D view-local coords (u, v in real-world mm)
  project(obj) { return this.projFn(obj); }

  // Convert real-world mm in this view → sheet-mm
  realToSheet(u, v) {
    return {
      sx: this.sheetX + u / drawingScale,
      sy: this.sheetY + v / drawingScale  // Y-down on sheet; v is Y-up in real
    };
  }

  // Convert sheet-mm → real-world view coords
  sheetToReal(sx, sy) {
    return {
      u: (sx - this.sheetX) * drawingScale,
      v: (sy - this.sheetY) * drawingScale
    };
  }

  // Unproject: view-local 2D → partial 3D (same as V4)
  unproject(u, v) {
    if (this.viewKey === 'elevation') return { x: u, y: v };
    if (this.viewKey === 'sectionA') return { z: u, y: v };
    if (this.viewKey === 'planB') return { x: u, z: v };
  }
}

function projElev(obj) { return { u: obj.x, v: obj.y }; }
function projSecA(obj) { return { u: obj.z, v: obj.y }; }
function projPlanB(obj) { return { u: obj.x, v: obj.z }; }

// ============================================================
// COORDINATE TRANSFORMS
// ============================================================

// Sheet-mm → screen-px
function s2px(sx, sy) {
  return {
    x: sx * viewport.zoom + viewport.panX,
    y: sy * viewport.zoom + viewport.panY
  };
}

// Screen-px → sheet-mm
function px2s(px, py) {
  return {
    x: (px - viewport.panX) / viewport.zoom,
    y: (py - viewport.panY) / viewport.zoom
  };
}

// Real-world mm in a block → screen-px
function real2px(block, u, v) {
  // v is Y-up in real world, sheet is Y-down
  const sx = block.sheetX + u / drawingScale;
  const sy = block.sheetY - v / drawingScale;  // flip Y
  return s2px(sx, sy);
}

// Screen-px → real-world mm for a block
function px2real(block, px, py) {
  const sh = px2s(px, py);
  return {
    u: (sh.x - block.sheetX) * drawingScale,
    v: -(sh.y - block.sheetY) * drawingScale  // flip Y back
  };
}

// Sheet length in mm → screen pixels
function sheetLen(mm) { return mm * viewport.zoom; }

// ============================================================
// UTILITY
// ============================================================

// Cached canvas context for colour parsing — avoids creating a DOM element per call
const _colorCtx = document.createElement('canvas').getContext('2d');
const _colorCache = {};

function colorAlpha(cssColor, alpha) {
  // Fast path: cache parsed RGB per cssColor string
  const key = cssColor + '|' + alpha;
  if (_colorCache[key]) return _colorCache[key];

  _colorCtx.fillStyle = cssColor;
  const res = _colorCtx.fillStyle;
  let result;
  if (res.startsWith('#')) {
    const r = parseInt(res.slice(1,3),16), g = parseInt(res.slice(3,5),16), b = parseInt(res.slice(5,7),16);
    result = `rgba(${r},${g},${b},${alpha})`;
  } else {
    result = res.replace(/rgba?\(([^)]+)\)/, (_, inner) => {
      const parts = inner.split(',').map(s=>s.trim());
      return `rgba(${parts[0]},${parts[1]},${parts[2]},${alpha})`;
    });
  }
  _colorCache[key] = result;
  return result;
}

function constrainUV(u, v, ou, ov) {
  const du = u - ou, dv = v - ov;
  const ang = Math.atan2(dv, du);
  const step = (orthoOn && !shiftHeld) ? Math.PI / 2 : Math.PI / 4;
  const snapped = Math.round(ang / step) * step;
  const len = Math.hypot(du, dv);
  return [ou + len * Math.cos(snapped), ov + len * Math.sin(snapped)];
}

function getEnt2DSnapPoints(ent) {
  if (ent.type === 'line' || ent.type === 'centreline' || ent.type === 'breakline')
    return [[ent.u1, ent.v1], [ent.u2, ent.v2], [(ent.u1+ent.u2)/2, (ent.v1+ent.v2)/2]];
  if (ent.type === 'rect') return [[ent.u, ent.v], [ent.u+ent.w, ent.v], [ent.u, ent.v+ent.h], [ent.u+ent.w, ent.v+ent.h], [ent.u+ent.w/2, ent.v+ent.h/2]];
  if (ent.type === 'circle') return [[ent.cu, ent.cv]];
  if (ent.type === 'weld') return [[ent.u, ent.v]];
  return [];
}

// ============================================================
// SNAP & CURSOR for a block
// ============================================================

function snapUV(block, u, v) {
  if (!snapOn) return [u, v];
  const tol = 8 * drawingScale / viewport.zoom; // tolerance in real-mm

  // Per-axis edge/face snap (used during draw-plate and draw-member)
  // This lets clicks land exactly on member faces (SHS face, UB flange, etc.)
  if (tool === 'draw-plate' || tool === 'draw-member') {
    let bestU = null, bestUDist = tol;
    let bestV = null, bestVDist = tol;
    for (const obj of objects3D) {
      const edges = getSnapEdges(obj, block.viewKey);
      for (const e of edges) {
        if (e.axis === 'u') {
          const d = Math.abs(u - e.value);
          if (d < bestUDist) { bestUDist = d; bestU = e.value; }
        } else {
          const d = Math.abs(v - e.value);
          if (d < bestVDist) { bestVDist = d; bestV = e.value; }
        }
      }
    }
    if (bestU !== null) u = bestU;
    if (bestV !== null) v = bestV;
    // If we snapped to at least one axis, return without further snapping
    if (bestU !== null || bestV !== null) {
      // Grid-snap the non-edge-snapped axis
      if (bestU === null) u = Math.round(u / gridSize) * gridSize;
      if (bestV === null) v = Math.round(v / gridSize) * gridSize;
      return [u, v];
    }
  }

  // Snap to 3D object projected positions (point snap)
  for (const obj of objects3D) {
    const snaps = getObjSnapPoints(obj, block);
    for (const s of snaps) {
      if (Math.hypot(u - s[0], v - s[1]) < tol) return [s[0], s[1]];
    }
  }
  // Snap to 2D entities
  for (const ent of entities2D[block.viewKey]) {
    const pts = getEnt2DSnapPoints(ent);
    for (const p of pts) {
      if (Math.hypot(u - p[0], v - p[1]) < tol) return [p[0], p[1]];
    }
  }
  // Grid snap
  return [Math.round(u / gridSize) * gridSize, Math.round(v / gridSize) * gridSize];
}

function getCursor(block) {
  if (!cursorSheet) return [0, 0];
  const real = px2real(block, cursorSheet.px, cursorSheet.py);
  let [u, v] = [real.u, real.v];
  // Ortho constraint
  const origin = drawStart ? { u: drawStart.cu, v: drawStart.cv } :
                 platePts.length > 0 ? platePts[platePts.length - 1] :
                 clickPts.length > 0 ? clickPts[clickPts.length - 1] :
                 polyPts.length > 0 ? polyPts[polyPts.length - 1] : null;
  // For draw-plate: ortho ON by default (hold Shift to break free)
  const plateOrthoForce = (tool === 'draw-plate' && platePts.length > 0);
  if (origin && (orthoOn || shiftHeld || plateOrthoForce)) {
    // For plates: Shift DISABLES ortho (opposite of normal)
    if (plateOrthoForce && shiftHeld) {
      // Free-draw: don't constrain
    } else {
      [u, v] = constrainUV(u, v, origin.u, origin.v);
    }
  }
  [u, v] = snapUV(block, u, v);
  return [u, v];
}

function getObjSnapPoints(obj, block) {
  const pts = [];
  const vk = block.viewKey;

  if (obj.type === 'ub') {
    const s = UB_DB[obj.section]; if (!s) return pts;
    if (vk === 'elevation') {
      const cx = obj.x, cy = obj.y, hl = obj.length / 2, hd = s.d / 2;
      pts.push([cx, cy], [cx-hl, cy+hd], [cx+hl, cy+hd], [cx-hl, cy-hd], [cx+hl, cy-hd], [cx-hl, cy], [cx+hl, cy]);
    } else if (vk === 'sectionA') {
      const cz = obj.z, cy = obj.y, hd = s.d/2, hbf = s.bf/2;
      pts.push([cz, cy], [cz-hbf, cy+hd], [cz+hbf, cy+hd], [cz-hbf, cy-hd], [cz+hbf, cy-hd]);
    } else {
      const cx = obj.x, cz = obj.z, hl = obj.length/2, hbf = s.bf/2;
      pts.push([cx, cz], [cx-hl, cz-hbf], [cx+hl, cz+hbf]);
    }
  } else if (obj.type === 'shs') {
    const s = SHS_DB[obj.section]; if (!s) return pts;
    const hB = s.B/2;
    if (vk === 'elevation') {
      const hl = obj.length/2;
      pts.push([obj.x, obj.y], [obj.x-hl, obj.y+hB], [obj.x+hl, obj.y+hB], [obj.x-hl, obj.y-hB], [obj.x+hl, obj.y-hB]);
    } else if (vk === 'sectionA') {
      pts.push([obj.z, obj.y], [obj.z-hB, obj.y+hB], [obj.z+hB, obj.y+hB], [obj.z-hB, obj.y-hB], [obj.z+hB, obj.y-hB]);
    } else {
      const hl = obj.length/2;
      pts.push([obj.x, obj.z], [obj.x-hl, obj.z-hB], [obj.x+hl, obj.z+hB]);
    }
  } else if (obj.type === 'plate') {
    if (obj.polyPts) {
      // Polygon plate: snap to all vertices + centroid
      const normal = obj.normal || 'z';
      const viewShowsFace = (vk === 'elevation' && normal === 'z') ||
                            (vk === 'sectionA' && normal === 'x') ||
                            (vk === 'planB' && normal === 'y');
      if (viewShowsFace) {
        const projFn = vk === 'elevation' ? (p => [obj.x+p.dx, obj.y+p.dy]) :
                       vk === 'sectionA' ? (p => [obj.z+p.dz, obj.y+p.dy]) :
                       (p => [obj.x+p.dx, obj.z+p.dz]);
        obj.polyPts.forEach(p => pts.push(projFn(p)));
        const cp = vk === 'elevation' ? [obj.x, obj.y] :
                   vk === 'sectionA' ? [obj.z, obj.y] : [obj.x, obj.z];
        pts.push(cp);
      } else {
        const cp = vk === 'elevation' ? [obj.x, obj.y] :
                   vk === 'sectionA' ? [obj.z, obj.y] : [obj.x, obj.z];
        pts.push(cp);
      }
    } else if (vk === 'elevation') {
      pts.push([obj.x, obj.y], [obj.x-obj.pw/2, obj.y+obj.ph/2], [obj.x+obj.pw/2, obj.y+obj.ph/2],
               [obj.x-obj.pw/2, obj.y-obj.ph/2], [obj.x+obj.pw/2, obj.y-obj.ph/2]);
    } else if (vk === 'sectionA') {
      pts.push([obj.z, obj.y]);
    } else {
      pts.push([obj.x, obj.z]);
    }
  } else if (obj.type === 'bolt') {
    if (vk === 'elevation') pts.push([obj.x, obj.y]);
    else if (vk === 'sectionA') pts.push([obj.z, obj.y]);
    else pts.push([obj.x, obj.z]);
  }
  return pts;
}

// ============================================================
// 3D OBJECT BOUNDING BOX (in view-local real-world coords)
// ============================================================

function getPolyPlateBounds(obj, vk) {
  if (!obj.polyPts) return null;
  const ht = obj.pt / 2;
  const normal = obj.normal || 'z';

  // Reconstruct world-space vertices
  const worldPts = obj.polyPts.map(p => ({
    x: obj.x + p.dx, y: obj.y + p.dy, z: obj.z + p.dz
  }));

  const projFn = vk === 'elevation' ? (p => [p.x, p.y]) :
                 vk === 'sectionA' ? (p => [p.z, p.y]) :
                 (p => [p.x, p.z]);

  const viewShowsFace = (vk === 'elevation' && normal === 'z') ||
                        (vk === 'sectionA' && normal === 'x') ||
                        (vk === 'planB' && normal === 'y');

  if (viewShowsFace) {
    // Polygon bounding box in the face view
    let uMin = Infinity, uMax = -Infinity, vMin = Infinity, vMax = -Infinity;
    worldPts.forEach(p => {
      const [u, v] = projFn(p);
      uMin = Math.min(uMin, u); uMax = Math.max(uMax, u);
      vMin = Math.min(vMin, v); vMax = Math.max(vMax, v);
    });
    return { u1: uMin, u2: uMax, v1: vMin, v2: vMax };
  } else {
    // Edge view: collapsed polygon extent + thickness
    let uMin = Infinity, uMax = -Infinity, vMin = Infinity, vMax = -Infinity;
    worldPts.forEach(p => {
      const [u, v] = projFn(p);
      uMin = Math.min(uMin, u); uMax = Math.max(uMax, u);
      vMin = Math.min(vMin, v); vMax = Math.max(vMax, v);
    });
    // Expand in the thickness direction
    if (normal === 'z') {
      if (vk === 'sectionA') { uMin = obj.z - ht; uMax = obj.z + ht; }
      else { vMin = obj.z - ht; vMax = obj.z + ht; } // planB
    } else if (normal === 'x') {
      if (vk === 'elevation') { uMin = obj.x - ht; uMax = obj.x + ht; }
      else { uMin = obj.x - ht; uMax = obj.x + ht; } // planB
    } else { // y
      if (vk === 'elevation') { vMin = obj.y - ht; vMax = obj.y + ht; }
      else { vMin = obj.y - ht; vMax = obj.y + ht; } // sectionA
    }
    return { u1: uMin, u2: uMax, v1: vMin, v2: vMax };
  }
}

function getObj2DBounds(obj, block) {
  const vk = block.viewKey;
  if (obj.type === 'ub') {
    const s = UB_DB[obj.section]; if (!s) return null;
    if (vk === 'elevation') { const hl=obj.length/2, hd=s.d/2; return {u1:obj.x-hl, u2:obj.x+hl, v1:obj.y-hd, v2:obj.y+hd}; }
    if (vk === 'sectionA') { const hbf=s.bf/2, hd=s.d/2; return {u1:obj.z-hbf, u2:obj.z+hbf, v1:obj.y-hd, v2:obj.y+hd}; }
    const hl=obj.length/2, hbf=s.bf/2; return {u1:obj.x-hl, u2:obj.x+hl, v1:obj.z-hbf, v2:obj.z+hbf};
  }
  if (obj.type === 'shs') {
    const s = SHS_DB[obj.section]; if (!s) return null;
    const hB=s.B/2, hl=obj.length/2;
    if (vk === 'elevation') return {u1:obj.x-hl, u2:obj.x+hl, v1:obj.y-hB, v2:obj.y+hB};
    // sectionA & planB: rotation-aware projected bounds (matches drawing code)
    const rotR = (obj.rot || 0) * Math.PI / 180;
    const cr = Math.abs(Math.cos(rotR)), sr = Math.abs(Math.sin(rotR));
    if (vk === 'sectionA') {
      const outerHalfY = hB * cr + hl * sr;
      return {u1:obj.z-hB, u2:obj.z+hB, v1:obj.y-outerHalfY, v2:obj.y+outerHalfY};
    }
    // planB
    const outerHalfX = hl * cr + hB * sr;
    return {u1:obj.x-outerHalfX, u2:obj.x+outerHalfX, v1:obj.z-hB, v2:obj.z+hB};
  }
  if (obj.type === 'plate') {
    if (obj.polyPts) return getPolyPlateBounds(obj, vk);
    if (vk === 'elevation') return {u1:obj.x-obj.pw/2, u2:obj.x+obj.pw/2, v1:obj.y-obj.ph/2, v2:obj.y+obj.ph/2};
    if (vk === 'sectionA') return {u1:obj.z-obj.pt/2, u2:obj.z+obj.pt/2, v1:obj.y-obj.ph/2, v2:obj.y+obj.ph/2};
    return {u1:obj.x-obj.pw/2, u2:obj.x+obj.pw/2, v1:obj.z-obj.pt/2, v2:obj.z+obj.pt/2};
  }
  if (obj.type === 'bolt') {
    const b = BOLT_DB[obj.boltSize] || BOLT_DB.M20; const r = b.head/2+3;
    if (vk === 'elevation') return {u1:obj.x-r, u2:obj.x+r, v1:obj.y-r, v2:obj.y+r};
    if (vk === 'sectionA') return {u1:obj.z-r, u2:obj.z+r, v1:obj.y-r, v2:obj.y+r};
    return {u1:obj.x-r, u2:obj.x+r, v1:obj.z-r, v2:obj.z+r};
  }
  return null;
}

function hitTest3D(block, px, py) {
  const real = px2real(block, px, py);
  const tol = 6 * drawingScale / viewport.zoom;
  for (let i = objects3D.length - 1; i >= 0; i--) {
    const obj = objects3D[i];
    const b = getObj2DBounds(obj, block);
    if (!b) continue;
    // For rotated objects in elevation, un-rotate the test point around the object centre
    let tu = real.u, tv = real.v;
    const rot = obj.rot || 0;
    if (Math.abs(rot) > 0.01 && block.viewKey === 'elevation') {
      const cu = obj.x, cv = obj.y;
      const rad = rot * Math.PI / 180;
      const dx = real.u - cu, dy = real.v - cv;
      tu = cu + dx * Math.cos(rad) + dy * Math.sin(rad);
      tv = cv - dx * Math.sin(rad) + dy * Math.cos(rad);
    }
    if (tu >= b.u1-tol && tu <= b.u2+tol && tv >= b.v1-tol && tv <= b.v2+tol) {
      return obj;
    }
  }
  return null;
}

// Hit-test returning ALL objects at a point (for Tab-to-cycle selection)
function hitTestAll3D(block, px, py) {
  const real = px2real(block, px, py);
  const tol = 6 * drawingScale / viewport.zoom;
  const hits = [];
  for (let i = objects3D.length - 1; i >= 0; i--) {
    const obj = objects3D[i];
    const b = getObj2DBounds(obj, block);
    if (!b) continue;
    let tu = real.u, tv = real.v;
    const rot = obj.rot || 0;
    if (Math.abs(rot) > 0.01 && block.viewKey === 'elevation') {
      const cu = obj.x, cv = obj.y;
      const rad = rot * Math.PI / 180;
      const dx = real.u - cu, dy = real.v - cv;
      tu = cu + dx * Math.cos(rad) + dy * Math.sin(rad);
      tv = cv - dx * Math.sin(rad) + dy * Math.cos(rad);
    }
    if (tu >= b.u1-tol && tu <= b.u2+tol && tv >= b.v1-tol && tv <= b.v2+tol) {
      hits.push(obj);
    }
  }
  return hits;
}

// Determine which detail block the screen cursor is inside
function blockAtPixel(px, py) {
  const sh = px2s(px, py);
  // Check each visible block's bounding box on the sheet
  for (const blk of blocks) {
    if (blk.hidden) continue;
    const bbox = getBlockSheetBounds(blk);
    if (sh.x >= bbox.left && sh.x <= bbox.right && sh.y >= bbox.top && sh.y <= bbox.bottom) {
      return blk;
    }
  }
  return null;
}

// Get the sheet-mm bounding box of a block — uses explicit boxW/boxH
function getBlockSheetBounds(blk) {
  const hw = blk.boxW / 2, hh = blk.boxH / 2;
  return {
    left: blk.sheetX - hw,
    top: blk.sheetY - hh,
    right: blk.sheetX + hw,
    bottom: blk.sheetY + hh
  };
}

// Minimum view box size in sheet-mm
const MIN_BOX_W = 40, MIN_BOX_H = 40;

// Hit-test the 8 resize handles (corners + edges) of a block.
// Returns handle name string or null. Tolerance in screen px.
function hitTestResizeHandle(blk, px, py) {
  const bbox = getBlockSheetBounds(blk);
  const tl = s2px(bbox.left, bbox.top);
  const br = s2px(bbox.right, bbox.bottom);
  const tol = 6; // px tolerance
  const onL = Math.abs(px - tl.x) < tol;
  const onR = Math.abs(px - br.x) < tol;
  const onT = Math.abs(py - tl.y) < tol;
  const onB = Math.abs(py - br.y) < tol;
  const inX = px > tl.x - tol && px < br.x + tol;
  const inY = py > tl.y - tol && py < br.y + tol;
  if (onT && onL) return 'nw';
  if (onT && onR) return 'ne';
  if (onB && onL) return 'sw';
  if (onB && onR) return 'se';
  if (onT && inX) return 'n';
  if (onB && inX) return 's';
  if (onL && inY) return 'w';
  if (onR && inY) return 'e';
  return null;
}

// Hit-test the border zone of a block (for drag-to-move). Returns true if on border but not on resize handle.
function hitTestBlockBorder(blk, px, py) {
  const bbox = getBlockSheetBounds(blk);
  const tl = s2px(bbox.left, bbox.top);
  const br = s2px(bbox.right, bbox.bottom);
  const outer = 6, inner = 6; // px tolerance
  const inOuter = px >= tl.x - outer && px <= br.x + outer && py >= tl.y - outer && py <= br.y + outer;
  const inInner = px >= tl.x + inner && px <= br.x - inner && py >= tl.y + inner && py <= br.y - inner;
  return inOuter && !inInner;
}

// Cursor style for resize handle
function resizeHandleCursor(handle) {
  const map = { nw:'nw-resize', ne:'ne-resize', sw:'sw-resize', se:'se-resize',
                n:'n-resize', s:'s-resize', w:'w-resize', e:'e-resize' };
  return map[handle] || 'default';
}

// Helper: get max extent of all 3D objects (in real-world mm)
function v3dGetExtent() {
  if (!v3dGroup || !v3dGroup.children.length) return 400;
  const box = new THREE.Box3().setFromObject(v3dGroup);
  const size = new THREE.Vector3();
  box.getSize(size);
  return Math.max(size.x, size.y, size.z) + 80; // pad
}

// ============================================================
// GRIP HANDLES — resize plates, extend members, rotate
// ============================================================

// Returns array of grip descriptors for an object in a view.
// Each grip: { type, u, v, cursor } where u,v are real-world view coords.
function getGrips(obj, block) {
  const vk = block.viewKey;
  const b = getObj2DBounds(obj, block);
  if (!b) return [];
  const grips = [];
  const mu = (b.u1 + b.u2) / 2, mv = (b.v1 + b.v2) / 2;

  if (obj.type === 'plate') {
    if (obj.polyPts) {
      // Polygon plate: vertex grips (only in the face view)
      const normal = obj.normal || 'z';
      const viewShowsFace = (vk === 'elevation' && normal === 'z') ||
                            (vk === 'sectionA' && normal === 'x') ||
                            (vk === 'planB' && normal === 'y');
      if (viewShowsFace) {
        const projFn = vk === 'elevation' ? (p => [obj.x+p.dx, obj.y+p.dy]) :
                       vk === 'sectionA' ? (p => [obj.z+p.dz, obj.y+p.dy]) :
                       (p => [obj.x+p.dx, obj.z+p.dz]);
        obj.polyPts.forEach((p, i) => {
          const [gu, gv] = projFn(p);
          grips.push({ type: 'poly-vertex', index: i, u: gu, v: gv, cursor: 'move' });
        });
      } else {
        // Edge view: thickness grips
        grips.push({ type: 'edge-l', u: b.u1, v: mv, cursor: 'ew-resize' });
        grips.push({ type: 'edge-r', u: b.u2, v: mv, cursor: 'ew-resize' });
      }
    } else {
      // Legacy rectangular plate: edge midpoint grips
      grips.push({ type: 'edge-l', u: b.u1, v: mv, cursor: 'ew-resize' });
      grips.push({ type: 'edge-r', u: b.u2, v: mv, cursor: 'ew-resize' });
      grips.push({ type: 'edge-t', u: mu, v: b.v2, cursor: 'ns-resize' });
      grips.push({ type: 'edge-b', u: mu, v: b.v1, cursor: 'ns-resize' });
    }
  }

  if (obj.type === 'ub' || obj.type === 'shs') {
    // End grips for extending member length
    if (vk === 'elevation') {
      // Both UB and SHS: length is along X in elevation (horizontal default)
      grips.push({ type: 'end-left', u: b.u1, v: mv, cursor: 'ew-resize' });
      grips.push({ type: 'end-right', u: b.u2, v: mv, cursor: 'ew-resize' });
    } else if (vk === 'planB') {
      if (obj.type === 'ub') {
        // UB: length along X in plan
        grips.push({ type: 'end-left', u: b.u1, v: mv, cursor: 'ew-resize' });
        grips.push({ type: 'end-right', u: b.u2, v: mv, cursor: 'ew-resize' });
      }
      if (obj.type === 'shs') {
        // SHS in plan: rotation-aware — only show length grips when member length
        // has a meaningful projection along the X axis (cos component > threshold).
        // For vertical columns (rot≈90°), planB shows a B×B cross-section — no length to drag.
        const rotR = (obj.rot || 0) * Math.PI / 180;
        const absCr = Math.abs(Math.cos(rotR));
        if (absCr > 0.25) { // length visibly extends along X when |cos(rot)| > ~15°
          grips.push({ type: 'end-left', u: b.u1, v: mv, cursor: 'ew-resize' });
          grips.push({ type: 'end-right', u: b.u2, v: mv, cursor: 'ew-resize' });
        }
        // No grips when length is predominantly vertical (out of plan view)
      }
    }
    // In sectionA — UB shows cross-section only, SHS shows rotation-aware projection
    if (vk === 'sectionA' && obj.type === 'shs') {
      // Only show end grips when member length is visibly projected along Y (sin component)
      // rot≈90° (column): sin≈1, full length visible. rot≈0° (beam): sin≈0, cross-section only.
      const rotR = (obj.rot || 0) * Math.PI / 180;
      const absSr = Math.abs(Math.sin(rotR));
      if (absSr > 0.25) {
        grips.push({ type: 'end-top', u: mu, v: b.v2, cursor: 'ns-resize' });
        grips.push({ type: 'end-bot', u: mu, v: b.v1, cursor: 'ns-resize' });
      }
    }

    // Rotation handle — small circle above the bounding box
    if (vk === 'elevation') {
      grips.push({ type: 'rotate', u: mu, v: b.v2 + 20, cursor: 'grab' });
    }
  }

  return grips;
}

// Hit-test grips: returns the grip descriptor if cursor is near one, else null
function hitTestGrip(block, px, py) {
  const real = px2real(block, px, py);
  const gripRadiusPx = 8; // pixel tolerance for grip hit (slightly larger for small sections)
  const gripRadiusReal = gripRadiusPx * drawingScale / viewport.zoom;

  for (const obj of selected3D) {
    const grips = getGrips(obj, block);
    // For rotated objects in elevation, un-rotate the test point around the object centre
    // so it matches the un-rotated grip coordinates (grips are stored in un-rotated frame)
    let tu = real.u, tv = real.v;
    const rot = obj.rot || 0;
    if (Math.abs(rot) > 0.01 && block.viewKey === 'elevation') {
      const cu = obj.x, cv = obj.y;
      const rad = rot * Math.PI / 180;
      const dx = real.u - cu, dy = real.v - cv;
      tu = cu + dx * Math.cos(rad) + dy * Math.sin(rad);
      tv = cv - dx * Math.sin(rad) + dy * Math.cos(rad);
    }
    for (const g of grips) {
      if (Math.hypot(tu - g.u, tv - g.v) < gripRadiusReal) {
        return { ...g, obj, block };
      }
    }
  }
  return null;
}

// Apply a grip drag delta to resize or extend an object.
// gripInfo: { obj, type, block }, du/dv: delta in real-world mm from grip start.
function applyGripDrag(gripInfo, currentU, currentV) {
  const obj = gripInfo.obj;
  const type = gripInfo.type;
  const vk = gripInfo.block.viewKey;

  if (obj.type === 'plate' && obj.polyPts && type === 'poly-vertex') {
    // Move a polygon vertex
    const idx = gripInfo.index;
    if (idx >= 0 && idx < obj.polyPts.length) {
      const p = obj.polyPts[idx];
      if (vk === 'elevation') { p.dx = currentU - obj.x; p.dy = currentV - obj.y; }
      else if (vk === 'sectionA') { p.dz = currentU - obj.z; p.dy = currentV - obj.y; }
      else { p.dx = currentU - obj.x; p.dz = currentV - obj.z; }
    }
    if (typeof v3dMarkDirty === 'function') v3dMarkDirty();
    requestRender(); return;
  }

  if (obj.type === 'plate' && !obj.polyPts) {
    if (vk === 'elevation') {
      if (type === 'edge-r') {
        const newRight = currentU;
        const left = obj.x - obj.pw / 2;
        const newW = Math.max(5, newRight - left);
        obj.x = left + newW / 2;
        obj.pw = newW;
      } else if (type === 'edge-l') {
        const right = obj.x + obj.pw / 2;
        const newW = Math.max(5, right - currentU);
        obj.x = right - newW / 2;
        obj.pw = newW;
      } else if (type === 'edge-t') {
        const bot = obj.y - obj.ph / 2;
        const newH = Math.max(5, currentV - bot);
        obj.y = bot + newH / 2;
        obj.ph = newH;
      } else if (type === 'edge-b') {
        const top = obj.y + obj.ph / 2;
        const newH = Math.max(5, top - currentV);
        obj.y = top - newH / 2;
        obj.ph = newH;
      }
    } else if (vk === 'sectionA') {
      // Section A: u=z, v=y, shows pt (thickness) × ph (height)
      if (type === 'edge-r') {
        const left = obj.z - obj.pt / 2;
        const newT = Math.max(2, currentU - left);
        obj.z = left + newT / 2;
        obj.pt = newT;
      } else if (type === 'edge-l') {
        const right = obj.z + obj.pt / 2;
        const newT = Math.max(2, right - currentU);
        obj.z = right - newT / 2;
        obj.pt = newT;
      } else if (type === 'edge-t') {
        const bot = obj.y - obj.ph / 2;
        const newH = Math.max(5, currentV - bot);
        obj.y = bot + newH / 2;
        obj.ph = newH;
      } else if (type === 'edge-b') {
        const top = obj.y + obj.ph / 2;
        const newH = Math.max(5, top - currentV);
        obj.y = top - newH / 2;
        obj.ph = newH;
      }
    } else { // planB: u=x, v=z, shows pw × pt
      if (type === 'edge-r') {
        const left = obj.x - obj.pw / 2;
        const newW = Math.max(5, currentU - left);
        obj.x = left + newW / 2;
        obj.pw = newW;
      } else if (type === 'edge-l') {
        const right = obj.x + obj.pw / 2;
        const newW = Math.max(5, right - currentU);
        obj.x = right - newW / 2;
        obj.pw = newW;
      } else if (type === 'edge-t') {
        const bot = obj.z - obj.pt / 2;
        const newT = Math.max(2, currentV - bot);
        obj.z = bot + newT / 2;
        obj.pt = newT;
      } else if (type === 'edge-b') {
        const top = obj.z + obj.pt / 2;
        const newT = Math.max(2, top - currentV);
        obj.z = top - newT / 2;
        obj.pt = newT;
      }
    }
  }

  // UB/SHS end drag — change member length
  if (obj.type === 'ub') {
    if (vk === 'elevation' || vk === 'planB') {
      // Length is along X axis
      if (type === 'end-right') {
        const left = obj.x - obj.length / 2;
        const newLen = Math.max(20, currentU - left);
        obj.x = left + newLen / 2;
        obj.length = newLen;
      } else if (type === 'end-left') {
        const right = obj.x + obj.length / 2;
        const newLen = Math.max(20, right - currentU);
        obj.x = right - newLen / 2;
        obj.length = newLen;
      }
    }
  }
  if (obj.type === 'shs') {
    const rotR = (obj.rot || 0) * Math.PI / 180;
    const cr = Math.cos(rotR), sr = Math.sin(rotR);
    const absCr = Math.abs(cr), absSr = Math.abs(sr);
    const s = SHS_DB[obj.section]; if (!s) return;
    const hB = s.B / 2, hl = obj.length / 2;

    if (vk === 'elevation') {
      // Rotation-aware: project cursor onto member axis direction to get new length.
      // Member axis in world coords = (cos(rot), sin(rot)).
      // This keeps the opposite end anchored for any rotation angle.
      if (type === 'end-right') {
        // Keep left end fixed in world coordinates
        const fixedX = obj.x - hl * cr;
        const fixedY = obj.y - hl * sr;
        // Project cursor onto member axis from fixed end
        const newLen = Math.max(20, (currentU - fixedX) * cr + (currentV - fixedY) * sr);
        obj.x = fixedX + (newLen / 2) * cr;
        obj.y = fixedY + (newLen / 2) * sr;
        obj.length = newLen;
      } else if (type === 'end-left') {
        // Keep right end fixed in world coordinates
        const fixedX = obj.x + hl * cr;
        const fixedY = obj.y + hl * sr;
        // Project from fixed end in negative direction
        const newLen = Math.max(20, (fixedX - currentU) * cr + (fixedY - currentV) * sr);
        obj.x = fixedX - (newLen / 2) * cr;
        obj.y = fixedY - (newLen / 2) * sr;
        obj.length = newLen;
      }
    } else if (vk === 'sectionA') {
      // Rotation-aware: projected length along Y = hl * |sin(rot)|, section along Y = hB * |cos(rot)|
      // Dragging end-top/bot changes the member length by mapping the Y delta back to length
      if (type === 'end-top') {
        // top end of projected member
        const projHalfY = hB * absCr + hl * absSr;
        const bot = obj.y - projHalfY;
        const newProjH = Math.max(s.B + 10, currentV - bot);
        // Solve for length: newProjH/2 = hB*|cos|+newHl*|sin| → newHl = (newProjH/2 - hB*|cos|)/|sin|
        if (absSr > 0.01) {
          const newHl = (newProjH / 2 - hB * absCr) / absSr;
          const newLen = Math.max(20, newHl * 2);
          const oldProjHalfY = hB * absCr + (obj.length / 2) * absSr;
          const oldBot = obj.y - oldProjHalfY;
          // Keep bottom end fixed: recompute centre
          const newProjHalfY = hB * absCr + (newLen / 2) * absSr;
          obj.y = oldBot + newProjHalfY;
          obj.length = newLen;
        }
      } else if (type === 'end-bot') {
        const projHalfY = hB * absCr + hl * absSr;
        const top = obj.y + projHalfY;
        const newProjH = Math.max(s.B + 10, top - currentV);
        if (absSr > 0.01) {
          const newHl = (newProjH / 2 - hB * absCr) / absSr;
          const newLen = Math.max(20, newHl * 2);
          const oldProjHalfY = hB * absCr + (obj.length / 2) * absSr;
          const oldTop = obj.y + oldProjHalfY;
          // Keep top end fixed: recompute centre
          const newProjHalfY = hB * absCr + (newLen / 2) * absSr;
          obj.y = oldTop - newProjHalfY;
          obj.length = newLen;
        }
      }
    } else if (vk === 'planB') {
      // PlanB grips only shown when cos component > 0.25 (see getGrips),
      // so length has meaningful projection along X. Map X drag back to length.
      if (type === 'end-right') {
        const projHalfX = hl * absCr + hB * absSr;
        const left = obj.x - projHalfX;
        const newProjW = Math.max(s.B + 10, currentU - left);
        const newHl = Math.max(10, (newProjW / 2 - hB * absSr) / absCr);
        const newLen = newHl * 2;
        const newProjHalfX = newHl * absCr + hB * absSr;
        obj.x = left + newProjHalfX;
        obj.length = newLen;
      } else if (type === 'end-left') {
        const projHalfX = hl * absCr + hB * absSr;
        const right = obj.x + projHalfX;
        const newProjW = Math.max(s.B + 10, right - currentU);
        const newHl = Math.max(10, (newProjW / 2 - hB * absSr) / absCr);
        const newLen = newHl * 2;
        const newProjHalfX = newHl * absCr + hB * absSr;
        obj.x = right - newProjHalfX;
        obj.length = newLen;
      }
    }
  }
}

// Apply rotation to an object. Angle in degrees, stored as obj.rot.
function applyRotation(obj, angleDeg) {
  // Snap to common angles: 0, 15, 30, 45, 60, 90 and their multiples
  const snapAngles = [];
  for (let a = 0; a < 360; a += 15) snapAngles.push(a);
  const snapTol = 3; // degrees
  let snapped = angleDeg % 360;
  if (snapped < 0) snapped += 360;
  for (const sa of snapAngles) {
    if (Math.abs(snapped - sa) < snapTol) { snapped = sa; break; }
  }
  obj.rot = snapped;
}

// ============================================================
// EDGE SNAP SYSTEM — snap dragged object edges to member faces
// ============================================================

let activeEdgeSnaps = []; // [{axis:'u'|'v', value: number, label: string}] for visual feedback

// Collect snap edges from a single object for a given view
// Returns arrays of { axis, value, label } where axis is 'u' or 'v'
function getSnapEdges(obj, viewKey) {
  const edges = [];
  if (obj.type === 'ub') {
    const s = UB_DB[obj.section]; if (!s) return edges;
    const hd = s.d / 2, hbf = s.bf / 2, htw = s.tw / 2, hl = obj.length / 2;
    if (viewKey === 'elevation') {
      // Centrelines
      edges.push({ axis: 'u', value: obj.x, label: 'UB centreline' });
      edges.push({ axis: 'v', value: obj.y, label: 'UB centreline' });
      // Flange faces (top/bottom of beam)
      edges.push({ axis: 'v', value: obj.y + hd, label: 'UB top flange' });
      edges.push({ axis: 'v', value: obj.y - hd, label: 'UB bot flange' });
      // Flange inner faces
      edges.push({ axis: 'v', value: obj.y + hd - s.tf, label: 'UB top flange inner' });
      edges.push({ axis: 'v', value: obj.y - hd + s.tf, label: 'UB bot flange inner' });
      // Web faces
      edges.push({ axis: 'u', value: obj.x - hl, label: 'UB left end' });
      edges.push({ axis: 'u', value: obj.x + hl, label: 'UB right end' });
    } else if (viewKey === 'sectionA') {
      // Centrelines
      edges.push({ axis: 'u', value: obj.z, label: 'UB centreline' });
      edges.push({ axis: 'v', value: obj.y, label: 'UB centreline' });
      // Web faces (key snap targets — plate bolts to web face)
      edges.push({ axis: 'u', value: obj.z - htw, label: 'UB web near' });
      edges.push({ axis: 'u', value: obj.z + htw, label: 'UB web far' });
      // Flange faces
      edges.push({ axis: 'v', value: obj.y + hd, label: 'UB top flange' });
      edges.push({ axis: 'v', value: obj.y - hd, label: 'UB bot flange' });
      // Flange tips
      edges.push({ axis: 'u', value: obj.z - hbf, label: 'UB flange left' });
      edges.push({ axis: 'u', value: obj.z + hbf, label: 'UB flange right' });
    } else { // planB
      // Centrelines
      edges.push({ axis: 'u', value: obj.x, label: 'UB centreline' });
      edges.push({ axis: 'v', value: obj.z, label: 'UB centreline' });
      // Web faces
      edges.push({ axis: 'v', value: obj.z - htw, label: 'UB web near' });
      edges.push({ axis: 'v', value: obj.z + htw, label: 'UB web far' });
      // Flange tips
      edges.push({ axis: 'v', value: obj.z - hbf, label: 'UB flange near' });
      edges.push({ axis: 'v', value: obj.z + hbf, label: 'UB flange far' });
      // Beam ends
      edges.push({ axis: 'u', value: obj.x - hl, label: 'UB left end' });
      edges.push({ axis: 'u', value: obj.x + hl, label: 'UB right end' });
    }
  }
  else if (obj.type === 'shs') {
    const s = SHS_DB[obj.section]; if (!s) return edges;
    const hB = s.B / 2, hl = obj.length / 2;
    if (viewKey === 'elevation') {
      // Centrelines
      edges.push({ axis: 'u', value: obj.x, label: 'SHS centreline' });
      edges.push({ axis: 'v', value: obj.y, label: 'SHS centreline' });
      // OUTER faces (horizontal default: length along X, depth along Y)
      edges.push({ axis: 'u', value: obj.x - hl, label: 'SHS left end' });
      edges.push({ axis: 'u', value: obj.x + hl, label: 'SHS right end' });
      edges.push({ axis: 'v', value: obj.y + hB, label: 'SHS top face' });
      edges.push({ axis: 'v', value: obj.y - hB, label: 'SHS bottom face' });
    } else if (viewKey === 'sectionA') {
      // Centrelines
      edges.push({ axis: 'u', value: obj.z, label: 'SHS centreline' });
      edges.push({ axis: 'v', value: obj.y, label: 'SHS centreline' });
      edges.push({ axis: 'u', value: obj.z - hB, label: 'SHS near face' });
      edges.push({ axis: 'u', value: obj.z + hB, label: 'SHS far face' });
      edges.push({ axis: 'v', value: obj.y - hB, label: 'SHS bottom face' });
      edges.push({ axis: 'v', value: obj.y + hB, label: 'SHS top face' });
    } else { // planB
      // Centrelines
      edges.push({ axis: 'u', value: obj.x, label: 'SHS centreline' });
      edges.push({ axis: 'v', value: obj.z, label: 'SHS centreline' });
      // Horizontal default: length along X, depth along Z
      edges.push({ axis: 'u', value: obj.x - hl, label: 'SHS left end' });
      edges.push({ axis: 'u', value: obj.x + hl, label: 'SHS right end' });
      edges.push({ axis: 'v', value: obj.z - hB, label: 'SHS near face' });
      edges.push({ axis: 'v', value: obj.z + hB, label: 'SHS far face' });
    }
  }
  else if (obj.type === 'plate') {
    if (obj.polyPts) {
      // Polygon plate: snap to bounding box edges + centroid centrelines
      const b = getPolyPlateBounds(obj, viewKey);
      if (b) {
        const cu = (b.u1 + b.u2) / 2, cv = (b.v1 + b.v2) / 2;
        edges.push({ axis: 'u', value: cu, label: 'Plate centreline' });
        edges.push({ axis: 'v', value: cv, label: 'Plate centreline' });
        edges.push({ axis: 'u', value: b.u1, label: 'Plate left' });
        edges.push({ axis: 'u', value: b.u2, label: 'Plate right' });
        edges.push({ axis: 'v', value: b.v1, label: 'Plate bottom' });
        edges.push({ axis: 'v', value: b.v2, label: 'Plate top' });
      }
    } else if (viewKey === 'elevation') {
      edges.push({ axis: 'u', value: obj.x, label: 'Plate centreline' });
      edges.push({ axis: 'v', value: obj.y, label: 'Plate centreline' });
      edges.push({ axis: 'u', value: obj.x - obj.pw/2, label: 'Plate left' });
      edges.push({ axis: 'u', value: obj.x + obj.pw/2, label: 'Plate right' });
      edges.push({ axis: 'v', value: obj.y - obj.ph/2, label: 'Plate bottom' });
      edges.push({ axis: 'v', value: obj.y + obj.ph/2, label: 'Plate top' });
    } else if (viewKey === 'sectionA') {
      edges.push({ axis: 'u', value: obj.z, label: 'Plate centreline' });
      edges.push({ axis: 'v', value: obj.y, label: 'Plate centreline' });
      edges.push({ axis: 'u', value: obj.z - obj.pt/2, label: 'Plate near' });
      edges.push({ axis: 'u', value: obj.z + obj.pt/2, label: 'Plate far' });
      edges.push({ axis: 'v', value: obj.y - obj.ph/2, label: 'Plate bottom' });
      edges.push({ axis: 'v', value: obj.y + obj.ph/2, label: 'Plate top' });
    } else { // planB
      edges.push({ axis: 'u', value: obj.x, label: 'Plate centreline' });
      edges.push({ axis: 'v', value: obj.z, label: 'Plate centreline' });
      edges.push({ axis: 'u', value: obj.x - obj.pw/2, label: 'Plate left' });
      edges.push({ axis: 'u', value: obj.x + obj.pw/2, label: 'Plate right' });
      edges.push({ axis: 'v', value: obj.z - obj.pt/2, label: 'Plate near' });
      edges.push({ axis: 'v', value: obj.z + obj.pt/2, label: 'Plate far' });
    }
  }
  return edges;
}

// Get edges of dragged objects (the edges that should snap TO targets)
function getDraggedEdges(obj, viewKey) {
  // Reuse same function — dragged object's edges are what we check proximity for
  return getSnapEdges(obj, viewKey);
}

// Perform edge snapping on selected objects after raw drag delta is applied.
// Modifies object positions in-place if a snap is found.
// Returns active snap lines for rendering.
// Soft-snap state: tracks the offset between raw mouse position and snapped display position.
// When the user drags past the tolerance, the snap releases smoothly.
let snapOffsetU = 0, snapOffsetV = 0; // accumulated snap correction in real-mm
let snappedAxisU = false, snappedAxisV = false;

function applyEdgeSnap(selectedObjs, viewKey) {
  const tol = 2; // real-world mm — very subtle catch zone
  const breakTol = 3; // mm — barely any resistance to break free
  const snaps = [];

  // Collect all target edges from non-selected objects
  const targetEdges = [];
  objects3D.forEach(obj => {
    if (selectedObjs.includes(obj)) return;
    targetEdges.push(...getSnapEdges(obj, viewKey));
  });
  if (targetEdges.length === 0) {
    snapOffsetU = 0; snapOffsetV = 0;
    snappedAxisU = false; snappedAxisV = false;
    return snaps;
  }

  // For each selected object, get its edges and find closest target
  let bestSnapU = null, bestDistU = Infinity;
  let bestSnapV = null, bestDistV = Infinity;

  selectedObjs.forEach(obj => {
    const myEdges = getDraggedEdges(obj, viewKey);
    myEdges.forEach(me => {
      targetEdges.forEach(te => {
        if (me.axis !== te.axis) return;
        const dist = Math.abs(me.value - te.value);
        if (me.axis === 'u' && dist < bestDistU) {
          bestDistU = dist;
          bestSnapU = { delta: te.value - me.value, target: te, source: me };
        }
        if (me.axis === 'v' && dist < bestDistV) {
          bestDistV = dist;
          bestSnapV = { delta: te.value - me.value, target: te, source: me };
        }
      });
    });
  });

  // --- U axis ---
  if (snappedAxisU) {
    // Already snapped: accumulate offset, break if user drags far enough
    snapOffsetU += (bestSnapU ? -bestSnapU.delta : 0);
    if (bestSnapU && bestDistU < breakTol) {
      // Still close — hold the snap
      selectedObjs.forEach(obj => {
        if (viewKey === 'elevation') obj.x += bestSnapU.delta;
        else if (viewKey === 'sectionA') obj.z += bestSnapU.delta;
        else obj.x += bestSnapU.delta;
      });
      snaps.push({ axis: 'u', value: bestSnapU.target.value, label: bestSnapU.target.label });
    } else {
      // Broke free
      snappedAxisU = false; snapOffsetU = 0;
    }
  } else {
    // Not snapped: check if we should engage
    if (bestSnapU && bestDistU < tol) {
      selectedObjs.forEach(obj => {
        if (viewKey === 'elevation') obj.x += bestSnapU.delta;
        else if (viewKey === 'sectionA') obj.z += bestSnapU.delta;
        else obj.x += bestSnapU.delta;
      });
      snaps.push({ axis: 'u', value: bestSnapU.target.value, label: bestSnapU.target.label });
      snappedAxisU = true; snapOffsetU = 0;
    }
  }

  // --- V axis ---
  if (snappedAxisV) {
    snapOffsetV += (bestSnapV ? -bestSnapV.delta : 0);
    if (bestSnapV && bestDistV < breakTol) {
      selectedObjs.forEach(obj => {
        if (viewKey === 'elevation') obj.y += bestSnapV.delta;
        else if (viewKey === 'sectionA') obj.y += bestSnapV.delta;
        else obj.z += bestSnapV.delta;
      });
      snaps.push({ axis: 'v', value: bestSnapV.target.value, label: bestSnapV.target.label });
    } else {
      snappedAxisV = false; snapOffsetV = 0;
    }
  } else {
    if (bestSnapV && bestDistV < tol) {
      selectedObjs.forEach(obj => {
        if (viewKey === 'elevation') obj.y += bestSnapV.delta;
        else if (viewKey === 'sectionA') obj.y += bestSnapV.delta;
        else obj.z += bestSnapV.delta;
      });
      snaps.push({ axis: 'v', value: bestSnapV.target.value, label: bestSnapV.target.label });
      snappedAxisV = true; snapOffsetV = 0;
    }
  }

  return snaps;
}

// Draw active edge snap feedback lines
function drawEdgeSnapLines(cs) {
  if (activeEdgeSnaps.length === 0 || !activeBlock) return;
  const selCol = cs.getPropertyValue('--selected-color').trim();
  ctx.strokeStyle = colorAlpha(selCol, 0.25);
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4, 4]);

  activeEdgeSnaps.forEach(snap => {
    if (snap.axis === 'u') {
      // Vertical line at this U coordinate across the block area
      const bbox = getBlockSheetBounds(activeBlock);
      const p1 = real2px(activeBlock, snap.value, 500);
      const p2 = real2px(activeBlock, snap.value, -500);
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    } else {
      // Horizontal line at this V coordinate
      const p1 = real2px(activeBlock, -1000, snap.value);
      const p2 = real2px(activeBlock, 1000, snap.value);
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    }
  });

  // Label
  if (activeEdgeSnaps.length > 0) {
    const fs = Math.max(7, sheetLen(2));
    ctx.font = `${fs}px system-ui`;
    ctx.fillStyle = colorAlpha(selCol, 0.7);
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    const snap = activeEdgeSnaps[0];
    const p = snap.axis === 'u'
      ? real2px(activeBlock, snap.value, 0)
      : real2px(activeBlock, 0, snap.value);
    ctx.fillText(snap.label, p.x + 6, p.y - 4);
    ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
  }

  ctx.setLineDash([]);
}

// ============================================================
// RENDERING
// ============================================================

let renderRequested = false;
function requestRender() {
  if (renderRequested) return;
  renderRequested = true;
  requestAnimationFrame(() => { renderRequested = false; render(); });
}

function render() {
  const cs = getComputedStyle(document.body);

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // Workspace background
  ctx.fillStyle = cs.getPropertyValue('--workspace-bg').trim();
  ctx.fillRect(0, 0, W, H);

  // Draw A1 sheet
  drawSheet(cs);

  // Draw grid on sheet (if enabled)
  if (gridOn) drawSheetGrid(cs);

  // Draw drawing frame and title block
  drawDrawingFrame(cs);

  // Draw projection lines between views
  drawProjectionLines(cs);

  // Draw section cut lines (before content so they're behind objects)
  drawSectionCutLines(cs);

  // Draw detail blocks (each view's content) — skip hidden
  blocks.forEach(blk => {
    if (!blk.hidden) drawBlockContent(blk, cs);
  });

  // Draw view box frames (all visible blocks) with resize grips on active
  drawBlockFrames(cs);

  // Selection highlights
  blocks.forEach(blk => {
    if (!blk.hidden) selected3D.forEach(obj => drawSelHighlight(blk, obj, cs));
  });

  // Edge snap feedback lines
  drawEdgeSnapLines(cs);

  // Click preview and crosshair
  if (activeBlock && cursorSheet) {
    drawClickPreview(activeBlock, cs);
    drawCrosshair(activeBlock, cs);
  }

  // Rotation preview arc during rotation drag
  if (rotateMode && rotatePivot && activeGrip && activeBlock) {
    const cp = real2px(activeBlock, rotatePivot.u, rotatePivot.v);
    const selCol = cs.getPropertyValue('--selected-color').trim();
    ctx.strokeStyle = colorAlpha(selCol, 0.5);
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.arc(cp.x, cp.y, 30, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    // Show angle text
    const rot = activeGrip.obj.rot || 0;
    ctx.fillStyle = selCol; ctx.font = 'bold 11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(`${rot.toFixed(1)}°`, cp.x, cp.y - 38);
    ctx.textAlign = 'start';
  }

  // Grip drag dimension feedback
  if (activeGrip && gripStart && !rotateMode && activeBlock) {
    const obj = activeGrip.obj;
    const selCol = cs.getPropertyValue('--selected-color').trim();
    ctx.fillStyle = selCol; ctx.font = '10px system-ui'; ctx.textAlign = 'left';
    let label = '';
    if (obj.type === 'plate') {
      if (obj.polyPts) label = `PL ${obj.pt} thk (${obj.polyPts.length} vertices)`;
      else label = `${obj.pw.toFixed(0)} × ${obj.ph.toFixed(0)} × ${obj.pt.toFixed(0)}`;
    }
    else if (obj.type === 'ub' || obj.type === 'shs') label = `L=${obj.length.toFixed(0)}`;
    if (label && cursorSheet) {
      ctx.fillText(label, cursorSheet.px + 15, cursorSheet.py - 10);
    }
  }

  // View labels
  blocks.forEach(blk => drawViewLabel(blk, cs));

  updateStatus();
}

// ============================================================
// DRAW SHEET
// ============================================================

function drawSheet(cs) {
  const tl = s2px(0, 0);
  const br = s2px(SHEET.W, SHEET.H);
  const sw = br.x - tl.x, sh = br.y - tl.y;

  // Shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = 20;
  ctx.shadowOffsetX = 4;
  ctx.shadowOffsetY = 4;
  ctx.fillStyle = cs.getPropertyValue('--sheet-bg').trim();
  ctx.fillRect(tl.x, tl.y, sw, sh);
  ctx.restore();

  // Border
  ctx.strokeStyle = cs.getPropertyValue('--sheet-border').trim();
  ctx.lineWidth = 1;
  ctx.strokeRect(tl.x, tl.y, sw, sh);
}

function drawSheetGrid(cs) {
  const minor = gridSize / drawingScale; // grid in sheet-mm
  const major = minor * 10;

  // Only draw if grid cells are visible enough
  if (sheetLen(minor) < 4) return;

  const sh_tl = px2s(0, 0);
  const sh_br = px2s(W, H);
  const left = Math.max(DA.left, sh_tl.x), right = Math.min(DA.right, sh_br.x);
  const top = Math.max(DA.top, sh_tl.y), bot = Math.min(DA.bottom, sh_br.y);

  // Minor grid
  ctx.strokeStyle = cs.getPropertyValue('--grid-minor').trim();
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  for (let sx = Math.ceil(left / minor) * minor; sx <= right; sx += minor) {
    const p1 = s2px(sx, top), p2 = s2px(sx, bot);
    ctx.moveTo(Math.round(p1.x) + 0.5, p1.y);
    ctx.lineTo(Math.round(p2.x) + 0.5, p2.y);
  }
  for (let sy = Math.ceil(top / minor) * minor; sy <= bot; sy += minor) {
    const p1 = s2px(left, sy), p2 = s2px(right, sy);
    ctx.moveTo(p1.x, Math.round(p1.y) + 0.5);
    ctx.lineTo(p2.x, Math.round(p2.y) + 0.5);
  }
  ctx.stroke();

  // Major grid
  if (sheetLen(major) >= 20) {
    ctx.strokeStyle = cs.getPropertyValue('--grid-major').trim();
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    for (let sx = Math.ceil(left / major) * major; sx <= right; sx += major) {
      const p1 = s2px(sx, top), p2 = s2px(sx, bot);
      ctx.moveTo(Math.round(p1.x) + 0.5, p1.y);
      ctx.lineTo(Math.round(p2.x) + 0.5, p2.y);
    }
    for (let sy = Math.ceil(top / major) * major; sy <= bot; sy += major) {
      const p1 = s2px(left, sy), p2 = s2px(right, sy);
      ctx.moveTo(p1.x, Math.round(p1.y) + 0.5);
      ctx.lineTo(p2.x, Math.round(p2.y) + 0.5);
    }
    ctx.stroke();
  }
}

function drawDrawingFrame(cs) {
  const tl = s2px(SHEET.ML, SHEET.MT);
  const br = s2px(SHEET.W - SHEET.MR, SHEET.H - SHEET.MB);
  const col = cs.getPropertyValue('--ink').trim();

  // Outer frame
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);

  // Title block separator
  const tbTop = s2px(SHEET.ML, SHEET.H - SHEET.MB - SHEET.TB_H);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tl.x, tbTop.y);
  ctx.lineTo(br.x, tbTop.y);
  ctx.stroke();

  // Title block text
  const fontSize = Math.max(6, sheetLen(3));
  ctx.font = `${fontSize}px system-ui`;
  ctx.fillStyle = cs.getPropertyValue('--ink').trim();
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';

  const tbTextX = s2px(SHEET.ML + 4, SHEET.H - SHEET.MB - SHEET.TB_H + 4);
  ctx.fillText('STRUCTDRAW — Structural Detail', tbTextX.x, tbTextX.y);

  const fs2 = Math.max(5, sheetLen(2.2));
  ctx.font = `${fs2}px system-ui`;
  ctx.fillStyle = cs.getPropertyValue('--mute').trim();
  const tbLine2 = s2px(SHEET.ML + 4, SHEET.H - SHEET.MB - SHEET.TB_H + 10);
  ctx.fillText(`Scale 1:${drawingScale}  |  A1 (841×594)  |  All dims in mm`, tbLine2.x, tbLine2.y);

  // Right side: Bligh Tanner
  ctx.textAlign = 'right';
  const tbRight = s2px(SHEET.W - SHEET.MR - 4, SHEET.H - SHEET.MB - SHEET.TB_H + 4);
  ctx.font = `bold ${fontSize}px system-ui`;
  ctx.fillStyle = cs.getPropertyValue('--ink').trim();
  ctx.fillText('Bligh Tanner', tbRight.x, tbRight.y);
  ctx.font = `${fs2}px system-ui`;
  ctx.fillStyle = cs.getPropertyValue('--mute').trim();
  const tbRight2 = s2px(SHEET.W - SHEET.MR - 4, SHEET.H - SHEET.MB - SHEET.TB_H + 10);
  ctx.fillText('Structural Engineers — Brisbane', tbRight2.x, tbRight2.y);

  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

// ============================================================
// PROJECTION LINES between views
// ============================================================

function drawProjectionLines(cs) {
  if (blocks.length < 2) return;
  const projCol = cs.getPropertyValue('--proj-line').trim();
  ctx.strokeStyle = projCol;
  ctx.lineWidth = 0.5;
  ctx.setLineDash([6, 4, 2, 4]);

  const elev = blocks.find(b => b.viewKey === 'elevation');
  const secA = blocks.find(b => b.viewKey === 'sectionA');
  const planB = blocks.find(b => b.viewKey === 'planB');

  if (elev && secA) {
    // Horizontal projection lines: key Y-coordinates from elevation → section
    // Top flange of first UB found
    objects3D.forEach(obj => {
      if (obj.type === 'ub') {
        const s = UB_DB[obj.section]; if (!s) return;
        const topY = obj.y + s.d / 2;
        const botY = obj.y - s.d / 2;
        [topY, botY].forEach(yVal => {
          const p1 = real2px(elev, 0, yVal);  // just need the Y
          const p2 = real2px(secA, 0, yVal);
          // Draw from right side of elevation bounds to left side of section
          const eBounds = getBlockSheetBounds(elev);
          const sBounds = getBlockSheetBounds(secA);
          const pxLeft = s2px(eBounds.right, 0);
          const pxRight = s2px(sBounds.left, 0);
          ctx.beginPath();
          ctx.moveTo(pxLeft.x, p1.y);
          ctx.lineTo(pxRight.x, p2.y);
          ctx.stroke();
        });
      }
      if (obj.type === 'shs') {
        const s = SHS_DB[obj.section]; if (!s) return;
        // Horizontal default: Y-extent is the section depth (B), not length
        const topY = obj.y + s.B / 2;
        const botY = obj.y - s.B / 2;
        [topY, botY].forEach(yVal => {
          const p1 = real2px(elev, 0, yVal);
          const eBounds = getBlockSheetBounds(elev);
          const sBounds = getBlockSheetBounds(secA);
          const pxLeft = s2px(eBounds.right, 0);
          const pxRight = s2px(sBounds.left, 0);
          ctx.beginPath();
          ctx.moveTo(pxLeft.x, p1.y);
          ctx.lineTo(pxRight.x, p1.y);
          ctx.stroke();
        });
      }
    });
  }

  if (elev && planB) {
    // Vertical projection lines: key X-coordinates from elevation → plan
    objects3D.forEach(obj => {
      if (obj.type === 'shs') {
        const s = SHS_DB[obj.section]; if (!s) return;
        // Horizontal default: X-extent is the member length, not section depth
        const leftX = obj.x - obj.length / 2;
        const rightX = obj.x + obj.length / 2;
        [leftX, rightX].forEach(xVal => {
          const p1 = real2px(elev, xVal, 0);
          const eBounds = getBlockSheetBounds(elev);
          const pBounds = getBlockSheetBounds(planB);
          const pxTop = s2px(0, eBounds.bottom);
          const pxBot = s2px(0, pBounds.top);
          ctx.beginPath();
          ctx.moveTo(p1.x, pxTop.y);
          ctx.lineTo(p1.x, pxBot.y);
          ctx.stroke();
        });
      }
      if (obj.type === 'ub') {
        const cx = obj.x;
        const hl = obj.length / 2;
        [cx - hl, cx + hl].forEach(xVal => {
          const p1 = real2px(elev, xVal, 0);
          const eBounds = getBlockSheetBounds(elev);
          const pBounds = getBlockSheetBounds(planB);
          const pxTop = s2px(0, eBounds.bottom);
          const pxBot = s2px(0, pBounds.top);
          ctx.beginPath();
          ctx.moveTo(p1.x, pxTop.y);
          ctx.lineTo(p1.x, pxBot.y);
          ctx.stroke();
        });
      }
    });
  }

  ctx.setLineDash([]);
}

// ============================================================
// SECTION CUT LINES — draggable cut indicators on elevation
// ============================================================

function drawSectionCutLines(cs) {
  const elev = blocks.find(b => b.viewKey === 'elevation');
  if (!elev) return;
  const eBounds = getBlockSheetBounds(elev);
  const pm = ppm();
  const selCol = cs.getPropertyValue('--selected-color').trim();
  const inkCol = cs.getPropertyValue('--ink').trim();

  // Section A cut: vertical line at secCutX in elevation
  {
    const p = real2px(elev, secCutX, 0);
    const yTop = s2px(0, eBounds.top).y - 15;
    const yBot = s2px(0, eBounds.bottom).y + 15;
    const isHover = draggingCutLine === 'secA';

    ctx.strokeStyle = isHover ? selCol : inkCol;
    ctx.lineWidth = isHover ? 1.5 : 1;
    ctx.setLineDash([12, 3, 3, 3]); // AS 1100 long-dash-dot
    ctx.beginPath(); ctx.moveTo(p.x, yTop); ctx.lineTo(p.x, yBot); ctx.stroke();
    ctx.setLineDash([]);

    // Arrow heads (pointing right = viewing direction for section A)
    const arrowSize = 6;
    ctx.fillStyle = isHover ? selCol : inkCol;
    // Top arrow
    ctx.beginPath();
    ctx.moveTo(p.x + arrowSize, yTop + 5);
    ctx.lineTo(p.x + arrowSize + 6, yTop + 5 - 4);
    ctx.lineTo(p.x + arrowSize + 6, yTop + 5 + 4);
    ctx.closePath(); ctx.fill();
    // Bottom arrow
    ctx.beginPath();
    ctx.moveTo(p.x + arrowSize, yBot - 5);
    ctx.lineTo(p.x + arrowSize + 6, yBot - 5 - 4);
    ctx.lineTo(p.x + arrowSize + 6, yBot - 5 + 4);
    ctx.closePath(); ctx.fill();

    // Label "A"
    const fs = Math.max(9, 2.5 * pm);
    ctx.font = `bold ${fs}px system-ui`; ctx.textAlign = 'center';
    ctx.fillText('A', p.x, yTop - 4);
    ctx.fillText('A', p.x, yBot + fs + 2);
    ctx.textAlign = 'start';
  }

  // Plan B cut: horizontal line at planCutY in elevation
  {
    const p = real2px(elev, 0, planCutY);
    const xLeft = s2px(eBounds.left, 0).x - 15;
    const xRight = s2px(eBounds.right, 0).x + 15;
    const isHover = draggingCutLine === 'planB';

    ctx.strokeStyle = isHover ? selCol : inkCol;
    ctx.lineWidth = isHover ? 1.5 : 1;
    ctx.setLineDash([12, 3, 3, 3]);
    ctx.beginPath(); ctx.moveTo(xLeft, p.y); ctx.lineTo(xRight, p.y); ctx.stroke();
    ctx.setLineDash([]);

    // Arrow heads (pointing down = viewing direction for plan B)
    const arrowSize = 6;
    ctx.fillStyle = isHover ? selCol : inkCol;
    // Left arrow
    ctx.beginPath();
    ctx.moveTo(xLeft + 5, p.y + arrowSize);
    ctx.lineTo(xLeft + 5 - 4, p.y + arrowSize + 6);
    ctx.lineTo(xLeft + 5 + 4, p.y + arrowSize + 6);
    ctx.closePath(); ctx.fill();
    // Right arrow
    ctx.beginPath();
    ctx.moveTo(xRight - 5, p.y + arrowSize);
    ctx.lineTo(xRight - 5 - 4, p.y + arrowSize + 6);
    ctx.lineTo(xRight - 5 + 4, p.y + arrowSize + 6);
    ctx.closePath(); ctx.fill();

    // Label "B"
    const fs = Math.max(9, 2.5 * pm);
    ctx.font = `bold ${fs}px system-ui`; ctx.textAlign = 'center';
    ctx.fillText('B', xLeft - fs / 2 - 2, p.y + 4);
    ctx.fillText('B', xRight + fs / 2 + 2, p.y + 4);
    ctx.textAlign = 'start';
  }

  // ---- AUTO SECTION LABELS on section/plan views ----
  const secABlk = blocks.find(b => b.viewKey === 'sectionA');
  if (secABlk && !secABlk.hidden) {
    const sb = getBlockSheetBounds(secABlk);
    const lp = s2px((sb.left + sb.right) / 2, sb.top - 3);
    const lfs = Math.max(7, sheetLen(2.5));
    ctx.font = `bold ${lfs}px system-ui`; ctx.textAlign = 'center';
    ctx.fillStyle = cs.getPropertyValue('--section-a-accent').trim();
    ctx.fillText('SECTION A-A', lp.x, lp.y);
    ctx.textAlign = 'start';
  }
  const planBBlk = blocks.find(b => b.viewKey === 'planB');
  if (planBBlk && !planBBlk.hidden) {
    const pb = getBlockSheetBounds(planBBlk);
    const lp = s2px((pb.left + pb.right) / 2, pb.top - 3);
    const lfs = Math.max(7, sheetLen(2.5));
    ctx.font = `bold ${lfs}px system-ui`; ctx.textAlign = 'center';
    ctx.fillStyle = cs.getPropertyValue('--plan-b-accent').trim();
    ctx.fillText('PLAN B-B', lp.x, lp.y);
    ctx.textAlign = 'start';
  }
}

// Hit-test section cut lines — returns 'secA', 'planB', or null
function hitTestCutLine(block, px, py) {
  if (!block || block.viewKey !== 'elevation') return null;
  const real = px2real(block, px, py);
  const tolPx = 8; // pixel tolerance
  const tolReal = tolPx * drawingScale / viewport.zoom;

  // Section A: vertical line at secCutX
  if (Math.abs(real.u - secCutX) < tolReal) return 'secA';
  // Plan B: horizontal line at planCutY
  if (Math.abs(real.v - planCutY) < tolReal) return 'planB';
  return null;
}

// ============================================================
// DEPTH-AWARE OCCLUSION — hidden lines for objects behind others
// ============================================================

// Get depth value for an object on the perpendicular axis for this view.
// Returns the NEAR FACE position (closest to viewer) so that thin objects
// like plates correctly occlude objects behind them.
function getDepthValue(obj, viewKey) {
  // For plates: use the near face (centroid + half-thickness toward viewer)
  if (obj.type === 'plate') {
    const ht = (obj.pt || 10) / 2;
    const normal = obj.polyPts ? (obj.normal || 'z') : 'z';
    if (viewKey === 'elevation') {
      // Viewer at +Z; near face = z + ht (for normal='z' plates)
      if (normal === 'z') return (obj.z || 0) + ht;
      return obj.z || 0;
    }
    if (viewKey === 'sectionA') {
      if (normal === 'x') return -((obj.x || 0) - ht); // near face toward viewer
      return -(obj.x || 0);
    }
    if (viewKey === 'planB') {
      if (normal === 'y') return (obj.y || 0) + ht;
      return obj.y || 0;
    }
  }
  // Elevation (X,Y plane): depth = Z, viewer at +Z looking toward -Z → larger Z = closer
  if (viewKey === 'elevation') return obj.z || 0;
  // Section A (Z,Y plane): depth = X, viewer at -X looking toward +X → smaller X = closer
  if (viewKey === 'sectionA') return -(obj.x || 0);
  // Plan B (X,Z plane): depth = Y, viewer above looking down → larger Y = closer
  if (viewKey === 'planB') return obj.y || 0;
  return 0;
}

// Get 2D footprint rectangle [u1,v1, u2,v2] for an object in a given view.
// This is the region that this object "covers" in the view plane.
function get2DFootprint(obj, viewKey) {
  if (obj.type === 'ub') {
    const s = UB_DB[obj.section]; if (!s) return null;
    const hd = s.d/2, hbf = s.bf/2, hl = obj.length/2;
    if (viewKey === 'elevation') return { u1: obj.x - hl, u2: obj.x + hl, v1: obj.y - hd, v2: obj.y + hd };
    if (viewKey === 'sectionA') return { u1: obj.z - hbf, u2: obj.z + hbf, v1: obj.y - hd, v2: obj.y + hd };
    return { u1: obj.x - hl, u2: obj.x + hl, v1: obj.z - hbf, v2: obj.z + hbf };
  }
  if (obj.type === 'shs') {
    const s = SHS_DB[obj.section]; if (!s) return null;
    const hB = s.B/2, hl = obj.length/2;
    if (viewKey === 'elevation') return { u1: obj.x - hl, u2: obj.x + hl, v1: obj.y - hB, v2: obj.y + hB };
    if (viewKey === 'sectionA') return { u1: obj.z - hB, u2: obj.z + hB, v1: obj.y - hB, v2: obj.y + hB };
    return { u1: obj.x - hl, u2: obj.x + hl, v1: obj.z - hB, v2: obj.z + hB };
  }
  if (obj.type === 'plate') {
    if (obj.polyPts) return getPolyPlateBounds(obj, viewKey);
    const hw = obj.pw/2, hh = obj.ph/2, ht = obj.pt/2;
    if (viewKey === 'elevation') return { u1: obj.x - hw, u2: obj.x + hw, v1: obj.y - hh, v2: obj.y + hh };
    if (viewKey === 'sectionA') return { u1: obj.z - ht, u2: obj.z + ht, v1: obj.y - hh, v2: obj.y + hh };
    return { u1: obj.x - hw, u2: obj.x + hw, v1: obj.z - ht, v2: obj.z + ht };
  }
  if (obj.type === 'bolt') {
    const b = BOLT_DB[obj.boltSize] || BOLT_DB.M20;
    const r = b.head / 2 + 2;
    if (viewKey === 'elevation') return { u1: obj.x - r, u2: obj.x + r, v1: obj.y - r, v2: obj.y + r };
    if (viewKey === 'sectionA') return { u1: obj.z - r, u2: obj.z + r, v1: obj.y - r, v2: obj.y + r };
    return { u1: obj.x - r, u2: obj.x + r, v1: obj.z - r, v2: obj.z + r };
  }
  return null;
}

// Collect occlusion rectangles for a given object — footprints of all objects
// that are IN FRONT of it (closer to the viewer) in this view.
function getOcclusionRects(obj, viewKey) {
  const myDepth = getDepthValue(obj, viewKey);
  const rects = [];
  objects3D.forEach(other => {
    if (other.id === obj.id) return;
    const otherDepth = getDepthValue(other, viewKey);
    if (otherDepth <= myDepth) return; // not in front
    const fp = get2DFootprint(other, viewKey);
    if (fp) rects.push(fp);
  });
  return rects;
}

// ============================================================
// LIVE SECTION CUT — axis extent & cut classification
// ============================================================

// Get the 3D extent of an object along a single world axis ('x', 'y', or 'z').
// Accounts for rotation (obj.rot about Z-axis) when computing X and Y extents.
// Returns { min, max }.
function getObjAxisExtent(obj, axis) {
  const rot = (obj.rot || 0) * Math.PI / 180;
  const cr = Math.cos(rot), sr = Math.sin(rot);

  if (obj.type === 'ub') {
    const s = UB_DB[obj.section]; if (!s) return { min: obj[axis], max: obj[axis] };
    const hl = obj.length / 2, hd = s.d / 2, hbf = s.bf / 2;
    // Unrotated: length along X, depth along Y, bf along Z
    if (axis === 'z') return { min: obj.z - hbf, max: obj.z + hbf };
    // For X/Y, account for rotation in the X-Y plane
    const halfX = Math.abs(hl * cr) + Math.abs(hd * sr);
    const halfY = Math.abs(hl * sr) + Math.abs(hd * cr);
    if (axis === 'x') return { min: obj.x - halfX, max: obj.x + halfX };
    return { min: obj.y - halfY, max: obj.y + halfY };
  }

  if (obj.type === 'shs') {
    const s = SHS_DB[obj.section]; if (!s) return { min: obj[axis], max: obj[axis] };
    const hB = s.B / 2, hl = obj.length / 2;
    // Unrotated: length along X, B along Y, B along Z (matches UB convention)
    if (axis === 'z') return { min: obj.z - hB, max: obj.z + hB };
    const halfX = Math.abs(hl * cr) + Math.abs(hB * sr);
    const halfY = Math.abs(hl * sr) + Math.abs(hB * cr);
    if (axis === 'x') return { min: obj.x - halfX, max: obj.x + halfX };
    return { min: obj.y - halfY, max: obj.y + halfY };
  }

  if (obj.type === 'plate') {
    if (obj.polyPts) {
      // Polygon plate: compute from world-space vertices + thickness
      const ht = obj.pt / 2;
      const normal = obj.normal || 'z';
      let mins = { x: Infinity, y: Infinity, z: Infinity };
      let maxs = { x: -Infinity, y: -Infinity, z: -Infinity };
      obj.polyPts.forEach(p => {
        const wx = obj.x + p.dx, wy = obj.y + p.dy, wz = obj.z + p.dz;
        mins.x = Math.min(mins.x, wx); maxs.x = Math.max(maxs.x, wx);
        mins.y = Math.min(mins.y, wy); maxs.y = Math.max(maxs.y, wy);
        mins.z = Math.min(mins.z, wz); maxs.z = Math.max(maxs.z, wz);
      });
      // Expand along normal axis by half-thickness
      if (normal === 'x') { mins.x = obj.x - ht; maxs.x = obj.x + ht; }
      else if (normal === 'y') { mins.y = obj.y - ht; maxs.y = obj.y + ht; }
      else { mins.z = obj.z - ht; maxs.z = obj.z + ht; }
      return { min: mins[axis], max: maxs[axis] };
    }
    // Rectangular plate
    const hw = obj.pw / 2, hh = obj.ph / 2, ht = obj.pt / 2;
    if (axis === 'x') return { min: obj.x - hw, max: obj.x + hw };
    if (axis === 'y') return { min: obj.y - hh, max: obj.y + hh };
    return { min: obj.z - ht, max: obj.z + ht };
  }

  if (obj.type === 'bolt') {
    const b = BOLT_DB[obj.boltSize] || BOLT_DB.M20;
    const r = b.headAF / 2 + 3;
    const bl = obj.boltLength || computeBoltLength(computeBoltGrip(obj), obj.boltSize || 'M20');
    const halfTotal = bl / 2 + b.headH + b.washT; // total half-extent along bolt axis (Z)
    if (axis === 'x') return { min: obj.x - r, max: obj.x + r };
    if (axis === 'y') return { min: obj.y - r, max: obj.y + r };
    return { min: obj.z - halfTotal, max: obj.z + halfTotal };
  }

  return { min: (obj[axis] || 0) - 10, max: (obj[axis] || 0) + 10 };
}

// ============================================================
// BOLT GRIP AUTO-DETECTION & LENGTH CALCULATION
// ============================================================

// Raycast along bolt axis (Z) through all objects at (bolt.x, bolt.y).
