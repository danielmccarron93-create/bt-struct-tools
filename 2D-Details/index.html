// Returns total material thickness the bolt passes through (grip).
function computeBoltGrip(boltObj) {
  const bx = boltObj.x || 0, by = boltObj.y || 0;
  let grip = 0;
  for (const obj of objects3D) {
    if (obj.id === boltObj.id || obj.type === 'bolt') continue;
    // Check if bolt (x,y) falls within this object's x,y footprint
    const extX = getObjAxisExtent(obj, 'x');
    const extY = getObjAxisExtent(obj, 'y');
    if (bx < extX.min || bx > extX.max || by < extY.min || by > extY.max) continue;
    // Bolt passes through — add thickness along Z
    const extZ = getObjAxisExtent(obj, 'z');
    grip += extZ.max - extZ.min;
  }
  return Math.max(grip, 10); // minimum 10mm grip
}

// Compute bolt length from grip: grip + washer(head) + washer(nut) + nut height + 2×pitch
// Round UP to next standard bolt length increment.
function computeBoltLength(grip, boltSize) {
  const b = BOLT_DB[boltSize] || BOLT_DB.M20;
  const minLen = grip + b.washT + b.washT + b.nutH + 2 * b.p;
  // Round up to next standard length
  for (const L of BOLT_LENGTHS) {
    if (L >= minLen) return L;
  }
  return BOLT_LENGTHS[BOLT_LENGTHS.length - 1]; // fallback to max
}

// Classify an object relative to a section cut plane.
// Returns 'hidden' (in front of cut, not shown), 'cut' (intersects cut plane),
// or 'projected' (behind cut, shown as projection).
function getCutClass(obj, viewKey) {
  if (viewKey === 'elevation') return null; // no cut filtering in elevation

  const tol = 1; // 1mm tolerance

  if (viewKey === 'sectionA') {
    // Cut plane at X = secCutX. Arrows point right = third-angle projection:
    // viewer at +X, looking LEFT toward -X. Objects LEFT of cut are beyond (visible).
    const ext = getObjAxisExtent(obj, 'x');
    if (ext.min > secCutX + tol) return 'hidden';       // entirely RIGHT of cut → behind viewer
    if (ext.min <= secCutX + tol && ext.max >= secCutX - tol) return 'cut';
    return 'projected';                                   // entirely LEFT of cut → beyond, visible
  }

  if (viewKey === 'planB') {
    // Cut plane at Y = planCutY, viewing direction -Y (arrows point down)
    const ext = getObjAxisExtent(obj, 'y');
    if (ext.min > planCutY + tol) return 'hidden';      // entirely above cut (in front of viewer)
    if (ext.min <= planCutY + tol && ext.max >= planCutY - tol) return 'cut';
    return 'projected';                                  // entirely below cut (beyond)
  }

  return null;
}

// Test if a point (u,v) is inside any of the occlusion rectangles
function isOccluded(u, v, occRects) {
  for (const r of occRects) {
    if (u >= r.u1 && u <= r.u2 && v >= r.v1 && v <= r.v2) return true;
  }
  return false;
}

// Clip a line segment (u1,v1)→(u2,v2) against occlusion rects.
// Returns array of segments: [{ u1,v1, u2,v2, occluded: bool }]
// Uses parametric clipping: walks along the segment and splits at rect boundaries.
function clipLineAgainstOcclusion(u1, v1, u2, v2, occRects) {
  if (occRects.length === 0) return [{ u1, v1, u2, v2, occluded: false }];

  // Collect all parametric t values where occlusion state changes
  const du = u2 - u1, dv = v2 - v1;
  const len = Math.hypot(du, dv);
  if (len < 0.01) return [{ u1, v1, u2, v2, occluded: isOccluded((u1+u2)/2, (v1+v2)/2, occRects) }];

  // Sample along the line at regular intervals and detect transitions
  const steps = Math.max(2, Math.ceil(len / 3)); // sample every ~3mm
  const segments = [];
  let prevOcc = isOccluded(u1, v1, occRects);
  let segStart = 0;

  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    const su = u1 + du * t, sv = v1 + dv * t;
    const occ = isOccluded(su, sv, occRects);
    if (occ !== prevOcc) {
      // State transition — end current segment just before boundary
      const tBoundary = (i - 0.5) / steps;
      segments.push({
        u1: u1 + du * segStart, v1: v1 + dv * segStart,
        u2: u1 + du * tBoundary, v2: v1 + dv * tBoundary,
        occluded: prevOcc
      });
      segStart = tBoundary;
      prevOcc = occ;
    }
    if (i === steps) {
      // Final segment to the end
      segments.push({
        u1: u1 + du * segStart, v1: v1 + dv * segStart,
        u2: u2, v2: v2,
        occluded: prevOcc
      });
    }
  }
  return segments.length > 0 ? segments : [{ u1, v1, u2, v2, occluded: false }];
}

// Draw a line with occlusion awareness: solid where visible, dashed where hidden
function rLineOcc(blk, u1, v1, u2, v2, occRects, solidStyle, hiddenStyle, solidLW, hiddenLW) {
  if (occRects.length === 0) {
    // No occlusion — draw solid
    ctx.strokeStyle = solidStyle; ctx.lineWidth = solidLW; ctx.setLineDash([]);
    rLine(blk, u1, v1, u2, v2);
    return;
  }
  const segs = clipLineAgainstOcclusion(u1, v1, u2, v2, occRects);
  segs.forEach(seg => {
    if (seg.occluded) {
      ctx.strokeStyle = hiddenStyle; ctx.lineWidth = hiddenLW;
      ctx.setLineDash([5, 3]);
    } else {
      ctx.strokeStyle = solidStyle; ctx.lineWidth = solidLW;
      ctx.setLineDash([]);
    }
    rLine(blk, seg.u1, seg.v1, seg.u2, seg.v2);
  });
  ctx.setLineDash([]);
}

// ============================================================
// DRAWING PRIMITIVES for detail blocks
// ============================================================
// All drawing uses real-world coords, transformed through the block

function rLine(blk, u1, v1, u2, v2) {
  const p1 = real2px(blk, u1, v1);
  const p2 = real2px(blk, u2, v2);
  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
}

function rRect(blk, u, v, w, h) {
  const p = real2px(blk, u, v + h); // top-left in screen (v+h because Y is up)
  const sw = w / drawingScale * viewport.zoom;
  const sh = h / drawingScale * viewport.zoom;
  ctx.strokeRect(p.x, p.y, sw, sh);
}

function rFillRect(blk, u, v, w, h) {
  const p = real2px(blk, u, v + h);
  const sw = w / drawingScale * viewport.zoom;
  const sh = h / drawingScale * viewport.zoom;
  ctx.fillRect(p.x, p.y, sw, sh);
}

// pixels-per-mm for the current zoom/scale (for lineweights)
function ppm() { return viewport.zoom / drawingScale; }

// ============================================================
// AS 1100 STEEL CROSS-HATCHING
// ============================================================
// 45° diagonal lines at 2mm sheet spacing for cut steel sections.

// Rectangular hatch: fills a rectangle (L,B) to (L+w, B+h) with 45° lines.
function drawCrossHatch(blk, L, B, w, h, col) {
  const hatchSpacingReal = 2 * drawingScale; // 2mm on sheet × scale = real-world spacing
  ctx.strokeStyle = colorAlpha(col, 0.35);
  ctx.lineWidth = Math.max(0.3, 0.12 * ppm());
  ctx.setLineDash([]);
  const maxD = w + h;
  for (let d = hatchSpacingReal; d < maxD; d += hatchSpacingReal) {
    const u1 = L + Math.max(0, d - h);
    const v1 = B + Math.min(h, d);
    const u2 = L + Math.min(w, d);
    const v2 = B + Math.max(0, d - w);
    rLine(blk, u1, v1, u2, v2);
  }
}

// Polygon hatch: fills an arbitrary polygon with 45° lines using canvas clip.
// polyPts is an array of [u, v] pairs in real-world coords for this view.
function drawCrossHatchPoly(blk, polyPts, col) {
  if (polyPts.length < 3) return;
  // Find bounding box
  let L = Infinity, R = -Infinity, B = Infinity, T = -Infinity;
  polyPts.forEach(p => {
    L = Math.min(L, p[0]); R = Math.max(R, p[0]);
    B = Math.min(B, p[1]); T = Math.max(T, p[1]);
  });
  // Set up clip region
  ctx.save();
  ctx.beginPath();
  const fp = real2px(blk, polyPts[0][0], polyPts[0][1]);
  ctx.moveTo(fp.x, fp.y);
  for (let i = 1; i < polyPts.length; i++) {
    const pp = real2px(blk, polyPts[i][0], polyPts[i][1]);
    ctx.lineTo(pp.x, pp.y);
  }
  ctx.closePath();
  ctx.clip();
  // Draw hatch lines across the bounding box (clipped to polygon)
  drawCrossHatch(blk, L, B, R - L, T - B, col);
  ctx.restore();
}

// Hollow section hatch: hatches only the wall material between outer and inner rectangles.
// Uses even-odd fill rule to clip out the hollow centre.
function drawCrossHatchHollow(blk, outerL, outerB, outerW, outerH, innerL, innerB, innerW, innerH, col) {
  ctx.save();
  ctx.beginPath();
  // Outer rectangle (clockwise)
  const o1 = real2px(blk, outerL, outerB + outerH);
  const o2 = real2px(blk, outerL + outerW, outerB + outerH);
  const o3 = real2px(blk, outerL + outerW, outerB);
  const o4 = real2px(blk, outerL, outerB);
  ctx.moveTo(o1.x, o1.y); ctx.lineTo(o2.x, o2.y);
  ctx.lineTo(o3.x, o3.y); ctx.lineTo(o4.x, o4.y); ctx.closePath();
  // Inner rectangle (counter-clockwise for even-odd)
  const i1 = real2px(blk, innerL, innerB + innerH);
  const i2 = real2px(blk, innerL, innerB);
  const i3 = real2px(blk, innerL + innerW, innerB);
  const i4 = real2px(blk, innerL + innerW, innerB + innerH);
  ctx.moveTo(i1.x, i1.y); ctx.lineTo(i2.x, i2.y);
  ctx.lineTo(i3.x, i3.y); ctx.lineTo(i4.x, i4.y); ctx.closePath();
  ctx.clip('evenodd');
  drawCrossHatch(blk, outerL, outerB, outerW, outerH, col);
  ctx.restore();
}

// ============================================================
// ROTATION DRAWING HELPER
// ============================================================
// Wraps drawing in a canvas rotation around the object's projected centre.
// Usage: withRotation(blk, obj, centreU, centreV, () => { ...draw calls... });
// If obj.rot is 0 or undefined, no transform overhead.
function withRotation(blk, obj, centreU, centreV, drawFn) {
  const rot = obj.rot || 0;
  // Apply rotation ONLY in elevation view. Section A and Plan B show true geometry.
  // rot is about the Z-axis: doesn't cause in-plane rotation in sectionA (Z,Y) or planB (X,Z).
  if (Math.abs(rot) < 0.01 || blk.viewKey === 'sectionA' || blk.viewKey === 'planB') { drawFn(); return; }
  const cp = real2px(blk, centreU, centreV);
  const angleRad = -rot * Math.PI / 180; // negative because canvas Y is down
  ctx.save();
  ctx.translate(cp.x, cp.y);
  ctx.rotate(angleRad);
  ctx.translate(-cp.x, -cp.y);
  drawFn();
  ctx.restore();
}

// ============================================================
// DRAW BLOCK CONTENT
// ============================================================

function drawBlockContent(blk, cs) {
  // --- ISOMETRIC BLOCK: blit 3D render onto the 2D canvas ---
  if (blk.viewKey === 'isometric') {
    const result = v3dRenderToImage(blk);
    if (!result) return;
    const { canvas: v3dCvs, sheetW, sheetH } = result;

    // Calculate where to draw on the 2D canvas:
    // The block's sheetX/sheetY is the centre of the isometric view in sheet-mm.
    // The 3D image covers sheetW × sheetH sheet-mm.
    const topLeftSheet = s2px(blk.sheetX - sheetW / 2, blk.sheetY - sheetH / 2);
    const botRightSheet = s2px(blk.sheetX + sheetW / 2, blk.sheetY + sheetH / 2);
    const dw = botRightSheet.x - topLeftSheet.x;
    const dh = botRightSheet.y - topLeftSheet.y;

    ctx.drawImage(v3dCvs, topLeftSheet.x, topLeftSheet.y, dw, dh);
    return;
  }

  const col = cs.getPropertyValue('--entity-color').trim();
  const hidCol = cs.getPropertyValue('--hid-color').trim();
  const clCol = cs.getPropertyValue('--cl-color').trim();
  const vk = blk.viewKey;

  // Sort objects back-to-front by depth axis (painter's algorithm)
  const sorted = [...objects3D].sort((a, b) => getDepthValue(a, vk) - getDepthValue(b, vk));

  // Pre-filter objects by section cut classification (live cut planes)
  const visibleObjs = sorted.filter(obj => {
    const cc = getCutClass(obj, vk);
    obj._cutClass = cc; // stash for draw functions
    return cc !== 'hidden';
  });

  // Draw 3D objects with occlusion (only among visible objects)
  visibleObjs.forEach(obj => {
    const occRects = getOcclusionRects(obj, vk);
    const cc = obj._cutClass || null;
    if (obj.type === 'ub') drawUB(blk, obj, col, hidCol, clCol, cs, occRects, cc);
    else if (obj.type === 'shs') drawSHS(blk, obj, col, hidCol, clCol, cs, occRects, cc);
    else if (obj.type === 'plate') drawPlate(blk, obj, col, hidCol, clCol, cs, occRects, cc);
    else if (obj.type === 'bolt') drawBolt(blk, obj, col, hidCol, clCol, cs, occRects, cc);
  });

  // Draw 2D entities
  if (entities2D[blk.viewKey]) entities2D[blk.viewKey].forEach(ent => drawEnt2D(blk, ent, cs));
}

// ============================================================
// DRAW UB
// ============================================================

function drawUB(blk, obj, col, hidCol, clCol, cs, occRects, cutClass) {
  const s = UB_DB[obj.section]; if (!s) return;
  occRects = occRects || [];
  const pm = ppm();
  const hd = s.d/2, hbf = s.bf/2, htw = s.tw/2, tf = s.tf;
  const hidLW = Math.max(0.5, LW.HID * pm);
  const cutLW = Math.max(1, LW.CUT * pm);
  const visLW = Math.max(0.5, LW.VIS * pm);

  // Rotation centre in view coords
  const rc = blk.viewKey === 'elevation' ? [obj.x, obj.y] :
             blk.viewKey === 'sectionA' ? [obj.z, obj.y] : [obj.x, obj.z];

  withRotation(blk, obj, rc[0], rc[1], () => {
  if (blk.viewKey === 'elevation') {
    const cx = obj.x, cy = obj.y, hl = obj.length/2;
    const L = cx-hl, R = cx+hl, T = cy+hd, B = cy-hd;
    const ftBot = T-tf, fbTop = B+tf;

    // Flange & end lines with occlusion
    rLineOcc(blk, L, T, R, T, occRects, col, hidCol, cutLW, hidLW);
    rLineOcc(blk, L, ftBot, R, ftBot, occRects, col, hidCol, cutLW, hidLW);
    rLineOcc(blk, L, B, R, B, occRects, col, hidCol, cutLW, hidLW);
    rLineOcc(blk, L, fbTop, R, fbTop, occRects, col, hidCol, cutLW, hidLW);
    rLineOcc(blk, L, T, L, B, occRects, col, hidCol, cutLW, hidLW);
    rLineOcc(blk, R, T, R, B, occRects, col, hidCol, cutLW, hidLW);

    // Web lines
    rLineOcc(blk, L, ftBot, L, fbTop, occRects, col, hidCol, visLW, hidLW);
    rLineOcc(blk, R, ftBot, R, fbTop, occRects, col, hidCol, visLW, hidLW);

    ctx.fillStyle = colorAlpha(col, 0.05);
    rFillRect(blk, L, B, obj.length, s.d);

    ctx.strokeStyle = clCol; ctx.lineWidth = 0.5;
    ctx.setLineDash([8, 3, 2, 3]);
    rLine(blk, L-10, cy, R+10, cy);
    ctx.setLineDash([]);

    // Label
    ctx.fillStyle = cs.getPropertyValue('--mute').trim();
    const fs = Math.max(6, 1.8 * pm);
    ctx.font = `${fs}px system-ui`; ctx.textAlign = 'center';
    const lp = real2px(blk, cx, T + 6);
    ctx.fillText(obj.section, lp.x, lp.y);
    ctx.textAlign = 'start';
  }
  else if (blk.viewKey === 'sectionA') {
    const cz = obj.z, cy = obj.y, T = cy+hd, B = cy-hd;
    const ftBot = T-tf, fbTop = B+tf;

    if (cutClass === 'cut') {
      // CUT: I-section cross-section with CUT lineweight + steel hatching
      ctx.strokeStyle = col; ctx.lineWidth = cutLW; ctx.setLineDash([]);
      const pts = [
        [cz-hbf,T],[cz+hbf,T],[cz+hbf,ftBot],[cz+htw,ftBot],
        [cz+htw,fbTop],[cz+hbf,fbTop],[cz+hbf,B],[cz-hbf,B],
        [cz-hbf,fbTop],[cz-htw,fbTop],[cz-htw,ftBot],[cz-hbf,ftBot],
      ];
      ctx.beginPath();
      pts.forEach((p, i) => { const sp = real2px(blk, p[0], p[1]); i === 0 ? ctx.moveTo(sp.x, sp.y) : ctx.lineTo(sp.x, sp.y); });
      ctx.closePath(); ctx.stroke();
      ctx.fillStyle = colorAlpha(col, 0.06); ctx.fill();

      // AS 1100 steel cross-hatching on the I-profile
      drawCrossHatchPoly(blk, pts, col);

      // Centreline
      ctx.strokeStyle = clCol; ctx.lineWidth = 0.5;
      ctx.setLineDash([8, 3, 2, 3]);
      rLine(blk, cz-hbf-8, cy, cz+hbf+8, cy);
      ctx.setLineDash([]);

      // Label
      ctx.fillStyle = cs.getPropertyValue('--mute').trim();
      const fs = Math.max(6, 1.8 * pm);
      ctx.font = `${fs}px system-ui`; ctx.textAlign = 'center';
      const lp = real2px(blk, cz, T + 6);
      ctx.fillText(obj.section, lp.x, lp.y);
      ctx.textAlign = 'start';
    } else {
      // PROJECTED: side-view rectangle with VIS lineweight
      const hl = obj.length / 2;
      ctx.strokeStyle = col; ctx.lineWidth = visLW; ctx.setLineDash([]);
      // Outer rectangle: bf wide × d tall
      rLine(blk, cz-hbf, T, cz+hbf, T);
      rLine(blk, cz-hbf, B, cz+hbf, B);
      rLine(blk, cz-hbf, T, cz-hbf, B);
      rLine(blk, cz+hbf, T, cz+hbf, B);
      // Hidden web edges (dashed)
      ctx.strokeStyle = hidCol; ctx.lineWidth = hidLW;
      ctx.setLineDash([5, 3]);
      rLine(blk, cz-htw, T, cz-htw, B);
      rLine(blk, cz+htw, T, cz+htw, B);
      // Flange inner faces (dashed)
      rLine(blk, cz-hbf, ftBot, cz+hbf, ftBot);
      rLine(blk, cz-hbf, fbTop, cz+hbf, fbTop);
      ctx.setLineDash([]);
      // Light fill
      ctx.fillStyle = colorAlpha(col, 0.03);
      rFillRect(blk, cz-hbf, B, s.bf, s.d);
    }
  }
  else { // planB
    const cx = obj.x, cz = obj.z, hl = obj.length/2;

    if (cutClass === 'cut') {
      // CUT: plan rectangle with CUT lineweight + steel hatching
      // The horizontal cut through a UB shows flanges as cut material + web as cut
      ctx.strokeStyle = col; ctx.lineWidth = cutLW; ctx.setLineDash([]);
      rRect(blk, cx-hl, cz-hbf, obj.length, s.bf);

      // Web cut lines (solid CUT weight — the web IS being cut)
      rLine(blk, cx-hl, cz-htw, cx+hl, cz-htw);
      rLine(blk, cx-hl, cz+htw, cx+hl, cz+htw);

      // Cross-hatch the flange areas (two rectangles: top and bottom flange strips)
      // Top flange: from z=htw to z=hbf (just the overhanging part)
      drawCrossHatch(blk, cx-hl, cz+htw, obj.length, hbf-htw, col);
      drawCrossHatch(blk, cx-hl, cz-hbf, obj.length, hbf-htw, col);
      // Web strip
      drawCrossHatch(blk, cx-hl, cz-htw, obj.length, s.tw, col);

      ctx.fillStyle = colorAlpha(col, 0.06);
      rFillRect(blk, cx-hl, cz-hbf, obj.length, s.bf);
    } else {
      // PROJECTED: plan rectangle with VIS lineweight
      ctx.strokeStyle = col; ctx.lineWidth = visLW; ctx.setLineDash([]);
      rRect(blk, cx-hl, cz-hbf, obj.length, s.bf);

      // Hidden web lines (dashed)
      ctx.strokeStyle = hidCol; ctx.lineWidth = hidLW;
      ctx.setLineDash([5, 3]);
      rLine(blk, cx-hl, cz-htw, cx+hl, cz-htw);
      rLine(blk, cx-hl, cz+htw, cx+hl, cz+htw);
      ctx.setLineDash([]);

      ctx.fillStyle = colorAlpha(col, 0.03);
      rFillRect(blk, cx-hl, cz-hbf, obj.length, s.bf);
    }

    // Centreline (always)
    ctx.strokeStyle = clCol; ctx.lineWidth = 0.5;
    ctx.setLineDash([8, 3, 2, 3]);
    rLine(blk, cx-hl-8, cz, cx+hl+8, cz);
    ctx.setLineDash([]);
  }
  }); // end withRotation
}

// ============================================================
// DRAW SHS
// ============================================================

function drawSHS(blk, obj, col, hidCol, clCol, cs, occRects, cutClass) {
  const s = SHS_DB[obj.section]; if (!s) return;
  occRects = occRects || [];
  const pm = ppm();
  const hB = s.B/2, t = s.t, hI = hB-t, hl = obj.length/2;
  const hidLW = Math.max(0.5, LW.HID * pm);
  const cutLW = Math.max(1, LW.CUT * pm);
  const visLW = Math.max(0.5, LW.VIS * pm);

  const rc = blk.viewKey === 'elevation' ? [obj.x, obj.y] :
             blk.viewKey === 'sectionA' ? [obj.z, obj.y] : [obj.x, obj.z];

  withRotation(blk, obj, rc[0], rc[1], () => {
  if (blk.viewKey === 'elevation') {
    // Draw SHS horizontally by default (length along X, depth along Y)
    // — matches UB convention so withRotation() handles all orientations correctly.
    const cx = obj.x, cy = obj.y;
    const L = cx-hl, R = cx+hl, T = cy+hB, B = cy-hB;

    // Outer walls
    rLineOcc(blk, L, T, R, T, occRects, col, hidCol, cutLW, hidLW);  // top
    rLineOcc(blk, L, B, R, B, occRects, col, hidCol, cutLW, hidLW);  // bottom
    rLineOcc(blk, L, T, L, B, occRects, col, hidCol, visLW, hidLW);  // left end
    rLineOcc(blk, R, T, R, B, occRects, col, hidCol, visLW, hidLW);  // right end

    // Inner walls (hidden lines)
    ctx.strokeStyle = hidCol; ctx.lineWidth = hidLW;
    ctx.setLineDash([5, 3]);
    rLine(blk, L, cy+hI, R, cy+hI); rLine(blk, L, cy-hI, R, cy-hI);  // top/bottom inner
    rLine(blk, L, cy+hI, L, cy-hI); rLine(blk, R, cy+hI, R, cy-hI);  // left/right inner
    ctx.setLineDash([]);

    // Fill
    ctx.fillStyle = colorAlpha(col, 0.04);
    rFillRect(blk, L, B, obj.length, s.B);

    // Centreline (horizontal, along member length)
    ctx.strokeStyle = clCol; ctx.lineWidth = 0.5;
    ctx.setLineDash([8, 3, 2, 3]);
    rLine(blk, L-8, cy, R+8, cy);
    ctx.setLineDash([]);

    // Label
    ctx.fillStyle = cs.getPropertyValue('--mute').trim();
    const fs = Math.max(6, 1.8 * pm);
    ctx.font = `${fs}px system-ui`; ctx.textAlign = 'center';
    const lp = real2px(blk, cx, T + 6);
    ctx.fillText(obj.section + ' SHS', lp.x, lp.y);
    ctx.textAlign = 'start';
  }
  else if (blk.viewKey === 'sectionA') {
    const cz = obj.z, cy = obj.y;
    // Rotation-aware projected dimensions in Z-Y plane.
    // rot is about Z-axis → Z extent always B, Y extent depends on rotation.
    // Horizontal member (rot=0): Y = B (cross-section). Vertical column (rot=90): Y = length (side view).
    const rotR = (obj.rot || 0) * Math.PI / 180;
    const cr = Math.abs(Math.cos(rotR)), sr = Math.abs(Math.sin(rotR));
    const outerHalfY = hB * cr + hl * sr;
    const innerHalfY = hI * cr + hl * sr;
    const outerH = outerHalfY * 2, innerH = innerHalfY * 2;

    if (cutClass === 'cut') {
      // CUT: rotation-aware section with CUT lineweight + wall hatching
      const T = cy + outerHalfY, Bt = cy - outerHalfY;
      const TI = cy + innerHalfY, BI = cy - innerHalfY;
      ctx.strokeStyle = col; ctx.lineWidth = cutLW; ctx.setLineDash([]);
      rLine(blk, cz-hB, T, cz+hB, T); rLine(blk, cz+hB, T, cz+hB, Bt);
      rLine(blk, cz+hB, Bt, cz-hB, Bt); rLine(blk, cz-hB, Bt, cz-hB, T);
      rLine(blk, cz-hI, TI, cz+hI, TI); rLine(blk, cz+hI, TI, cz+hI, BI);
      rLine(blk, cz+hI, BI, cz-hI, BI); rLine(blk, cz-hI, BI, cz-hI, TI);
      // Steel hatching on walls only (hollow centre excluded)
      drawCrossHatchHollow(blk, cz-hB, Bt, s.B, outerH, cz-hI, BI, s.B-2*t, innerH, col);
      // Centrelines
      ctx.strokeStyle = clCol; ctx.lineWidth = 0.5;
      ctx.setLineDash([8, 3, 2, 3]);
      rLine(blk, cz-hB-6, cy, cz+hB+6, cy);
      rLine(blk, cz, cy-outerHalfY-6, cz, cy+outerHalfY+6);
      ctx.setLineDash([]);
    } else {
      // PROJECTED: rotation-aware rectangle with VIS lineweight
      const T = cy + outerHalfY, Bt = cy - outerHalfY;
      const TI = cy + innerHalfY, BI = cy - innerHalfY;
      ctx.strokeStyle = col; ctx.lineWidth = visLW; ctx.setLineDash([]);
      rLine(blk, cz-hB, T, cz-hB, Bt); rLine(blk, cz+hB, T, cz+hB, Bt);
      rLine(blk, cz-hB, T, cz+hB, T); rLine(blk, cz-hB, Bt, cz+hB, Bt);
      // Inner wall hidden lines (dashed)
      ctx.strokeStyle = hidCol; ctx.lineWidth = hidLW;
      ctx.setLineDash([5, 3]);
      rLine(blk, cz-hI, TI, cz-hI, BI); rLine(blk, cz+hI, TI, cz+hI, BI);
      rLine(blk, cz-hI, TI, cz+hI, TI); rLine(blk, cz-hI, BI, cz+hI, BI);
      ctx.setLineDash([]);
      ctx.fillStyle = colorAlpha(col, 0.03);
      rFillRect(blk, cz-hB, Bt, s.B, outerH);
      // Centreline
      ctx.strokeStyle = clCol; ctx.lineWidth = 0.5;
      ctx.setLineDash([8, 3, 2, 3]);
      rLine(blk, cz, cy-outerHalfY-8, cz, cy+outerHalfY+8);
      ctx.setLineDash([]);
    }
  }
  else { // planB
    const cx = obj.x, cz = obj.z;
    // Rotation-aware projected dimensions in X-Z plane.
    // rot is about Z-axis → Z extent always B, X extent depends on rotation.
    // Horizontal member (rot=0): X = length (side view). Vertical column (rot=90): X = B (cross-section).
    const rotR = (obj.rot || 0) * Math.PI / 180;
    const cr = Math.abs(Math.cos(rotR)), sr = Math.abs(Math.sin(rotR));
    const outerHalfX = hl * cr + hB * sr;
    const innerHalfX = hl * cr + hI * sr;
    const outerW = outerHalfX * 2, innerW = innerHalfX * 2;

    if (cutClass === 'cut') {
      // CUT: rotation-aware section with CUT lineweight + wall hatching
      ctx.strokeStyle = col; ctx.lineWidth = cutLW; ctx.setLineDash([]);
      rRect(blk, cx-outerHalfX, cz-hB, outerW, s.B);
      rRect(blk, cx-innerHalfX, cz-hI, innerW, s.B-2*t);
      drawCrossHatchHollow(blk, cx-outerHalfX, cz-hB, outerW, s.B, cx-innerHalfX, cz-hI, innerW, s.B-2*t, col);
      ctx.fillStyle = colorAlpha(col, 0.06);
      rFillRect(blk, cx-outerHalfX, cz-hB, outerW, s.B);
    } else {
      // PROJECTED: rotation-aware rectangle with VIS lineweight
      ctx.strokeStyle = col; ctx.lineWidth = visLW; ctx.setLineDash([]);
      rRect(blk, cx-outerHalfX, cz-hB, outerW, s.B);
      ctx.lineWidth = hidLW;
      ctx.setLineDash([5, 3]);
      rRect(blk, cx-innerHalfX, cz-hI, innerW, s.B-2*t);
      ctx.setLineDash([]);
      ctx.fillStyle = colorAlpha(col, 0.03);
      rFillRect(blk, cx-outerHalfX, cz-hB, outerW, s.B);
    }

    // Centrelines (always)
    ctx.strokeStyle = clCol; ctx.lineWidth = 0.5;
    ctx.setLineDash([8, 3, 2, 3]);
    rLine(blk, cx-hB-6, cz, cx+hB+6, cz);
    rLine(blk, cx, cz-hB-6, cx, cz+hB+6);
    ctx.setLineDash([]);
  }
  }); // end withRotation
}

// ============================================================
// DRAW PLATE
// ============================================================

function drawPlate(blk, obj, col, hidCol, clCol, cs, occRects, cutClass) {
  occRects = occRects || [];
  const pm = ppm();
  const cutLW = Math.max(1, LW.CUT * pm);
  const visLW = Math.max(0.5, LW.VIS * pm);
  const hidLW = Math.max(0.5, LW.HID * pm);

  // --- POLYGON PLATE ---
  if (obj.polyPts) {
    return drawPolyPlate(blk, obj, col, hidCol, clCol, cs, occRects, cutClass);
  }

  // --- LEGACY RECTANGULAR PLATE ---
  const hw = obj.pw/2, hh = obj.ph/2, ht = obj.pt/2;

  const rc = blk.viewKey === 'elevation' ? [obj.x, obj.y] :
             blk.viewKey === 'sectionA' ? [obj.z, obj.y] : [obj.x, obj.z];

  withRotation(blk, obj, rc[0], rc[1], () => {
  if (blk.viewKey === 'elevation') {
    const L = obj.x-hw, R = obj.x+hw, T = obj.y+hh, B = obj.y-hh;
    rLineOcc(blk, L, T, R, T, occRects, col, hidCol, cutLW, hidLW);
    rLineOcc(blk, L, B, R, B, occRects, col, hidCol, cutLW, hidLW);
    rLineOcc(blk, L, T, L, B, occRects, col, hidCol, cutLW, hidLW);
    rLineOcc(blk, R, T, R, B, occRects, col, hidCol, cutLW, hidLW);
    ctx.fillStyle = colorAlpha(col, 0.08);
    rFillRect(blk, L, B, obj.pw, obj.ph);
  } else if (blk.viewKey === 'sectionA') {
    const lw = cutClass === 'cut' ? cutLW : visLW;
    const L = obj.z-ht, R = obj.z+ht, T = obj.y+hh, B = obj.y-hh;
    rLineOcc(blk, L, T, R, T, occRects, col, hidCol, lw, hidLW);
    rLineOcc(blk, L, B, R, B, occRects, col, hidCol, lw, hidLW);
    rLineOcc(blk, L, T, L, B, occRects, col, hidCol, lw, hidLW);
    rLineOcc(blk, R, T, R, B, occRects, col, hidCol, lw, hidLW);
    ctx.fillStyle = colorAlpha(col, cutClass === 'cut' ? 0.12 : 0.05);
    rFillRect(blk, L, B, obj.pt, obj.ph);
    if (cutClass === 'cut') drawCrossHatch(blk, L, B, obj.pt, obj.ph, col);
  } else {
    const lw = cutClass === 'cut' ? cutLW : visLW;
    const L = obj.x-hw, R = obj.x+hw, T = obj.z+ht, B = obj.z-ht;
    rLineOcc(blk, L, T, R, T, occRects, col, hidCol, lw, hidLW);
    rLineOcc(blk, L, B, R, B, occRects, col, hidCol, lw, hidLW);
    rLineOcc(blk, L, T, L, B, occRects, col, hidCol, lw, hidLW);
    rLineOcc(blk, R, T, R, B, occRects, col, hidCol, lw, hidLW);
    ctx.fillStyle = colorAlpha(col, cutClass === 'cut' ? 0.10 : 0.04);
    rFillRect(blk, L, B, obj.pw, obj.pt);
    if (cutClass === 'cut') drawCrossHatch(blk, L, B, obj.pw, obj.pt, col);
  }

  // Label in elevation
  if (blk.viewKey === 'elevation') {
    ctx.fillStyle = cs.getPropertyValue('--mute').trim();
    const fs = Math.max(5, 1.5 * pm);
    ctx.font = `${fs}px system-ui`; ctx.textAlign = 'center';
    const lp = real2px(blk, obj.x, obj.y);
    ctx.fillText(`${obj.pw}×${obj.ph}×${obj.pt}`, lp.x, lp.y + 3);
    ctx.textAlign = 'start';
  }
  }); // end withRotation
}

// ---- POLYGON PLATE RENDERER ----
function drawPolyPlate(blk, obj, col, hidCol, clCol, cs, occRects, cutClass) {
  const pm = ppm();
  const cutLW = Math.max(1, LW.CUT * pm);
  const visLW = Math.max(0.5, LW.VIS * pm);
  const hidLW = Math.max(0.5, LW.HID * pm);
  const ht = obj.pt / 2;

  // Reconstruct world-space vertices
  const worldPts = obj.polyPts.map(p => ({
    x: obj.x + p.dx, y: obj.y + p.dy, z: obj.z + p.dz
  }));

  // Project to view coordinates
  const projFn = blk.viewKey === 'elevation' ? (p => [p.x, p.y]) :
                 blk.viewKey === 'sectionA' ? (p => [p.z, p.y]) :
                 (p => [p.x, p.z]);

  const viewPts = worldPts.map(p => projFn(p));
  const normal = obj.normal || 'z';

  // Determine if this view shows the polygon face or the edge (thickness)
  const viewShowsFace = (blk.viewKey === 'elevation' && normal === 'z') ||
                        (blk.viewKey === 'sectionA' && normal === 'x') ||
                        (blk.viewKey === 'planB' && normal === 'y');

  if (viewShowsFace) {
    // FACE VIEW: draw the full polygon outline
    ctx.strokeStyle = col;
    ctx.lineWidth = cutLW;
    ctx.setLineDash([]);

    // Draw polygon edges
    for (let i = 0; i < viewPts.length; i++) {
      const j = (i + 1) % viewPts.length;
      rLine(blk, viewPts[i][0], viewPts[i][1], viewPts[j][0], viewPts[j][1]);
    }

    // Fill
    ctx.fillStyle = colorAlpha(col, 0.08);
    ctx.beginPath();
    const fp = real2px(blk, viewPts[0][0], viewPts[0][1]);
    ctx.moveTo(fp.x, fp.y);
    for (let i = 1; i < viewPts.length; i++) {
      const pp = real2px(blk, viewPts[i][0], viewPts[i][1]);
      ctx.lineTo(pp.x, pp.y);
    }
    ctx.closePath(); ctx.fill();

    // Label: thickness at centroid
    ctx.fillStyle = cs.getPropertyValue('--mute').trim();
    const fs = Math.max(5, 1.5 * pm);
    ctx.font = `${fs}px system-ui`; ctx.textAlign = 'center';
    const centreProj = projFn(obj);
    const lp = real2px(blk, centreProj[0], centreProj[1]);
    ctx.fillText(`PL ${obj.pt}`, lp.x, lp.y + 3);
    ctx.textAlign = 'start';

  } else {
    // EDGE VIEW: the polygon is seen edge-on as a line with thickness
    // Find the bounding extent of the polygon projected into this view
    // The face plane projects to a line; the thickness is the visible dimension
    let uMin = Infinity, uMax = -Infinity, vMin = Infinity, vMax = -Infinity;
    viewPts.forEach(p => {
      uMin = Math.min(uMin, p[0]); uMax = Math.max(uMax, p[0]);
      vMin = Math.min(vMin, p[1]); vMax = Math.max(vMax, p[1]);
    });

    // Determine which axis gets the thickness
    // The thickness replaces the collapsed dimension
    let L, R, T, B;
    if (normal === 'z') {
      // Face is X,Y plane; seen edge-on in sectionA (Z,Y) or planB (X,Z)
      if (blk.viewKey === 'sectionA') {
        // u=Z, v=Y → Z-extent is thickness, Y-extent is polygon height
        const cz = obj.z;
        L = cz - ht; R = cz + ht; T = vMax; B = vMin;
      } else { // planB
        // u=X, v=Z → Z-extent is thickness, X-extent is polygon width
        const cz = obj.z;
        L = uMin; R = uMax; T = cz + ht; B = cz - ht;
      }
    } else if (normal === 'x') {
      // Face is Z,Y plane; seen edge-on in elevation (X,Y) or planB (X,Z)
      if (blk.viewKey === 'elevation') {
        const cx = obj.x;
        L = cx - ht; R = cx + ht; T = vMax; B = vMin;
      } else { // planB
        const cx = obj.x;
        L = cx - ht; R = cx + ht; T = vMax; B = vMin;
      }
    } else { // normal === 'y'
      // Face is X,Z plane; seen edge-on in elevation (X,Y) or sectionA (Z,Y)
      if (blk.viewKey === 'elevation') {
        const cy = obj.y;
        L = uMin; R = uMax; T = cy + ht; B = cy - ht;
      } else { // sectionA
        const cy = obj.y;
        L = uMin; R = uMax; T = cy + ht; B = cy - ht;
      }
    }

    // Draw as rectangle with cross-hatch fill (cut plate — AS 1100 steel convention)
    ctx.strokeStyle = col;
    ctx.lineWidth = cutLW;
    ctx.setLineDash([]);
    rLine(blk, L, T, R, T);
    rLine(blk, L, B, R, B);
    rLine(blk, L, T, L, B);
    rLine(blk, R, T, R, B);

    // Solid fill behind hatching
    ctx.fillStyle = colorAlpha(col, 0.10);
    rFillRect(blk, L, B, R - L, T - B);

    // AS 1100 steel cross-hatching (use shared utility)
    drawCrossHatch(blk, L, B, R - L, T - B, col);
  }
}

// ============================================================
// DRAW BOLT
// ============================================================

function drawBolt(blk, obj, col, hidCol, clCol, cs, occRects, cutClass) {
  occRects = occRects || [];
  const b = BOLT_DB[obj.boltSize] || BOLT_DB.M20;
  const pm = ppm();
  const isCut = cutClass === 'cut';
  const boltVisLW = isCut ? Math.max(0.5, LW.VIS * pm) : Math.max(0.3, LW.HID * pm);
  const boltCutLW = isCut ? Math.max(1, LW.CUT * pm) : Math.max(0.5, LW.VIS * pm);
  const boltAlpha = isCut ? 0.25 : 0.10;

  // Compute grip and bolt length on demand
  const grip = obj.grip || computeBoltGrip(obj);
  const boltLen = obj.boltLength || computeBoltLength(grip, obj.boltSize || 'M20');

  if (blk.viewKey === 'elevation') {
    // End-on view: bolt circle + crosshair + washer ring
    const p = real2px(blk, obj.x, obj.y);
    const r = (b.d / 2) * viewport.zoom / drawingScale;
    const wr = (b.washOD / 2) * viewport.zoom / drawingScale;
    const hr = (b.headAF / 2) * viewport.zoom / drawingScale;
    ctx.setLineDash([]);
    // Washer outline (dashed lighter)
    ctx.strokeStyle = colorAlpha(col, 0.4); ctx.lineWidth = Math.max(0.3, LW.HID * pm);
    ctx.beginPath(); ctx.arc(p.x, p.y, wr, 0, Math.PI*2); ctx.stroke();
    // Bolt hole
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(0.5, LW.VIS * pm);
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = colorAlpha(col, 0.20); ctx.fill();
    // Head crosshair
    ctx.beginPath();
    ctx.moveTo(p.x-hr, p.y); ctx.lineTo(p.x+hr, p.y);
    ctx.moveTo(p.x, p.y-hr); ctx.lineTo(p.x, p.y+hr);
    ctx.stroke();
  }
  else if (blk.viewKey === 'sectionA') {
    // Section A: bolt axis along Z (horizontal), side profile showing head→washer→shank→washer→nut
    const cz = obj.z, cy = obj.y;
    const halfShank = boltLen / 2;
    // Shank origin: head side at cz - halfShank, nut side at cz + halfShank
    // Layout from left to right: head | washer | shank ---- | washer | nut | thread protrusion
    const zHead   = cz - halfShank - b.washT - b.headH; // left edge of head
    const zWashH  = cz - halfShank - b.washT;            // head-side washer left edge
    const zShankL = cz - halfShank;                       // shank left edge
    const zShankR = cz + halfShank;                       // shank right edge
    const zWashN  = zShankR;                              // nut-side washer left edge
    const zNut    = zShankR + b.washT;                    // nut left edge
    const zEnd    = zNut + b.nutH;                        // nut right edge
    const threadProt = 2 * b.p;                           // thread protrusion beyond nut

    ctx.setLineDash([]);

    // Shank
    ctx.strokeStyle = col; ctx.lineWidth = boltVisLW;
    rRect(blk, zShankL, cy - b.d/2, boltLen, b.d);
    ctx.fillStyle = colorAlpha(col, boltAlpha * 0.4);
    rFillRect(blk, zShankL, cy - b.d/2, boltLen, b.d);

    // Thread indication — short dashes at nut end of shank
    const threadLen = Math.min(boltLen * 0.3, 30);
    ctx.strokeStyle = colorAlpha(col, 0.5); ctx.lineWidth = Math.max(0.3, LW.HID * pm);
    ctx.setLineDash([2, 2]);
    rLine(blk, zShankR - threadLen, cy - b.d/2 + 1, zShankR - threadLen, cy + b.d/2 - 1);
    ctx.setLineDash([]);

    // Head-side washer (thin rectangle)
    ctx.strokeStyle = col; ctx.lineWidth = boltCutLW;
    rRect(blk, zWashH, cy - b.washOD/2, b.washT, b.washOD);
    ctx.fillStyle = colorAlpha(col, boltAlpha);
    rFillRect(blk, zWashH, cy - b.washOD/2, b.washT, b.washOD);

    // Bolt head
    rRect(blk, zHead, cy - b.headAF/2, b.headH, b.headAF);
    ctx.fillStyle = colorAlpha(col, boltAlpha);
    rFillRect(blk, zHead, cy - b.headAF/2, b.headH, b.headAF);

    // Nut-side washer
    rRect(blk, zWashN, cy - b.washOD/2, b.washT, b.washOD);
    ctx.fillStyle = colorAlpha(col, boltAlpha);
    rFillRect(blk, zWashN, cy - b.washOD/2, b.washT, b.washOD);

    // Nut
    rRect(blk, zNut, cy - b.nutAF/2, b.nutH, b.nutAF);
    ctx.fillStyle = colorAlpha(col, boltAlpha);
    rFillRect(blk, zNut, cy - b.nutAF/2, b.nutH, b.nutAF);

    // Thread protrusion beyond nut
    ctx.strokeStyle = col; ctx.lineWidth = boltVisLW;
    rRect(blk, zEnd, cy - b.d/2, threadProt, b.d);

    // Centreline along bolt axis
    ctx.strokeStyle = clCol; ctx.lineWidth = 0.5;
    ctx.setLineDash([6, 2, 1.5, 2]);
    rLine(blk, zHead - 4, cy, zEnd + threadProt + 4, cy);
    ctx.setLineDash([]);
  }
  else { // planB — looking down along Y, bolt axis is Z (vertical in this view)
    const cx = obj.x, cz = obj.z;
    const halfShank = boltLen / 2;
    const zHead   = cz - halfShank - b.washT - b.headH;
    const zWashH  = cz - halfShank - b.washT;
    const zShankL = cz - halfShank;
    const zShankR = cz + halfShank;
    const zWashN  = zShankR;
    const zNut    = zShankR + b.washT;
    const zEnd    = zNut + b.nutH;
    const threadProt = 2 * b.p;

    ctx.setLineDash([]);

    // Shank
    ctx.strokeStyle = col; ctx.lineWidth = boltVisLW;
    rRect(blk, cx - b.d/2, zShankL, b.d, boltLen);
    ctx.fillStyle = colorAlpha(col, boltAlpha * 0.4);
    rFillRect(blk, cx - b.d/2, zShankL, b.d, boltLen);

    // Thread indication
    const threadLen = Math.min(boltLen * 0.3, 30);
    ctx.strokeStyle = colorAlpha(col, 0.5); ctx.lineWidth = Math.max(0.3, LW.HID * pm);
    ctx.setLineDash([2, 2]);
    rLine(blk, cx - b.d/2 + 1, zShankR - threadLen, cx + b.d/2 - 1, zShankR - threadLen);
    ctx.setLineDash([]);

    // Head-side washer
    ctx.strokeStyle = col; ctx.lineWidth = boltCutLW;
    rRect(blk, cx - b.washOD/2, zWashH, b.washOD, b.washT);
    ctx.fillStyle = colorAlpha(col, boltAlpha);
    rFillRect(blk, cx - b.washOD/2, zWashH, b.washOD, b.washT);

    // Head
    rRect(blk, cx - b.headAF/2, zHead, b.headAF, b.headH);
    ctx.fillStyle = colorAlpha(col, boltAlpha);
    rFillRect(blk, cx - b.headAF/2, zHead, b.headAF, b.headH);

    // Nut-side washer
    rRect(blk, cx - b.washOD/2, zWashN, b.washOD, b.washT);
    ctx.fillStyle = colorAlpha(col, boltAlpha);
    rFillRect(blk, cx - b.washOD/2, zWashN, b.washOD, b.washT);

    // Nut
    rRect(blk, cx - b.nutAF/2, zNut, b.nutAF, b.nutH);
    ctx.fillStyle = colorAlpha(col, boltAlpha);
    rFillRect(blk, cx - b.nutAF/2, zNut, b.nutAF, b.nutH);

    // Thread protrusion
    ctx.strokeStyle = col; ctx.lineWidth = boltVisLW;
    rRect(blk, cx - b.d/2, zEnd, b.d, threadProt);

    // Centreline along bolt axis
    ctx.strokeStyle = clCol; ctx.lineWidth = 0.5;
    ctx.setLineDash([6, 2, 1.5, 2]);
    rLine(blk, cx, zHead - 4, cx, zEnd + threadProt + 4);
    ctx.setLineDash([]);
  }
}

// ============================================================
// DRAW 2D ENTITIES
// ============================================================

function drawEnt2D(blk, ent, cs) {
  const col = cs.getPropertyValue('--entity-color').trim();
  const pm = ppm();
  const lw = Math.max(1, ent.lw * pm);
  ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = lw;
  ctx.setLineDash(
    ent.ls === 'dashed' ? [6, 4] :
    ent.ls === 'centre' ? [10, 3, 3, 3] : []
  );

  if (ent.type === 'line') rLine(blk, ent.u1, ent.v1, ent.u2, ent.v2);
  else if (ent.type === 'rect') rRect(blk, ent.u, ent.v, ent.w, ent.h);
  else if (ent.type === 'circle') {
    const p = real2px(blk, ent.cu, ent.cv);
    const r = ent.r * viewport.zoom / drawingScale;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.stroke();
  }
  else if (ent.type === 'text') {
    const p = real2px(blk, ent.u, ent.v);
    const fs = Math.max(8, (ent.sz || 3) * pm);
    ctx.font = `${fs}px system-ui`; ctx.textBaseline = 'middle';
    ctx.fillText(ent.text || '', p.x, p.y);
  }
  else if (ent.type === 'dim') drawDim2D(blk, ent, cs);
  else if (ent.type === 'centreline') rLine(blk, ent.u1, ent.v1, ent.u2, ent.v2);
  else if (ent.type === 'breakline') drawBreakLine2D(blk, ent, cs);
  else if (ent.type === 'weld') drawWeld2D(blk, ent, cs);
  ctx.setLineDash([]);
}

// ---- DIMENSION RENDERING (horizontal, aligned, angular) ----
function drawDim2D(blk, ent, cs) {
  const col = cs.getPropertyValue('--mute').trim();
  const pm = ppm();
  ctx.strokeStyle = col; ctx.fillStyle = col;
  ctx.lineWidth = 0.8; ctx.setLineDash([]);
  const dt = ent.dimType || 'horizontal';

  if (dt === 'aligned') {
    // Aligned: dimension line parallel to P1→P2, offset perpendicular
    const du = ent.p2u - ent.p1u, dv = ent.p2v - ent.p1v;
    const len = Math.hypot(du, dv); if (len < 0.1) return;
    const nx = -dv / len, ny = du / len; // perpendicular unit vector
    const off = ent.off || 20;
    // Offset points
    const d1u = ent.p1u + nx * off, d1v = ent.p1v + ny * off;
    const d2u = ent.p2u + nx * off, d2v = ent.p2v + ny * off;
    const pd1 = real2px(blk, d1u, d1v), pd2 = real2px(blk, d2u, d2v);
    const w1 = real2px(blk, ent.p1u, ent.p1v), w2 = real2px(blk, ent.p2u, ent.p2v);
    // Extension lines
    ctx.beginPath(); ctx.moveTo(w1.x, w1.y); ctx.lineTo(pd1.x, pd1.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w2.x, w2.y); ctx.lineTo(pd2.x, pd2.y); ctx.stroke();
    // Dimension line
    ctx.beginPath(); ctx.moveTo(pd1.x, pd1.y); ctx.lineTo(pd2.x, pd2.y); ctx.stroke();
    // Tick marks
    ctx.lineWidth = 1.2;
    [pd1, pd2].forEach(p => {
      ctx.beginPath(); ctx.moveTo(p.x-4, p.y+4); ctx.lineTo(p.x+4, p.y-4); ctx.stroke();
    });
    // Text (rotated to align with dimension line)
    const txt = len < 1 ? len.toFixed(1) : Math.round(len).toString();
    const midPx = { x: (pd1.x+pd2.x)/2, y: (pd1.y+pd2.y)/2 };
    const angle = Math.atan2(pd2.y-pd1.y, pd2.x-pd1.x);
    ctx.save(); ctx.translate(midPx.x, midPx.y); ctx.rotate(angle);
    ctx.font = `${Math.max(8, 2.5*pm)}px system-ui`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(txt, 0, -3);
    ctx.restore();
  } else if (dt === 'angular') {
    // Angular: arc between two rays from vertex
    const vx = real2px(blk, ent.p1u, ent.p1v); // vertex
    const r1 = real2px(blk, ent.p2u, ent.p2v); // ray 1 end
    const r2 = real2px(blk, ent.p3u, ent.p3v); // ray 2 end
    const a1 = Math.atan2(r1.y - vx.y, r1.x - vx.x);
    const a2 = Math.atan2(r2.y - vx.y, r2.x - vx.x);
    const arcR = Math.min(60, Math.hypot(r1.x-vx.x, r1.y-vx.y) * 0.6);
    // Draw rays
    ctx.beginPath(); ctx.moveTo(vx.x, vx.y); ctx.lineTo(r1.x, r1.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(vx.x, vx.y); ctx.lineTo(r2.x, r2.y); ctx.stroke();
    // Draw arc
    ctx.beginPath(); ctx.arc(vx.x, vx.y, arcR, a1, a2, a2 < a1); ctx.stroke();
    // Angle text
    let angleDeg = (a2 - a1) * 180 / Math.PI;
    if (angleDeg < 0) angleDeg += 360;
    if (angleDeg > 180) angleDeg = 360 - angleDeg;
    const midA = (a1 + a2) / 2;
    const tx = vx.x + (arcR + 10) * Math.cos(midA);
    const ty = vx.y + (arcR + 10) * Math.sin(midA);
    ctx.font = `${Math.max(8, 2.5*pm)}px system-ui`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`${angleDeg.toFixed(1)}°`, tx, ty);
  } else {
    // Horizontal (default — original logic)
    const dimV = ent.p1v + (ent.off || 20);
    const p1 = real2px(blk, ent.p1u, dimV);
    const p2 = real2px(blk, ent.p2u, dimV);
    const w1 = real2px(blk, ent.p1u, ent.p1v);
    const w2 = real2px(blk, ent.p2u, ent.p2v);
    ctx.beginPath();
    ctx.moveTo(w1.x, w1.y); ctx.lineTo(p1.x, p1.y);
    ctx.moveTo(w2.x, w2.y); ctx.lineTo(p2.x, p1.y);
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p1.y); ctx.stroke();
    ctx.lineWidth = 1.2;
    [p1, p2].forEach(p => {
      ctx.beginPath(); ctx.moveTo(p.x-4, p1.y+4); ctx.lineTo(p.x+4, p1.y-4); ctx.stroke();
    });
    const dist = Math.abs(ent.p2u - ent.p1u);
    const txt = dist < 1 ? dist.toFixed(1) : Math.round(dist).toString();
    ctx.font = `${Math.max(8, 2.5 * pm)}px system-ui`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(txt, (p1.x + p2.x) / 2, p1.y - 2);
  }
  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

// ---- BREAK LINE RENDERING (AS 1100 zigzag) ----
function drawBreakLine2D(blk, ent, cs) {
  const col = cs.getPropertyValue('--entity-color').trim();
  const pm = ppm();
  ctx.strokeStyle = col; ctx.lineWidth = Math.max(1, 0.35 * pm); ctx.setLineDash([]);

  const p1 = real2px(blk, ent.u1, ent.v1);
  const p2 = real2px(blk, ent.u2, ent.v2);
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const len = Math.hypot(dx, dy); if (len < 2) return;
  const ux = dx / len, uy = dy / len;       // unit along line
  const px = -uy, py = ux;                   // perpendicular
  const amp = Math.max(4, 5 * pm);           // zigzag amplitude in pixels

  ctx.beginPath(); ctx.moveTo(p1.x, p1.y);
  // Straight to 35%
  const s1 = 0.35, s2 = 0.65;
  ctx.lineTo(p1.x + dx*s1, p1.y + dy*s1);
  // 3 zigzag peaks
  const zigN = 3;
  for (let i = 0; i < zigN; i++) {
    const t = s1 + (s2 - s1) * (i + 0.5) / zigN;
    const sign = (i % 2 === 0) ? 1 : -1;
    ctx.lineTo(p1.x + dx*t + px*amp*sign, p1.y + dy*t + py*amp*sign);
  }
  // Straight to end
  ctx.lineTo(p1.x + dx*s2, p1.y + dy*s2);
  ctx.lineTo(p2.x, p2.y);
  ctx.stroke();
}

// ---- WELD SYMBOL RENDERING (AS 1100) ----
function drawWeld2D(blk, ent, cs) {
  const col = cs.getPropertyValue('--entity-color').trim();
  const pm = ppm();
  const jp = real2px(blk, ent.u, ent.v); // joint point
  const angle = ent.angle || 0;
  const refLen = Math.max(20, 8 * pm);       // reference line length in pixels
  const symSize = Math.max(6, 3 * pm);       // symbol size

  ctx.strokeStyle = col; ctx.fillStyle = col;
  ctx.lineWidth = Math.max(1, 0.35 * pm); ctx.setLineDash([]);

  // Arrow from joint point to reference line elbow
  const elbowX = jp.x + Math.cos(angle) * refLen * 0.5;
  const elbowY = jp.y + Math.sin(angle) * refLen * 0.5;
  ctx.beginPath(); ctx.moveTo(jp.x, jp.y); ctx.lineTo(elbowX, elbowY); ctx.stroke();
  // Arrowhead at joint point
  const aLen = 6, aWid = 2.5;
  const au = Math.cos(angle), av = Math.sin(angle);
  ctx.beginPath();
  ctx.moveTo(jp.x, jp.y);
  ctx.lineTo(jp.x + au*aLen + av*aWid, jp.y + av*aLen - au*aWid);
  ctx.lineTo(jp.x + au*aLen - av*aWid, jp.y + av*aLen + au*aWid);
  ctx.closePath(); ctx.fill();

  // Horizontal reference line from elbow
  const refEndX = elbowX + refLen;
  ctx.beginPath(); ctx.moveTo(elbowX, elbowY); ctx.lineTo(refEndX, elbowY); ctx.stroke();

  // Weld symbol on the reference line
  const symX = (elbowX + refEndX) / 2;
  const wt = ent.weldType || 'fillet';
  if (wt === 'fillet') {
    // Filled right triangle below the line
    ctx.beginPath();
    ctx.moveTo(symX - symSize/2, elbowY);
    ctx.lineTo(symX + symSize/2, elbowY);
    ctx.lineTo(symX - symSize/2, elbowY + symSize);
    ctx.closePath(); ctx.stroke(); ctx.fillStyle = colorAlpha(col, 0.3); ctx.fill();
  } else { // butt
    // V-shape below the line
    ctx.beginPath();
    ctx.moveTo(symX - symSize/2, elbowY);
    ctx.lineTo(symX, elbowY + symSize);
    ctx.lineTo(symX + symSize/2, elbowY);
    ctx.stroke();
  }

  // Size text
  ctx.fillStyle = col;
  ctx.font = `${Math.max(7, 2*pm)}px system-ui`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText(`${ent.size || 8}`, refEndX + 3, elbowY - 2);

  // All-around circle at elbow
  if (ent.allAround) {
    ctx.beginPath(); ctx.arc(elbowX, elbowY, 4, 0, Math.PI*2); ctx.stroke();
  }
  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

// ============================================================
// SELECTION HIGHLIGHTS
// ============================================================

function drawSelHighlight(blk, obj, cs) {
  const b = getObj2DBounds(obj, blk);
  if (!b) return;
  const selCol = cs.getPropertyValue('--selected-color').trim();

  // Compute rotation centre (same as drawing functions use)
  const rc = blk.viewKey === 'elevation' ? [obj.x, obj.y] :
             blk.viewKey === 'sectionA' ? [obj.z, obj.y] : [obj.x, obj.z];

  // Wrap entire selection highlight in withRotation so outline matches drawn member
  withRotation(blk, obj, rc[0], rc[1], () => {
  const p1 = real2px(blk, b.u1, b.v2);
  const p2 = real2px(blk, b.u2, b.v1);

  // Bounding box dashes
  ctx.strokeStyle = selCol; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
  ctx.strokeRect(p1.x, p1.y, p2.x-p1.x, p2.y-p1.y);
  ctx.setLineDash([]);

  // Corner grips (small filled squares)
  ctx.fillStyle = selCol;
  const gs = 3;
  const corners = [[b.u1,b.v1],[b.u2,b.v1],[b.u1,b.v2],[b.u2,b.v2]];
  corners.forEach(g => {
    const gp = real2px(blk, g[0], g[1]);
    ctx.fillRect(gp.x-gs, gp.y-gs, gs*2, gs*2);
  });

  // Functional grips (resize, extend, rotate) — draw as diamonds or circles
  const grips = getGrips(obj, blk);
  grips.forEach(g => {
    const gp = real2px(blk, g.u, g.v);
    if (g.type === 'rotate') {
      // Rotation handle: circle with arc arrow
      ctx.strokeStyle = selCol; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(gp.x, gp.y, 5, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = colorAlpha(selCol, 0.3); ctx.fill();
      // Line connecting to bbox top
      const topMid = real2px(blk, g.u, b.v2);
      ctx.strokeStyle = colorAlpha(selCol, 0.4); ctx.lineWidth = 0.8;
      ctx.setLineDash([2, 2]);
      ctx.beginPath(); ctx.moveTo(topMid.x, topMid.y); ctx.lineTo(gp.x, gp.y); ctx.stroke();
      ctx.setLineDash([]);
    } else {
      // Resize/extend handle: filled diamond (5px for visibility on small sections)
      const gs = 5;
      ctx.fillStyle = selCol;
      ctx.beginPath();
      ctx.moveTo(gp.x, gp.y - gs);
      ctx.lineTo(gp.x + gs, gp.y);
      ctx.lineTo(gp.x, gp.y + gs);
      ctx.lineTo(gp.x - gs, gp.y);
      ctx.closePath();
      ctx.fill();
      // White outline for contrast
      ctx.strokeStyle = colorAlpha('#ffffff', 0.7); ctx.lineWidth = 1.0;
      ctx.stroke();
    }
  });

  // Show rotation angle if non-zero
  if (obj.rot && obj.rot !== 0) {
    const cp = real2px(blk, (b.u1+b.u2)/2, b.v1 - 8);
    ctx.fillStyle = selCol;
    ctx.font = '9px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(`${obj.rot.toFixed(1)}°`, cp.x, cp.y);
    ctx.textAlign = 'start';
  }
  }); // end withRotation
}

function drawBlockFrames(cs) {
  const selCol = cs.getPropertyValue('--selected-color').trim();
  const muteCol = cs.getPropertyValue('--mute').trim();
  blocks.forEach(blk => {
    if (blk.hidden) return;
    const bbox = getBlockSheetBounds(blk);
    const tl = s2px(bbox.left, bbox.top);
    const br = s2px(bbox.right, bbox.bottom);
    const w = br.x - tl.x, h = br.y - tl.y;
    const isActive = blk === activeBlock;
    // Frame border
    ctx.strokeStyle = isActive ? selCol : muteCol;
    ctx.globalAlpha = isActive ? 0.35 : 0.12;
    ctx.lineWidth = isActive ? 1.5 : 0.75;
    ctx.setLineDash([]);
    ctx.strokeRect(tl.x, tl.y, w, h);
    ctx.globalAlpha = 1;

    // Resize grip triangles on active block corners
    if (isActive) {
      const gs = 7; // grip triangle size in px
      ctx.fillStyle = selCol; ctx.globalAlpha = 0.5;
      // NW
      ctx.beginPath(); ctx.moveTo(tl.x, tl.y); ctx.lineTo(tl.x + gs, tl.y); ctx.lineTo(tl.x, tl.y + gs); ctx.fill();
      // NE
      ctx.beginPath(); ctx.moveTo(br.x, tl.y); ctx.lineTo(br.x - gs, tl.y); ctx.lineTo(br.x, tl.y + gs); ctx.fill();
      // SW
      ctx.beginPath(); ctx.moveTo(tl.x, br.y); ctx.lineTo(tl.x + gs, br.y); ctx.lineTo(tl.x, br.y - gs); ctx.fill();
      // SE
      ctx.beginPath(); ctx.moveTo(br.x, br.y); ctx.lineTo(br.x - gs, br.y); ctx.lineTo(br.x, br.y - gs); ctx.fill();
      ctx.globalAlpha = 1;
    }
  });
}

// Keep legacy name for any callers
function drawActiveBlockHighlight(blk, cs) {
  // Now handled by drawBlockFrames — no-op
}

// ============================================================
// VIEW LABELS
// ============================================================

function drawViewLabel(blk, cs) {
  const bbox = getBlockSheetBounds(blk);
  const labelSheetY = bbox.bottom + 5;
  const labelSheetX = (bbox.left + bbox.right) / 2;
  const p = s2px(labelSheetX, labelSheetY);

  const fs = Math.max(6, sheetLen(3.5));
  ctx.font = `bold ${fs}px system-ui`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';

  const labels = { elevation: 'ELEVATION', sectionA: 'SECTION A', planB: 'PLAN B', isometric: 'ISOMETRIC' };
  const labelText = labels[blk.viewKey] || blk.viewKey;

  if (blk.hidden) {
    // Greyed-out label for hidden views
    ctx.fillStyle = cs.getPropertyValue('--mute').trim();
    ctx.globalAlpha = 0.4;
    ctx.fillText(labelText + '  [Hidden]', p.x, p.y);
    const fs2 = Math.max(5, sheetLen(2));
    ctx.font = `${fs2}px system-ui`;
    ctx.fillText('Double-click to show', p.x, p.y + fs + 2);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = cs.getPropertyValue('--ink').trim();
    ctx.fillText(labelText, p.x, p.y);

    // Scale text below
    const fs2 = Math.max(5, sheetLen(2.5));
    ctx.font = `${fs2}px system-ui`;
    ctx.fillStyle = cs.getPropertyValue('--mute').trim();
    const p2y = p.y + fs + 2;
    ctx.fillText(`Scale 1:${drawingScale}`, p.x, p2y);

    // Orbiting indicator for isometric view
    if (blk.viewKey === 'isometric' && v3dOrbiting) {
      ctx.fillStyle = cs.getPropertyValue('--selected-color').trim();
      const fs3 = Math.max(4, sheetLen(1.8));
      ctx.font = `${fs3}px system-ui`;
      ctx.fillText('Orbiting — Enter to lock', p.x, p2y + fs2 + 3);
    }
  }

  // Underline when block is being dragged
  if (blockDragging === blk) {
    const selCol = cs.getPropertyValue('--selected-color').trim();
    ctx.strokeStyle = selCol; ctx.lineWidth = 1.5;
    const tw = ctx.measureText(labelText).width;
    ctx.beginPath();
    ctx.moveTo(p.x - tw / 2, p.y + fs + 1);
    ctx.lineTo(p.x + tw / 2, p.y + fs + 1);
    ctx.stroke();
  }

  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

// Hit-test: is the cursor over a view label? Returns the block or null.
function hitTestViewLabel(px, py) {
  const fs = Math.max(6, sheetLen(3.5));
  const labelH = fs + Math.max(5, sheetLen(2.5)) + 6; // total label height
  const labelW = 80; // approximate half-width in px

  for (const blk of blocks) {
    const bbox = getBlockSheetBounds(blk);
    const labelSheetY = bbox.bottom + 5;
    const labelSheetX = (bbox.left + bbox.right) / 2;
    const p = s2px(labelSheetX, labelSheetY);

    if (px >= p.x - labelW && px <= p.x + labelW && py >= p.y - 4 && py <= p.y + labelH) {
      return blk;
    }
  }
  return null;
}

// ============================================================
// CROSSHAIR & CLICK PREVIEW
// ============================================================

function drawCrosshair(blk, cs) {
  if (!cursorSheet) return;
  const isDrawing = tool !== 'select' || clickPts.length > 0;
  if (!isDrawing && !placing) return;

  const [cu, cv] = getCursor(blk);
  const p = real2px(blk, cu, cv);

  ctx.strokeStyle = cs.getPropertyValue('--crosshair-color').trim();
  ctx.lineWidth = 0.5; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(0, p.y); ctx.lineTo(W, p.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.x, 0); ctx.lineTo(p.x, H); ctx.stroke();

  ctx.fillStyle = cs.getPropertyValue('--crosshair-text').trim();
  ctx.font = '9px system-ui';
  ctx.fillText(`${cu.toFixed(1)}, ${cv.toFixed(1)}`, p.x + 10, p.y - 8);
}

function drawClickPreview(blk, cs) {
  if (!cursorSheet) return;
  const [cu, cv] = getCursor(blk);
  const selCol = cs.getPropertyValue('--selected-color').trim();
  ctx.strokeStyle = selCol; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);

  if (tool === 'line' && clickPts.length === 1) {
    rLine(blk, clickPts[0].u, clickPts[0].v, cu, cv);
    const dist = Math.hypot(cu - clickPts[0].u, cv - clickPts[0].v);
    const mp = real2px(blk, (clickPts[0].u+cu)/2, (clickPts[0].v+cv)/2);
    ctx.fillStyle = selCol; ctx.font = '10px system-ui';
    ctx.fillText(dist.toFixed(1) + 'mm', mp.x + 8, mp.y - 8);
  }
  else if (tool === 'rect' && clickPts.length === 1) {
    const p = clickPts[0];
    const p1 = real2px(blk, Math.min(p.u, cu), Math.max(p.v, cv));
    const w = Math.abs(cu - p.u) / drawingScale * viewport.zoom;
    const h = Math.abs(cv - p.v) / drawingScale * viewport.zoom;
    ctx.strokeRect(p1.x, p1.y, w, h);
  }
  else if (tool === 'circle' && clickPts.length === 1) {
    const p = clickPts[0];
    const r = Math.hypot(cu - p.u, cv - p.v) / drawingScale * viewport.zoom;
    const cp = real2px(blk, p.u, p.v);
    ctx.beginPath(); ctx.arc(cp.x, cp.y, r, 0, Math.PI*2); ctx.stroke();
  }
  else if (tool === 'polyline' && polyPts.length > 0) {
    ctx.setLineDash([]); ctx.strokeStyle = cs.getPropertyValue('--entity-color').trim();
    ctx.lineWidth = Math.max(1, 0.35 * ppm());
    ctx.beginPath();
    const fp = real2px(blk, polyPts[0].u, polyPts[0].v);
    ctx.moveTo(fp.x, fp.y);
    for (let i = 1; i < polyPts.length; i++) {
      const pp = real2px(blk, polyPts[i].u, polyPts[i].v);
      ctx.lineTo(pp.x, pp.y);
    }
    ctx.stroke();
    ctx.setLineDash([4, 4]); ctx.strokeStyle = selCol; ctx.lineWidth = 1;
    const last = polyPts[polyPts.length-1];
    rLine(blk, last.u, last.v, cu, cv);
    ctx.fillStyle = selCol;
    polyPts.forEach(pt => {
      const vp = real2px(blk, pt.u, pt.v);
      ctx.fillRect(vp.x-3, vp.y-3, 6, 6);
    });
  }
  else if (tool === 'draw-member' && drawMember) {
    const pm = ppm();
    if (drawStart && drawStart.blk === blk) {
      // Drawing in progress: show centreline + faint outline from start to cursor
      const su = drawStart.cu, sv = drawStart.cv;
      const p1 = real2px(blk, su, sv);
      const p2 = real2px(blk, cu, cv);
      const du = cu - su, dv = cv - sv;
      const len = Math.hypot(du, dv);
      const angle = Math.atan2(dv, du);

      // Perpendicular offset direction (for member depth outline)
      const perpU = -Math.sin(angle);
      const perpV = Math.cos(angle);

      // Get member half-depth for outline
      let halfDepth = 0;
      if (drawMember.type === 'ub') {
        const s = UB_DB[drawMember.section];
        if (s) halfDepth = s.d / 2;
      } else if (drawMember.type === 'shs') {
        const s = SHS_DB[drawMember.section];
        if (s) halfDepth = s.B / 2;
      } else if (drawMember.type === 'plate') {
        halfDepth = (drawMember.ph || 100) / 2;
      }

      // --- Centreline: dot-dash (AS 1100 chain-dot) ---
      ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--cl-color').trim() || '#00bb00';
      ctx.lineWidth = Math.max(0.5, LW.CL * pm);
      const clDash = 12 / viewport.zoom * drawingScale;
      const clDot = 1 / viewport.zoom * drawingScale;
      const clGap = 3 / viewport.zoom * drawingScale;
      // Extend centreline 15mm beyond member ends
      const ext = 15;
      const exU = Math.cos(angle) * ext;
      const exV = Math.sin(angle) * ext;
      const cl1 = real2px(blk, su - exU, sv - exV);
      const cl2 = real2px(blk, cu + exU, cv + exV);
      ctx.setLineDash([clDash / drawingScale * viewport.zoom, clGap / drawingScale * viewport.zoom, clDot / drawingScale * viewport.zoom, clGap / drawingScale * viewport.zoom]);
      ctx.beginPath(); ctx.moveTo(cl1.x, cl1.y); ctx.lineTo(cl2.x, cl2.y); ctx.stroke();
      ctx.setLineDash([]);

      // --- Faint outline: member edges ---
      if (halfDepth > 0) {
        ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--entity-color').trim() || '#cccccc';
        ctx.globalAlpha = 0.3;
        ctx.lineWidth = Math.max(0.5, LW.HID * pm);
        // Four corners of the member outline
        const c1 = real2px(blk, su + perpU * halfDepth, sv + perpV * halfDepth);
        const c2 = real2px(blk, cu + perpU * halfDepth, cv + perpV * halfDepth);
        const c3 = real2px(blk, cu - perpU * halfDepth, cv - perpV * halfDepth);
        const c4 = real2px(blk, su - perpU * halfDepth, sv - perpV * halfDepth);
        ctx.beginPath();
        ctx.moveTo(c1.x, c1.y); ctx.lineTo(c2.x, c2.y);
        ctx.lineTo(c3.x, c3.y); ctx.lineTo(c4.x, c4.y);
        ctx.closePath(); ctx.stroke();
        ctx.globalAlpha = 1.0;
      }

      // --- Start point marker ---
      ctx.fillStyle = '#00aaff';
      ctx.beginPath(); ctx.arc(p1.x, p1.y, 3, 0, Math.PI * 2); ctx.fill();

      // --- Live dimension readout near cursor ---
      if (len > 1) {
        const midPx = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
        const offsetPx = 16; // pixels offset from centreline
        const labelX = midPx.x + perpU * offsetPx * viewport.zoom * 0.05 + 10;
        const labelY = midPx.y - 15;
        const rotDeg = Math.round(angle * 180 / Math.PI * 10) / 10;
        const dimText = `${Math.round(len)} mm`;
        const angleText = `${rotDeg}°`;

        ctx.font = `bold 12px 'Segoe UI', sans-serif`;
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = '#333333';
        ctx.lineWidth = 3;
        // Background pill
        const tm = ctx.measureText(dimText);
        const tm2 = ctx.measureText(angleText);
        const tw = Math.max(tm.width, tm2.width) + 16;
        const th = 36;
        const rx = p2.x + 15, ry = p2.y - th - 5;
        ctx.fillStyle = 'rgba(30,30,30,0.85)';
        ctx.beginPath();
        ctx.roundRect(rx, ry, tw, th, 4);
        ctx.fill();
        // Text
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.font = `bold 11px 'Segoe UI', sans-serif`;
        ctx.fillText(dimText, rx + 6, ry + 4);
        ctx.font = `10px 'Segoe UI', sans-serif`;
        ctx.fillStyle = '#aaaaaa';
        ctx.fillText(angleText, rx + 6, ry + 20);
        ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
      }
    } else if (!drawStart) {
      // Before first click: show crosshair and section label at cursor
      const p = real2px(blk, cu, cv);
      ctx.fillStyle = '#00aaff';
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
      // Label
      let label = '';
      if (drawMember.type === 'ub') label = drawMember.section;
      else if (drawMember.type === 'shs') label = drawMember.section + ' SHS';
      else if (drawMember.type === 'bolt') label = drawMember.boltSize + ' Bolt';
      else if (drawMember.type === 'plate') label = `Plate ${drawMember.pw || '?'}×${drawMember.ph || '?'}×${drawMember.pt || '?'}`;
      if (label) {
        ctx.font = `10px 'Segoe UI', sans-serif`;
        ctx.fillStyle = 'rgba(30,30,30,0.8)';
        const lm = ctx.measureText(label);
        ctx.fillRect(p.x + 12, p.y - 18, lm.width + 8, 18);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(label, p.x + 16, p.y - 9);
        ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
      }
    }
  }
  else if (tool === 'draw-plate' && blk) {
    const pm = ppm();
    const col = cs.getPropertyValue('--entity-color').trim();
    const cutLW = Math.max(1, LW.CUT * pm);

    if (platePts.length > 0 && plateBlock === blk) {
      // Draw completed edges (solid thick lines)
      ctx.strokeStyle = col;
      ctx.lineWidth = cutLW;
      ctx.setLineDash([]);
      for (let i = 0; i < platePts.length - 1; i++) {
        const p1 = real2px(blk, platePts[i].u, platePts[i].v);
        const p2 = real2px(blk, platePts[i+1].u, platePts[i+1].v);
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

        // Edge dimension label
        const edgeLen = Math.hypot(platePts[i+1].u - platePts[i].u, platePts[i+1].v - platePts[i].v);
        const midPx = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
        ctx.font = `9px 'Segoe UI', sans-serif`;
        ctx.fillStyle = 'rgba(30,30,30,0.75)';
        const dtxt = Math.round(edgeLen) + '';
        const dtm = ctx.measureText(dtxt);
        ctx.fillRect(midPx.x - dtm.width/2 - 3, midPx.y - 14, dtm.width + 6, 16);
        ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(dtxt, midPx.x, midPx.y - 6);
        ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
      }

      // Draw rubber-band edge to cursor (dashed)
      const last = platePts[platePts.length - 1];
      const pLast = real2px(blk, last.u, last.v);
      const pCur = real2px(blk, cu, cv);
      ctx.strokeStyle = col;
      ctx.lineWidth = Math.max(0.5, LW.VIS * pm);
      ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.moveTo(pLast.x, pLast.y); ctx.lineTo(pCur.x, pCur.y); ctx.stroke();
      ctx.setLineDash([]);

      // Closing edge preview (dashed, from cursor back to first point)
      if (platePts.length >= 2) {
        const pFirst = real2px(blk, platePts[0].u, platePts[0].v);
        ctx.globalAlpha = 0.3;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(pCur.x, pCur.y); ctx.lineTo(pFirst.x, pFirst.y); ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1.0;
      }

      // Light fill preview of the polygon
      if (platePts.length >= 2) {
        ctx.globalAlpha = 0.06;
        ctx.fillStyle = col;
        ctx.beginPath();
        const fp = real2px(blk, platePts[0].u, platePts[0].v);
        ctx.moveTo(fp.x, fp.y);
        for (let i = 1; i < platePts.length; i++) {
          const pp = real2px(blk, platePts[i].u, platePts[i].v);
          ctx.lineTo(pp.x, pp.y);
        }
        ctx.lineTo(pCur.x, pCur.y);
        ctx.closePath(); ctx.fill();
        ctx.globalAlpha = 1.0;
      }

      // Vertex markers
      ctx.fillStyle = '#00aaff';
      platePts.forEach(pt => {
        const pp = real2px(blk, pt.u, pt.v);
        ctx.beginPath(); ctx.arc(pp.x, pp.y, 3, 0, Math.PI * 2); ctx.fill();
      });

      // Live dimension: current edge length near cursor
      const rubberLen = Math.hypot(cu - last.u, cv - last.v);
      if (rubberLen > 1) {
        const angle = Math.atan2(cv - last.v, cu - last.u);
        const rotDeg = Math.round(angle * 180 / Math.PI * 10) / 10;
        const dimText = plateDimActive && plateDimInput ?
          plateDimInput + '_ mm' : Math.round(rubberLen) + ' mm';
        const angleText = rotDeg + '°';

        ctx.font = `bold 11px 'Segoe UI', sans-serif`;
        const tw = Math.max(ctx.measureText(dimText).width, ctx.measureText(angleText).width) + 16;
        const th = 36;
        const rx = pCur.x + 15, ry = pCur.y - th - 5;
        ctx.fillStyle = 'rgba(30,30,30,0.85)';
        ctx.beginPath(); ctx.roundRect(rx, ry, tw, th, 4); ctx.fill();
        ctx.fillStyle = '#ffffff'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(dimText, rx + 6, ry + 4);
        ctx.font = `10px 'Segoe UI', sans-serif`;
        ctx.fillStyle = '#aaaaaa';
        ctx.fillText(angleText, rx + 6, ry + 20);
        ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
      }

      // Vertex count / hint
      ctx.font = `10px 'Segoe UI', sans-serif`;
      ctx.fillStyle = 'rgba(30,30,30,0.7)';
      const hint = platePts.length >= 3 ? `${platePts.length} pts — dbl-click or Enter to close` : `${platePts.length} pt${platePts.length > 1 ? 's' : ''} — click to add vertices`;
      const htm = ctx.measureText(hint);
      ctx.fillRect(pCur.x + 15, pCur.y + 8, htm.width + 8, 16);
      ctx.fillStyle = '#cccccc'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(hint, pCur.x + 19, pCur.y + 16);
      ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';

    } else if (platePts.length === 0) {
      // Before first click: crosshair with "Draw Plate" label
      const p = real2px(blk, cu, cv);
      ctx.fillStyle = '#00aaff';
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
      ctx.font = `10px 'Segoe UI', sans-serif`;
      ctx.fillStyle = 'rgba(30,30,30,0.8)';
      const label = 'Draw Plate — click first corner';
      const lm = ctx.measureText(label);
      ctx.fillRect(p.x + 12, p.y - 18, lm.width + 8, 18);
      ctx.fillStyle = '#ffffff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(label, p.x + 16, p.y - 9);
      ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
    }
  }
  // Bolt group placement preview
  else if (tool === 'place-bolt-group' && boltGroupConfig && blk) {
    const cfg = boltGroupConfig;
    const hg = (cfg.cols - 1) * cfg.gauge / 2;
    const hp = (cfg.rows - 1) * cfg.pitch / 2;
    const bData = BOLT_DB[cfg.boltSize] || BOLT_DB.M20;
    const boltR = (bData.d / 2) * viewport.zoom / drawingScale;
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = '#00aaff'; ctx.fillStyle = '#00aaff';
    ctx.lineWidth = 1; ctx.setLineDash([]);
    for (let r = 0; r < cfg.rows; r++) {
      for (let c = 0; c < cfg.cols; c++) {
        const bu = cu - hg + c * cfg.gauge;
        const bv = cv - hp + r * cfg.pitch;
        const bp = real2px(blk, bu, bv);
        ctx.beginPath(); ctx.arc(bp.x, bp.y, boltR, 0, Math.PI * 2); ctx.stroke(); ctx.fill();
      }
    }
    ctx.globalAlpha = 1.0;
    // Label
    ctx.fillStyle = 'rgba(30,30,30,0.8)';
    const label = `${cfg.rows}×${cfg.cols} ${cfg.boltSize} (${cfg.gauge}g × ${cfg.pitch}p)`;
    const p = real2px(blk, cu, cv);
    const lm = ctx.measureText(label);
    ctx.fillRect(p.x + 12, p.y - 18, lm.width + 8, 18);
    ctx.fillStyle = '#ffffff'; ctx.font = '10px system-ui';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(label, p.x + 16, p.y - 9);
    ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
  }
  ctx.setLineDash([]);
}

function createPlacingGhost(u, v) {
  if (!placing) return null;
  if (placing.type === 'ub') return { id:-1, type:'ub', section:placing.section, x:u, y:v, z:0, length:placing.length||600 };
  if (placing.type === 'shs') return { id:-1, type:'shs', section:placing.section, x:u, y:v, z:0, length:placing.length||500, rot:90 };
  if (placing.type === 'plate') return { id:-1, type:'plate', x:u, y:v, z:0, pw:placing.pw, ph:placing.ph, pt:placing.pt };
  if (placing.type === 'bolt') return { id:-1, type:'bolt', boltSize:placing.boltSize, x:u, y:v, z:0 };
  return null;
}

// ============================================================
// EVENT HANDLING
// ============================================================

function getPixelXY(e) {
  const r = canvas.getBoundingClientRect();
  return { px: e.clientX - r.left, py: e.clientY - r.top };
}

function initEvents() {
  canvas.addEventListener('mousedown', (e) => {
    const { px, py } = getPixelXY(e);

    // If orbiting: mousedown starts a new orbit drag, or click outside stops orbit
    if (v3dOrbiting) {
      v3dHandleOrbitDown(px, py);
      canvas.style.cursor = 'grabbing';
      return;
    }

    // Detect which block the click is in
    const clickedBlock = blockAtPixel(px, py);
    if (clickedBlock) activeBlock = clickedBlock;

    // Check for section cut line drag (in elevation view, select tool, left button)
    if (e.button === 0 && !spaceHeld && tool === 'select' && activeBlock && activeBlock.viewKey === 'elevation') {
      const cutHit = hitTestCutLine(activeBlock, px, py);
      if (cutHit) {
        draggingCutLine = cutHit;
        e.preventDefault(); requestRender(); return;
      }
    }

    // Check for view box resize handle (on active block)
    if (e.button === 0 && !spaceHeld && tool === 'select' && activeBlock) {
      const handle = hitTestResizeHandle(activeBlock, px, py);
      if (handle) {
        blockResizing = { block: activeBlock, handle };
        const sh = px2s(px, py);
        blockResizeStart = { sx: sh.x, sy: sh.y, boxW: activeBlock.boxW, boxH: activeBlock.boxH,
                             sheetX: activeBlock.sheetX, sheetY: activeBlock.sheetY };
        canvas.style.cursor = resizeHandleCursor(handle);
        e.preventDefault(); return;
      }
      // Check for view box border drag (single-click drag to reposition)
      if (hitTestBlockBorder(activeBlock, px, py)) {
        blockDragging = activeBlock;
        const sh = px2s(px, py);
        blockDragOffset = { dx: sh.x - activeBlock.sheetX, dy: sh.y - activeBlock.sheetY };
        canvas.style.cursor = 'move';
        e.preventDefault(); requestRender(); return;
      }
    }

    // Pan: middle button or space+left
    if (e.button === 1 || (e.button === 0 && spaceHeld)) {
      isPanning = true; panLast = { px, py };
      container.classList.add('grabbing');
      e.preventDefault(); return;
    }

    // Right click: cancel
    if (e.button === 2) {
      if (tool === 'draw-plate' && platePts.length > 0) {
        // Undo last vertex
        platePts.pop();
        plateDimInput = ''; plateDimActive = false;
        if (platePts.length === 0) plateBlock = null;
        requestRender();
      } else if (tool === 'draw-plate') {
        cancelDraw(); tool = 'select'; canvas.style.cursor = 'default';
      } else if (clickPts.length > 0 || polyPts.length > 0 || dimStep > 0 || placing || drawStart) {
        if (drawStart && drawMember) {
          drawStart = null; drawPreviewEnd = null;
          requestRender();
        } else {
          cancelDraw();
        }
      } else if (drawMember) {
        cancelDraw();
        tool = 'select'; canvas.style.cursor = 'default';
      } else {
        selected3D = []; requestRender();
      }
      return;
    }
    if (e.button !== 0) return;
    if (!activeBlock) return;

    const [cu, cv] = getCursor(activeBlock);

    // Place component (legacy — kept for compatibility)
    if (tool === 'place-component' && placing) {
      placeComponent(activeBlock, cu, cv);
      requestRender(); return;
    }

    // Two-click draw-member
    if (tool === 'draw-member' && drawMember) {
      if (drawMember.type === 'bolt') {
        // Bolts: single click placement (no line drawing needed)
        finishDrawMember(activeBlock, cu, cv, cu, cv);
        requestRender(); return;
      }
      if (!drawStart) {
        // First click: set start point
        drawStart = { blk: activeBlock, cu, cv };
        drawPreviewEnd = { cu, cv };
        requestRender(); return;
      } else {
        // Second click: finish the member
        finishDrawMember(drawStart.blk, drawStart.cu, drawStart.cv, cu, cv);
        requestRender(); return;
      }
    }

    // Draw plate polygon
    if (tool === 'draw-plate') {
      // If typed dimension is active, apply it first
      if (plateDimActive && plateDimInput && platePts.length > 0) {
        const len = parseFloat(plateDimInput);
        if (len > 0) {
          const last = platePts[platePts.length - 1];
          const du = cu - last.u, dv = cv - last.v;
          const angle = Math.atan2(dv, du);
          // Lock the point at exact typed length in the direction of cursor
          const nu = last.u + Math.cos(angle) * len;
          const nv = last.v + Math.sin(angle) * len;
          platePts.push({ u: nu, v: nv });
          plateDimInput = ''; plateDimActive = false;
          requestRender(); return;
        }
      }
      // Set the block on first click
      if (platePts.length === 0) plateBlock = activeBlock;
      // Only allow drawing within the same block
      if (activeBlock !== plateBlock) { requestRender(); return; }
      platePts.push({ u: cu, v: cv });
      plateDimInput = ''; plateDimActive = false;
      requestRender(); return;
    }

    // Dimension
    if (tool === 'dimension') {
      if (dimType === 'angular') {
        // Angular: 3 clicks — vertex, ray1 end, ray2 end
        if (dimStep === 0) { dimP1 = [cu, cv]; dimStep = 1; }
        else if (dimStep === 1) { dimP2 = [cu, cv]; dimStep = 2; }
        else if (dimStep === 2) {
          addEnt2D(mkEnt2D(activeBlock.viewKey, 'dim', {
            p1u:dimP1[0], p1v:dimP1[1], p2u:dimP2[0], p2v:dimP2[1],
            p3u:cu, p3v:cv, dimType:'angular', lw:0.18
          }));
          dimStep = 0; dimP1 = null; dimP2 = null;
        }
      } else {
        // Horizontal or aligned: 3 clicks — P1, P2, offset
        if (dimStep === 0) { dimP1 = [cu, cv]; dimStep = 1; }
        else if (dimStep === 1) { dimP2 = [cu, cv]; dimStep = 2; }
        else if (dimStep === 2) {
          const off = dimType === 'aligned'
            ? (() => { const du=dimP2[0]-dimP1[0], dv=dimP2[1]-dimP1[1], len=Math.hypot(du,dv);
                       if(len<0.1)return 20; const nx=-dv/len, ny=du/len;
                       return (cu-dimP1[0])*nx + (cv-dimP1[1])*ny || 20; })()
            : (cv - dimP1[1]) || 20;
          addEnt2D(mkEnt2D(activeBlock.viewKey, 'dim', {
            p1u:dimP1[0], p1v:dimP1[1], p2u:dimP2[0], p2v:dimP2[1],
            off:off, dimType:dimType, lw:0.18
          }));
          dimStep = 0; dimP1 = null; dimP2 = null;
        }
      }
      requestRender(); return;
    }

    // Bolt group placement
    if (tool === 'place-bolt-group' && boltGroupConfig) {
      const cfg = boltGroupConfig;
      const hg = (cfg.cols - 1) * cfg.gauge / 2;
      const hp = (cfg.rows - 1) * cfg.pitch / 2;
      const before = objects3D.length;
      for (let r = 0; r < cfg.rows; r++) {
        for (let c = 0; c < cfg.cols; c++) {
          const bu = cu - hg + c * cfg.gauge;
          const bv = cv - hp + r * cfg.pitch;
          const pos = activeBlock.unproject(bu, bv);
          const bx = pos.x !== undefined ? pos.x : 0;
          const by = pos.y !== undefined ? pos.y : 0;
          const bz = pos.z !== undefined ? pos.z : 0;
          addObj(mkObj('bolt', { boltSize: cfg.boltSize, x: bx, y: by, z: bz }));
        }
      }
      requestRender(); return;
    }

    // Weld symbol placement
    if (tool === 'draw-weld') {
      if (weldStep === 0) { weldP1 = { u: cu, v: cv }; weldStep = 1; }
      else {
        const angle = Math.atan2(cv - weldP1.v, cu - weldP1.u);
        const sizeStr = prompt('Weld size (mm):', '8');
        const size = parseFloat(sizeStr) || 8;
        const wt = prompt('Weld type (fillet/butt):', 'fillet') === 'butt' ? 'butt' : 'fillet';
        addEnt2D(mkEnt2D(activeBlock.viewKey, 'weld', {
          u: weldP1.u, v: weldP1.v, angle, weldType: wt, size, allAround: false
        }));
        weldStep = 0; weldP1 = null;
      }
      requestRender(); return;
    }

    // Break line placement (two-click like line)
    if (tool === 'draw-breakline') {
      if (clickPts.length === 0) { clickPts.push({ u:cu, v:cv }); }
      else {
        const p = clickPts[0];
        addEnt2D(mkEnt2D(activeBlock.viewKey, 'breakline', { u1:p.u, v1:p.v, u2:cu, v2:cv, lw:0.35 }));
        clickPts = [];
      }
      requestRender(); return;
    }

    // Centreline placement (two-click like line)
    if (tool === 'draw-centreline') {
      if (clickPts.length === 0) { clickPts.push({ u:cu, v:cv }); }
      else {
        const p = clickPts[0];
        addEnt2D(mkEnt2D(activeBlock.viewKey, 'centreline', { u1:p.u, v1:p.v, u2:cu, v2:cv, lw:0.18, ls:'centre' }));
        clickPts = [];
      }
      requestRender(); return;
    }

    // Text
    if (tool === 'text') {
      const txt = prompt('Enter text:');
      if (txt) addEnt2D(mkEnt2D(activeBlock.viewKey, 'text', { u:cu, v:cv, text:txt, sz:3 }));
      requestRender(); return;
    }

    // Polyline
    if (tool === 'polyline') { polyPts.push({ u:cu, v:cv }); requestRender(); return; }

    // Line
    if (tool === 'line') {
      if (clickPts.length === 0) { clickPts.push({ u:cu, v:cv }); }
      else {
        const p = clickPts[0];
        if (Math.hypot(cu-p.u, cv-p.v) > 0.5) {
          addEnt2D(mkEnt2D(activeBlock.viewKey, 'line', { u1:p.u, v1:p.v, u2:cu, v2:cv, lw:0.35 }));
        }
        clickPts = [{ u:cu, v:cv }];
      }
      requestRender(); return;
    }

    // Rect
    if (tool === 'rect') {
      if (clickPts.length === 0) { clickPts.push({ u:cu, v:cv }); }
      else {
        const p = clickPts[0];
        const w = Math.abs(cu-p.u), h = Math.abs(cv-p.v);
        if (w > 0.5 && h > 0.5) {
          addEnt2D(mkEnt2D(activeBlock.viewKey, 'rect', { u:Math.min(p.u,cu), v:Math.min(p.v,cv), w, h, lw:0.35 }));
        }
        clickPts = [];
      }
      requestRender(); return;
    }

    // Circle
