    if (tool === 'circle') {
      if (clickPts.length === 0) { clickPts.push({ u:cu, v:cv }); }
      else {
        const p = clickPts[0];
        const r = Math.hypot(cu-p.u, cv-p.v);
        if (r > 0.5) addEnt2D(mkEnt2D(activeBlock.viewKey, 'circle', { cu:p.u, cv:p.v, r, lw:0.35 }));
        clickPts = [];
      }
      requestRender(); return;
    }

    // Select
    if (tool === 'select') {
      // Check grip handles first (only when something is selected)
      if (selected3D.length > 0) {
        const grip = hitTestGrip(activeBlock, px, py);
        if (grip) {
          if (grip.type === 'rotate') {
            // Enter rotation mode
            rotateMode = true;
            const b = getObj2DBounds(grip.obj, activeBlock);
            const mu = (b.u1 + b.u2) / 2, mv = (b.v1 + b.v2) / 2;
            rotatePivot = { u: mu, v: mv };
            const real = px2real(activeBlock, px, py);
            rotateStartAngle = Math.atan2(real.v - rotatePivot.v, real.u - rotatePivot.u);
            gripSnapshot = JSON.parse(JSON.stringify(grip.obj));
            activeGrip = grip;
            requestRender(); return;
          }
          // Start grip drag (resize/extend)
          activeGrip = grip;
          const real = px2real(activeBlock, px, py);
          gripStart = { u: real.u, v: real.v };
          gripSnapshot = JSON.parse(JSON.stringify(grip.obj));
          requestRender(); return;
        }
      }

      const hit = hitTest3D(activeBlock, px, py);
      if (hit) {
        if (e.shiftKey) {
          if (selected3D.includes(hit)) selected3D = selected3D.filter(s => s !== hit);
          else selected3D.push(hit);
        } else {
          if (!selected3D.includes(hit)) selected3D = [hit];
          const real = px2real(activeBlock, px, py);
          dragMoving = true;
          dragStart = { u: real.u, v: real.v };
          dragSnapshots = selected3D.map(o => JSON.parse(JSON.stringify(o)));
          snapOffsetU = 0; snapOffsetV = 0; snappedAxisU = false; snappedAxisV = false;
        }
      } else {
        if (!e.shiftKey) selected3D = [];
        const real = px2real(activeBlock, px, py);
        selBoxStart = [real.u, real.v];
      }
      requestRender(); return;
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    const { px, py } = getPixelXY(e);
    cursorSheet = { px, py };

    // 3D orbit handling
    if (v3dOrbiting) {
      v3dHandleOrbitMove(px, py);
      return;
    }

    // Cut line dragging
    if (draggingCutLine && activeBlock) {
      const real = px2real(activeBlock, px, py);
      if (draggingCutLine === 'secA') {
        secCutX = Math.round(real.u / gridSize) * gridSize; // snap to grid
      } else if (draggingCutLine === 'planB') {
        planCutY = Math.round(real.v / gridSize) * gridSize;
      }
      canvas.style.cursor = draggingCutLine === 'secA' ? 'ew-resize' : 'ns-resize';
      requestRender(); return;
    }

    // View box resize dragging
    if (blockResizing && blockResizeStart) {
      const sh = px2s(px, py);
      const dx = sh.x - blockResizeStart.sx;
      const dy = sh.y - blockResizeStart.sy;
      const h = blockResizing.handle;
      const blk = blockResizing.block;
      const oW = blockResizeStart.boxW, oH = blockResizeStart.boxH;
      const oX = blockResizeStart.sheetX, oY = blockResizeStart.sheetY;
      let newW = oW, newH = oH, newX = oX, newY = oY;
      // East edge: right side moves by dx, left side fixed → W grows, centre shifts right by dx/2
      if (h.includes('e')) { newW = Math.max(MIN_BOX_W, oW + dx); newX = oX + dx / 2; }
      // West edge: left side moves by dx, right side fixed → W shrinks, centre shifts right by dx/2
      if (h.includes('w')) { newW = Math.max(MIN_BOX_W, oW - dx); newX = oX + dx / 2; }
      // South edge: bottom moves by dy, top fixed
      if (h.includes('s')) { newH = Math.max(MIN_BOX_H, oH + dy); newY = oY + dy / 2; }
      // North edge: top moves by dy, bottom fixed
      if (h.includes('n')) { newH = Math.max(MIN_BOX_H, oH - dy); newY = oY + dy / 2; }
      blk.boxW = newW; blk.boxH = newH;
      blk.sheetX = newX; blk.sheetY = newY;
      canvas.style.cursor = resizeHandleCursor(h);
      requestRender(); return;
    }

    // Block dragging (border or label)
    if (blockDragging && blockDragOffset) {
      const sh = px2s(px, py);
      blockDragging.sheetX = sh.x - blockDragOffset.dx;
      blockDragging.sheetY = sh.y - blockDragOffset.dy;
      canvas.style.cursor = 'move';
      requestRender(); return;
    }

    if (isPanning && panLast) {
      viewport.panX += px - panLast.px;
      viewport.panY += py - panLast.py;
      panLast = { px, py };
      requestRender(); return;
    }

    // Grip drag (resize/extend)
    if (activeGrip && gripStart && !rotateMode && activeBlock) {
      const real = px2real(activeBlock, px, py);
      // Pass raw world coordinates — applyGripDrag handles rotation internally
      applyGripDrag(activeGrip, real.u, real.v);
      requestRender(); return;
    }

    // Rotation drag
    if (rotateMode && rotatePivot && activeGrip && activeBlock) {
      const real = px2real(activeBlock, px, py);
      const currentAngle = Math.atan2(real.v - rotatePivot.v, real.u - rotatePivot.u);
      const deltaAngle = (currentAngle - rotateStartAngle) * 180 / Math.PI;
      const baseRot = gripSnapshot.rot || 0;
      applyRotation(activeGrip.obj, baseRot + deltaAngle);
      requestRender(); return;
    }

    if (dragMoving && dragStart && activeBlock) {
      const real = px2real(activeBlock, px, py);
      const du = real.u - dragStart.u, dv = real.v - dragStart.v;
      const vk = activeBlock.viewKey;
      // Apply raw delta
      selected3D.forEach(obj => {
        if (vk === 'elevation') { obj.x += du; obj.y += dv; }
        else if (vk === 'sectionA') { obj.z += du; obj.y += dv; }
        else { obj.x += du; obj.z += dv; }
      });
      // Edge snap: check if any dragged edge is near a target face
      activeEdgeSnaps = applyEdgeSnap(selected3D, vk);
      dragStart = { u: real.u, v: real.v };
      requestRender(); return;
    }

    // Update cursor style for resize handles, border drag, grip hover, cut line hover
    if (tool === 'select' && activeBlock && !dragMoving) {
      // Priority: resize handle > border > grip > cut line > default
      const rh = hitTestResizeHandle(activeBlock, px, py);
      if (rh) { canvas.style.cursor = resizeHandleCursor(rh); }
      else if (hitTestBlockBorder(activeBlock, px, py)) { canvas.style.cursor = 'move'; }
      else if (selected3D.length > 0) {
        const grip = hitTestGrip(activeBlock, px, py);
        if (grip) { canvas.style.cursor = grip.cursor; }
        else if (activeBlock.viewKey === 'elevation') {
          const cutHover = hitTestCutLine(activeBlock, px, py);
          canvas.style.cursor = cutHover === 'secA' ? 'ew-resize' : cutHover === 'planB' ? 'ns-resize' : 'default';
        } else { canvas.style.cursor = 'default'; }
      } else if (activeBlock.viewKey === 'elevation') {
        const cutHover = hitTestCutLine(activeBlock, px, py);
        canvas.style.cursor = cutHover === 'secA' ? 'ew-resize' : cutHover === 'planB' ? 'ns-resize' : 'default';
      } else { canvas.style.cursor = 'default'; }
    }

    // Update active block on hover
    const hoverBlock = blockAtPixel(px, py);
    if (hoverBlock && !dragMoving && !isPanning && !activeGrip && !rotateMode) activeBlock = hoverBlock;

    // Reset tab-to-cycle when cursor moves significantly
    if (cycleHits.length > 0) {
      if (!cycleLastPx || Math.hypot(px - cycleLastPx.px, py - cycleLastPx.py) > 3) {
        cycleHits = []; cycleIndex = 0;
      }
    }
    cycleLastPx = { px, py };

    requestRender();
  });

  canvas.addEventListener('mouseup', (e) => {
    // Release orbit drag (but stay in orbit mode until Enter)
    if (v3dOrbiting) {
      v3dHandleOrbitUp();
      canvas.style.cursor = 'grab';
      return;
    }

    if (blockResizing) {
      blockResizing = null;
      blockResizeStart = null;
      canvas.style.cursor = 'default';
      requestRender();
      return;
    }
    if (blockDragging) {
      blockDragging = null;
      blockDragOffset = null;
      canvas.style.cursor = 'default';
      requestRender();
      return;
    }
    if (draggingCutLine) {
      draggingCutLine = null;
      canvas.style.cursor = 'default';
      requestRender();
      return;
    }
    if (isPanning) {
      isPanning = false; panLast = null;
      container.classList.remove('grabbing');
      return;
    }
    // Finish grip drag or rotation
    if (activeGrip) {
      if (gripSnapshot) {
        const before = [gripSnapshot];
        const after = [JSON.parse(JSON.stringify(activeGrip.obj))];
        undoStack.push({ act: 'moveObj', before, after });
        if (undoStack.length > 100) undoStack.shift();
        redoStack = [];
      }
      activeGrip = null; gripStart = null; gripSnapshot = null;
      rotateMode = false; rotatePivot = null; rotateStartAngle = null;
      canvas.style.cursor = 'default';
      if (typeof v3dMarkDirty === 'function') v3dMarkDirty();
      requestRender();
      return;
    }

    if (dragMoving) {
      if (dragSnapshots) {
        const after = selected3D.map(o => JSON.parse(JSON.stringify(o)));
        undoStack.push({ act: 'moveObj', before: dragSnapshots, after });
        if (undoStack.length > 100) undoStack.shift();
        redoStack = [];
      }
      dragMoving = false; dragStart = null; dragSnapshots = null;
      activeEdgeSnaps = [];
      snapOffsetU = 0; snapOffsetV = 0; snappedAxisU = false; snappedAxisV = false;
      if (typeof v3dMarkDirty === 'function') v3dMarkDirty();
      return;
    }
    if (selBoxStart && activeBlock) {
      const { px, py } = getPixelXY(e);
      const real = px2real(activeBlock, px, py);
      const u1 = Math.min(selBoxStart[0], real.u), u2 = Math.max(selBoxStart[0], real.u);
      const v1 = Math.min(selBoxStart[1], real.v), v2 = Math.max(selBoxStart[1], real.v);
      if (u2 - u1 > 2 || v2 - v1 > 2) {
        const crossing = real.u < selBoxStart[0];
        const hits = objects3D.filter(obj => {
          const b = getObj2DBounds(obj, activeBlock);
          if (!b) return false;
          if (crossing) return b.u1 <= u2 && b.u2 >= u1 && b.v1 <= v2 && b.v2 >= v1;
          return b.u1 >= u1 && b.u2 <= u2 && b.v1 >= v1 && b.v2 <= v2;
        });
        selected3D = e.shiftKey ? [...selected3D, ...hits] : hits;
      }
      selBoxStart = null;
      requestRender();
    }
  });

  canvas.addEventListener('dblclick', (e) => {
    if (tool === 'polyline' && polyPts.length >= 2) { finishPolyline(); return; }
    if (tool === 'draw-plate' && platePts.length >= 3) {
      // Remove the last point (added by the mousedown of the dblclick)
      platePts.pop();
      finishDrawPlate();
      return;
    }

    // Double-click on view label: toggle hidden, or start drag
    const { px, py } = getPixelXY(e);
    const labelBlock = hitTestViewLabel(px, py);
    if (labelBlock) {
      if (e.shiftKey) {
        // Shift + double-click: toggle hide/show
        labelBlock.hidden = !labelBlock.hidden;
        requestRender();
      } else if (labelBlock.hidden) {
        // Double-click hidden label: unhide
        labelBlock.hidden = false;
        requestRender();
      } else if (labelBlock.viewKey === 'isometric') {
        // Double-click ISOMETRIC label: enter orbit mode
        v3dStartOrbit(px, py);
        canvas.style.cursor = 'grab';
      } else {
        // Double-click visible label: enter block drag mode
        blockDragging = labelBlock;
        const sh = px2s(px, py);
        blockDragOffset = { dx: sh.x - labelBlock.sheetX, dy: sh.y - labelBlock.sheetY };
        canvas.style.cursor = 'move';
        requestRender();
      }
      return;
    }
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const { px, py } = getPixelXY(e);
    // Get sheet coords before zoom
    const before = px2s(px, py);
    let f;
    if (e.ctrlKey) f = Math.pow(2, -e.deltaY * 0.005);
    else f = e.deltaY > 0 ? 0.97 : 1.03;
    viewport.zoom = Math.max(0.1, Math.min(50, viewport.zoom * f));
    // Adjust pan so the point under the cursor stays put
    const after = s2px(before.x, before.y);
    viewport.panX += px - after.x;
    viewport.panY += py - after.y;
    requestRender();
  }, { passive: false });

  canvas.addEventListener('contextmenu', e => e.preventDefault());
}

// ============================================================
// COMPONENT PLACEMENT
// ============================================================

function placeComponent(blk, cu, cv) {
  if (!placing) return;
  const pos = blk.unproject(cu, cv);
  const x = pos.x !== undefined ? pos.x : 0;
  const y = pos.y !== undefined ? pos.y : 0;
  const z = pos.z !== undefined ? pos.z : 0;

  if (placing.type === 'ub') addObj(mkObj('ub', { section:placing.section, x, y, z, length:placing.length||600, rot:0 }));
  else if (placing.type === 'shs') addObj(mkObj('shs', { section:placing.section, x, y, z, length:placing.length||500, rot:90 }));
  else if (placing.type === 'plate') addObj(mkObj('plate', { x, y, z, pw:placing.pw, ph:placing.ph, pt:placing.pt }));
  else if (placing.type === 'bolt') addObj(mkObj('bolt', { boltSize:placing.boltSize, x, y, z }));
}

// ============================================================
// TWO-CLICK DRAW-MEMBER PLACEMENT
// ============================================================

function finishDrawMember(blk, startU, startV, endU, endV) {
  if (!drawMember) return;

  // Compute midpoint, length, and rotation from the two click points
  const midU = (startU + endU) / 2;
  const midV = (startV + endV) / 2;
  const du = endU - startU;
  const dv = endV - startV;
  const length = Math.hypot(du, dv);
  const rotRad = Math.atan2(dv, du);  // angle from horizontal
  const rotDeg = rotRad * 180 / Math.PI;

  // Unproject midpoint to 3D — assigns depth from section cut positions
  const pos = blk.unproject(midU, midV);
  let x = pos.x !== undefined ? pos.x : 0;
  let y = pos.y !== undefined ? pos.y : 0;
  let z = pos.z !== undefined ? pos.z : 0;

  // View-aware depth: fill in the missing axis from the cut-line positions
  if (blk.viewKey === 'elevation') {
    z = secCutX !== undefined ? 0 : 0;  // elevation shows X,Y — Z is depth
  } else if (blk.viewKey === 'sectionA') {
    x = secCutX;  // section shows Z,Y — X is depth (use section cut X)
  } else if (blk.viewKey === 'planB') {
    y = planCutY;  // plan shows X,Z — Y is depth (use plan cut Y)
  }

  let newObj = null;
  if (drawMember.type === 'ub') {
    if (length < 5) return; // too short, ignore
    newObj = mkObj('ub', { section: drawMember.section, x, y, z, length: Math.round(length), rot: Math.round(rotDeg * 10) / 10 });
  } else if (drawMember.type === 'shs') {
    if (length < 5) return;
    newObj = mkObj('shs', { section: drawMember.section, x, y, z, length: Math.round(length), rot: Math.round(rotDeg * 10) / 10 });
  } else if (drawMember.type === 'plate') {
    // For plates: startU/V to endU/V defines a diagonal rectangle
    // Width = distance along drawn line, height = plate height from dialog
    if (length < 2) return;
    // Place plate at midpoint with rotation
    newObj = mkObj('plate', { x, y, z, pw: Math.round(length), ph: drawMember.ph, pt: drawMember.pt, rot: Math.round(rotDeg * 10) / 10 });
  } else if (drawMember.type === 'bolt') {
    // Bolt: single click placement at start point (no length/rotation needed)
    const bPos = blk.unproject(startU, startV);
    const bx = bPos.x !== undefined ? bPos.x : 0;
    const by = bPos.y !== undefined ? bPos.y : 0;
    const bz = bPos.z !== undefined ? bPos.z : 0;
    newObj = mkObj('bolt', { boltSize: drawMember.boltSize, x: bx, y: by, z: bz });
  }

  if (newObj) {
    addObj(newObj);
    // Auto-select the newly placed member
    selected3D = [newObj];
    updatePropsPanel();
    requestRender();
  }

  // Reset draw state but keep drawMember active for chained drawing
  drawStart = null;
  drawPreviewEnd = null;
}

// ============================================================
// POLYGON PLATE COMPLETION
// ============================================================

function finishDrawPlate() {
  if (platePts.length < 3 || !plateBlock) {
    platePts = []; plateBlock = null; plateDimInput = ''; plateDimActive = false;
    requestRender(); return;
  }

  // Prompt for thickness
  const thkStr = prompt('Plate thickness (mm):', '12');
  if (!thkStr) {
    platePts = []; plateBlock = null; plateDimInput = ''; plateDimActive = false;
    requestRender(); return;
  }
  const pt = parseFloat(thkStr) || 12;

  // Determine which axis is the normal (thickness direction)
  const vk = plateBlock.viewKey;
  let normal = 'z'; // default for elevation (X,Y plane → thickness in Z)
  if (vk === 'sectionA') normal = 'x';  // Z,Y plane → thickness in X
  else if (vk === 'planB') normal = 'y'; // X,Z plane → thickness in Y

  // Determine depth position (the coordinate along the normal axis)
  let depthPos = 0;
  if (vk === 'elevation') depthPos = 0;
  else if (vk === 'sectionA') depthPos = secCutX;
  else if (vk === 'planB') depthPos = planCutY;

  // Convert view-local u,v to world coords
  const worldPts = platePts.map(p => {
    const pos = plateBlock.unproject(p.u, p.v);
    return {
      x: pos.x !== undefined ? pos.x : depthPos,
      y: pos.y !== undefined ? pos.y : depthPos,
      z: pos.z !== undefined ? pos.z : depthPos
    };
  });

  // Compute centroid
  let cx = 0, cy = 0, cz = 0;
  worldPts.forEach(p => { cx += p.x; cy += p.y; cz += p.z; });
  cx /= worldPts.length; cy /= worldPts.length; cz /= worldPts.length;

  // Store polygon as offsets from centroid (so moving works by updating x,y,z)
  const polyRel = worldPts.map(p => ({
    dx: p.x - cx, dy: p.y - cy, dz: p.z - cz
  }));

  const newObj = mkObj('plate', {
    x: cx, y: cy, z: cz,
    polyPts: polyRel,
    pt: pt,
    normal: normal
  });

  addObj(newObj);
  selected3D = [newObj];
  updatePropsPanel();

  // Reset and stay in draw-plate mode for next plate
  platePts = []; plateBlock = null; plateDimInput = ''; plateDimActive = false;
  requestRender();
}

// ============================================================
// TOOL STATE
// ============================================================

function setTool(t) {
  clickPts = []; polyPts = [];
  dimStep = 0; dimP1 = null; dimP2 = null; dimType = 'horizontal';
  placing = null; drawMember = null; drawStart = null; drawPreviewEnd = null;
  platePts = []; plateBlock = null; plateDimInput = ''; plateDimActive = false;
  boltGroupConfig = null; weldStep = 0; weldP1 = null;
  cycleHits = []; cycleIndex = 0;
  tool = t;
  canvas.style.cursor = t === 'select' ? 'default' : 'crosshair';
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const map = { select:'toolSelect', line:'toolLine', rect:'toolRect',
    circle:'toolCircle', polyline:'toolPolyline', dimension:'toolDim', text:'toolText' };
  if (map[t]) document.getElementById(map[t])?.classList.add('active');
  requestRender();
}

function cancelDraw() {
  clickPts = []; polyPts = [];
  dimStep = 0; dimP1 = null; dimP2 = null;
  placing = null;
  drawMember = null; drawStart = null; drawPreviewEnd = null;
  platePts = []; plateBlock = null; plateDimInput = ''; plateDimActive = false;
  boltGroupConfig = null; weldStep = 0; weldP1 = null;
  requestRender();
}

function finishPolyline() {
  if (polyPts.length < 2) { polyPts = []; requestRender(); return; }
  const vk = activeBlock ? activeBlock.viewKey : 'elevation';
  for (let i = 0; i < polyPts.length - 1; i++) {
    addEnt2D(mkEnt2D(vk, 'line', { u1:polyPts[i].u, v1:polyPts[i].v, u2:polyPts[i+1].u, v2:polyPts[i+1].v, lw:0.35 }));
  }
  polyPts = [];
  requestRender();
}

// ============================================================
// KEYBOARD
// ============================================================

function initKeyboard() {
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ') { spaceHeld = true; e.preventDefault(); return; }
    if (e.key === 'Shift') { shiftHeld = true; requestRender(); return; }
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

    // ---- TAB-TO-CYCLE SELECTION ----
    if (e.key === 'Tab' && tool === 'select' && activeBlock && cursorSheet) {
      e.preventDefault();
      if (cycleHits.length === 0) {
        cycleHits = hitTestAll3D(activeBlock, cursorSheet.px, cursorSheet.py);
        cycleIndex = 0;
      } else {
        cycleIndex = (cycleIndex + 1) % cycleHits.length;
      }
      if (cycleHits.length > 0) {
        selected3D = [cycleHits[cycleIndex]];
        requestRender();
      }
      return;
    }

    // ---- CTRL+S SAVE / CTRL+O LOAD ----
    if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
      e.preventDefault(); saveProject(); return;
    }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'o' || e.key === 'O')) {
      e.preventDefault(); document.getElementById('fileInput').click(); return;
    }

    // ---- CTRL+D DUPLICATE / CTRL+SHIFT+D MIRROR ----
    if ((e.ctrlKey || e.metaKey) && (e.key === 'd' || e.key === 'D') && selected3D.length > 0) {
      e.preventDefault();
      if (e.shiftKey) {
        // Mirror about vertical axis through selection centroid
        let cx = 0; selected3D.forEach(o => cx += o.x); cx /= selected3D.length;
        const before = selected3D.map(o => JSON.parse(JSON.stringify(o)));
        selected3D.forEach(o => {
          o.x = 2 * cx - o.x;
          if (o.rot) o.rot = (360 - o.rot) % 360;
          if (o.polyPts) o.polyPts.forEach(p => p.dx = -p.dx);
        });
        const after = selected3D.map(o => JSON.parse(JSON.stringify(o)));
        undoStack.push({ act:'moveObj', before, after });
        if (undoStack.length > 100) undoStack.shift(); redoStack = [];
      } else {
        // Duplicate with 30mm offset
        const pasted = [];
        selected3D.forEach(orig => {
          const o = JSON.parse(JSON.stringify(orig));
          o.id = objIdN++; o.x = (o.x || 0) + 30; o.y = (o.y || 0) + 30;
          addObj(o); pasted.push(objects3D[objects3D.length - 1]);
        });
        selected3D = pasted;
      }
      if (typeof v3dMarkDirty === 'function') v3dMarkDirty();
      requestRender(); return;
    }

    // ---- DIM TYPE TOGGLE (while in dimension tool) ----
    if (tool === 'dimension' && dimStep >= 0) {
      if (e.key === 'a' || e.key === 'A') { dimType = 'aligned'; requestRender(); e.preventDefault(); return; }
      if (e.key === 'h' || e.key === 'H') { dimType = 'horizontal'; requestRender(); e.preventDefault(); return; }
      if (e.key === 'n' || e.key === 'N') { dimType = 'angular'; requestRender(); e.preventDefault(); return; }
    }

    if (e.key === 'v' || e.key === 'V') setTool('select');
    if (e.key === 'l' || e.key === 'L') setTool('line');
    if (e.key === 'c' || e.key === 'C') setTool('circle');
    if (e.key === 'p' || e.key === 'P') setTool('polyline');
    if (e.key === 'd' || e.key === 'D') setTool('dimension');
    if (e.key === 't' || e.key === 'T') setTool('text');

    // R key: rotate selected object (prompt for angle), or Rect tool if nothing selected
    if (e.key === 'r' || e.key === 'R') {
      if (selected3D.length > 0 && tool === 'select') {
        const input = prompt('Enter rotation angle (degrees):', '0');
        if (input !== null) {
          const angle = parseFloat(input);
          if (!isNaN(angle)) {
            const before = selected3D.map(o => JSON.parse(JSON.stringify(o)));
            selected3D.forEach(obj => {
              if (obj.type === 'ub' || obj.type === 'shs') {
                obj.rot = angle % 360;
              }
            });
            const after = selected3D.map(o => JSON.parse(JSON.stringify(o)));
            undoStack.push({ act: 'moveObj', before, after });
            if (undoStack.length > 100) undoStack.shift();
            redoStack = [];
          }
        }
        requestRender(); e.preventDefault();
      } else {
        setTool('rect');
      }
    }

    if (e.key === 'F3') { snapOn = !snapOn; document.getElementById('btnSnap').classList.toggle('active', snapOn); e.preventDefault(); }
    if (e.key === 'F8') { orthoOn = !orthoOn; document.getElementById('btnOrtho').classList.toggle('active', orthoOn); e.preventDefault(); }
    if (e.key === 'g' || e.key === 'G') { gridOn = !gridOn; document.getElementById('btnGrid').classList.toggle('active', gridOn); requestRender(); }
    if (e.key === 'f' || e.key === 'F') { fitToView(); e.preventDefault(); }

    // Dynamic dimension input for draw-plate and draw-member
    if ((tool === 'draw-plate' && platePts.length > 0) || (tool === 'draw-member' && drawStart)) {
      // Number keys, decimal point, minus, Backspace for dimension input
      if (/^[0-9.]$/.test(e.key)) {
        plateDimInput += e.key;
        plateDimActive = true;
        requestRender(); e.preventDefault(); return;
      }
      if (e.key === 'Backspace' && plateDimActive) {
        plateDimInput = plateDimInput.slice(0, -1);
        if (plateDimInput.length === 0) plateDimActive = false;
        requestRender(); e.preventDefault(); return;
      }
      if (e.key === 'Enter' && plateDimActive && plateDimInput) {
        const len = parseFloat(plateDimInput);
        if (len > 0 && tool === 'draw-plate' && platePts.length > 0 && cursorSheet && plateBlock) {
          // Place point at exact typed length from last point
          const [cu, cv] = getCursor(plateBlock);
          const last = platePts[platePts.length - 1];
          const du = cu - last.u, dv = cv - last.v;
          const angle = Math.atan2(dv, du);
          platePts.push({ u: last.u + Math.cos(angle) * len, v: last.v + Math.sin(angle) * len });
          plateDimInput = ''; plateDimActive = false;
          requestRender(); e.preventDefault(); return;
        }
        if (len > 0 && tool === 'draw-member' && drawStart && activeBlock) {
          // Place member at exact typed length from start point
          const [cu, cv] = getCursor(activeBlock);
          const du = cu - drawStart.cu, dv = cv - drawStart.cv;
          const angle = Math.atan2(dv, du);
          const endU = drawStart.cu + Math.cos(angle) * len;
          const endV = drawStart.cv + Math.sin(angle) * len;
          finishDrawMember(drawStart.blk, drawStart.cu, drawStart.cv, endU, endV);
          plateDimInput = ''; plateDimActive = false;
          requestRender(); e.preventDefault(); return;
        }
      }
    }

    if (e.key === 'Escape') {
      if (tool === 'draw-plate' && platePts.length > 0) {
        // Cancel current plate polygon but stay in draw-plate mode
        platePts = []; plateBlock = null; plateDimInput = ''; plateDimActive = false;
        requestRender();
      } else if (tool === 'draw-plate') {
        cancelDraw(); setTool('select');
      } else if (drawStart && drawMember) {
        drawStart = null; drawPreviewEnd = null; requestRender();
      } else if (drawMember) {
        cancelDraw(); setTool('select');
      } else if (clickPts.length > 0 || polyPts.length > 0 || dimStep > 0 || placing) {
        cancelDraw();
      } else if (selected3D.length > 0) { selected3D = []; requestRender(); }
      else setTool('select');
    }

    if (e.key === 'Enter' && tool === 'draw-plate' && platePts.length >= 3 && !plateDimActive) {
      // Enter also closes the plate polygon (alternative to double-click)
      finishDrawPlate();
    }
    if (e.key === 'Enter' && tool === 'polyline' && polyPts.length >= 2) finishPolyline();

    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (selected3D.length > 0) {
        [...selected3D].forEach(obj => delObj(obj.id));
        selected3D = []; requestRender();
      }
    }

    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { undo(); e.preventDefault(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'y') { redo(); e.preventDefault(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'a') { selected3D = [...objects3D]; requestRender(); e.preventDefault(); }

    if ((e.ctrlKey || e.metaKey) && e.key === 'c' && !e.shiftKey) {
      if (selected3D.length > 0) { clipboardObjs = selected3D.map(o => JSON.parse(JSON.stringify(o))); e.preventDefault(); }
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'v' && !e.shiftKey) {
      if (clipboardObjs && clipboardObjs.length > 0) { pasteObjects(); e.preventDefault(); }
    }

    // Arrow keys: nudge
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key) && selected3D.length > 0 && activeBlock) {
      const n = e.shiftKey ? 1 : (e.ctrlKey ? 50 : nudgeSize);
      const before = selected3D.map(o => JSON.parse(JSON.stringify(o)));
      const vk = activeBlock.viewKey;
      selected3D.forEach(obj => {
        if (vk === 'elevation') {
          if (e.key === 'ArrowLeft') obj.x -= n; if (e.key === 'ArrowRight') obj.x += n;
          if (e.key === 'ArrowUp') obj.y += n; if (e.key === 'ArrowDown') obj.y -= n;
        } else if (vk === 'sectionA') {
          if (e.key === 'ArrowLeft') obj.z -= n; if (e.key === 'ArrowRight') obj.z += n;
          if (e.key === 'ArrowUp') obj.y += n; if (e.key === 'ArrowDown') obj.y -= n;
        } else {
          if (e.key === 'ArrowLeft') obj.x -= n; if (e.key === 'ArrowRight') obj.x += n;
          if (e.key === 'ArrowUp') obj.z += n; if (e.key === 'ArrowDown') obj.z -= n;
        }
      });
      const after = selected3D.map(o => JSON.parse(JSON.stringify(o)));
      undoStack.push({ act:'moveObj', before, after });
      if (undoStack.length > 100) undoStack.shift();
      redoStack = [];
      e.preventDefault(); requestRender();
    }
  });

  document.addEventListener('keyup', (e) => {
    if (e.key === ' ') spaceHeld = false;
    if (e.key === 'Shift') { shiftHeld = false; requestRender(); }
  });
}

// ============================================================
// PASTE
// ============================================================

function pasteObjects() {
  if (!clipboardObjs || !clipboardObjs.length) return;
  const offset = 30;
  const pasted = [];
  clipboardObjs.forEach(orig => {
    const o = JSON.parse(JSON.stringify(orig));
    o.id = objIdN++;
    o.x = (o.x || 0) + offset;
    o.y = (o.y || 0) + offset;
    addObj(o);
    pasted.push(objects3D[objects3D.length - 1]);
  });
  selected3D = pasted;
  requestRender();
}

// ============================================================
// SAVE / LOAD PROJECT (JSON)
// ============================================================

function saveProject() {
  const data = {
    version: '1.0',
    timestamp: new Date().toISOString(),
    drawingScale, gridSize, nudgeSize, secCutX, planCutY,
    objects3D: objects3D,
    entities2D: entities2D,
    blocks: blocks.map(b => ({ viewKey: b.viewKey, sheetX: b.sheetX, sheetY: b.sheetY, boxW: b.boxW, boxH: b.boxH, hidden: b.hidden }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `structdraw-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function loadProject(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      objects3D = data.objects3D || [];
      entities2D = data.entities2D || { elevation: [], sectionA: [], planB: [] };
      // Restore settings
      if (data.drawingScale) { drawingScale = data.drawingScale; document.getElementById('scaleSelect').value = drawingScale; }
      if (data.gridSize) { gridSize = data.gridSize; document.getElementById('gridSizeSelect').value = gridSize; }
      if (data.nudgeSize) { nudgeSize = data.nudgeSize; document.getElementById('nudgeSizeSelect').value = nudgeSize; }
      if (data.secCutX !== undefined) secCutX = data.secCutX;
      if (data.planCutY !== undefined) planCutY = data.planCutY;
      // Restore block positions
      if (data.blocks) {
        data.blocks.forEach(sb => {
          const blk = blocks.find(b => b.viewKey === sb.viewKey);
          if (blk) { blk.sheetX = sb.sheetX; blk.sheetY = sb.sheetY; if (sb.boxW) blk.boxW = sb.boxW; if (sb.boxH) blk.boxH = sb.boxH; if (sb.hidden !== undefined) blk.hidden = sb.hidden; }
        });
      }
      // Recalculate ID counters to avoid collisions
      objIdN = objects3D.reduce((m, o) => Math.max(m, o.id || 0), 0) + 1;
      const allEnts = [...entities2D.elevation, ...entities2D.sectionA, ...entities2D.planB];
      ent2dIdN = allEnts.reduce((m, e) => Math.max(m, e.id || 0), 0) + 1;
      // Reset state
      selected3D = []; undoStack = []; redoStack = [];
      if (typeof v3dMarkDirty === 'function') v3dMarkDirty();
      fitToView(); requestRender();
    } catch (err) {
      alert('Error loading file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ============================================================
// STATUS BAR
// ============================================================

function updateStatus() {
  const blk = activeBlock;
  const labels = { elevation: 'Elevation', sectionA: 'Section A', planB: 'Plan B' };
  document.getElementById('statusView').textContent = blk ? labels[blk.viewKey] : 'Sheet';

  if (blk && cursorSheet) {
    const [cu, cv] = getCursor(blk);
    if (blk.viewKey === 'elevation') {
      document.getElementById('statusX').textContent = cu.toFixed(1);
      document.getElementById('statusY').textContent = cv.toFixed(1);
      document.getElementById('statusZ').textContent = '-';
    } else if (blk.viewKey === 'sectionA') {
      document.getElementById('statusX').textContent = '-';
      document.getElementById('statusY').textContent = cv.toFixed(1);
      document.getElementById('statusZ').textContent = cu.toFixed(1);
    } else {
      document.getElementById('statusX').textContent = cu.toFixed(1);
      document.getElementById('statusY').textContent = '-';
      document.getElementById('statusZ').textContent = cv.toFixed(1);
    }
  }

  document.getElementById('statusScale').textContent = `1:${drawingScale}`;

  let toolLabel = tool.charAt(0).toUpperCase() + tool.slice(1);
  if (tool === 'place-component' && placing) toolLabel = 'Place ' + (placing.section || placing.boltSize || 'Plate');
  if (tool === 'draw-member' && drawMember) {
    const name = drawMember.section || drawMember.boltSize || 'Plate';
    toolLabel = drawStart ? `Draw ${name}: pick end point` : `Draw ${name}: pick start point`;
  }
  if (tool === 'draw-plate') {
    if (platePts.length === 0) toolLabel = 'Plate: pick first corner';
    else if (platePts.length < 3) toolLabel = `Plate: ${platePts.length} pts — keep clicking`;
    else toolLabel = `Plate: ${platePts.length} pts — dbl-click/Enter to close`;
  }
  if (tool === 'polyline' && polyPts.length > 0) toolLabel = `Polyline (${polyPts.length} pts)`;
  if (tool === 'dimension') {
    const dtLabel = dimType === 'aligned' ? 'Aligned' : dimType === 'angular' ? 'Angular' : 'Horiz';
    const steps = dimType === 'angular' ? ['Vertex', 'Ray 1', 'Ray 2'] : ['Pick 1st', 'Pick 2nd', 'Offset'];
    toolLabel = `Dim (${dtLabel}): ${steps[dimStep]} [A/H/N]`;
  }
  if (tool === 'place-bolt-group') toolLabel = 'Bolt Group: click to place';
  if (tool === 'draw-weld') toolLabel = weldStep === 0 ? 'Weld: pick joint point' : 'Weld: pick direction';
  if (tool === 'draw-breakline') toolLabel = clickPts.length === 0 ? 'Break Line: pick start' : 'Break Line: pick end';
  if (tool === 'draw-centreline') toolLabel = clickPts.length === 0 ? 'Centreline: pick start' : 'Centreline: pick end';
  document.getElementById('statusTool').textContent = toolLabel;

  document.getElementById('prop3DCount').textContent = objects3D.length;
  const ent2dTotal = entities2D.elevation.length + entities2D.sectionA.length + entities2D.planB.length;
  document.getElementById('prop2DCount').textContent = ent2dTotal;
  document.getElementById('propSelectedCount').textContent = selected3D.length;

  // Properties
  if (selected3D.length === 1) {
    const o = selected3D[0];
    let selLabel = o.type.toUpperCase() + (o.section ? ' — ' + o.section : o.boltSize ? ' — ' + o.boltSize : '');
    if (o.type === 'bolt') {
      const grip = o.grip || computeBoltGrip(o);
      const bl = o.boltLength || computeBoltLength(grip, o.boltSize || 'M20');
      selLabel += ` | Grip:${grip.toFixed(0)} L:${bl}`;
    }
    document.getElementById('propSelection').textContent = selLabel;
    document.getElementById('propX').value = (o.x || 0).toFixed(0);
    document.getElementById('propY').value = (o.y || 0).toFixed(0);
    document.getElementById('propZ').value = (o.z || 0).toFixed(0);
    if (o.pw !== undefined) {
      document.getElementById('propW').value = o.pw;
      document.getElementById('propH').value = o.ph;
      document.getElementById('propD').value = o.pt;
    } else if (o.length !== undefined) {
      document.getElementById('propW').value = '';
      document.getElementById('propH').value = '';
      document.getElementById('propD').value = o.length;
    } else if (o.type === 'bolt') {
      const grip = o.grip || computeBoltGrip(o);
      const bl = o.boltLength || computeBoltLength(grip, o.boltSize || 'M20');
      document.getElementById('propW').value = 'G:' + grip.toFixed(0);
      document.getElementById('propH').value = 'L:' + bl;
      document.getElementById('propD').value = '';
    } else {
      document.getElementById('propW').value = '';
      document.getElementById('propH').value = '';
      document.getElementById('propD').value = '';
    }
  } else {
    document.getElementById('propSelection').textContent = selected3D.length > 0 ? `${selected3D.length} selected` : 'None';
    ['propX','propY','propZ','propW','propH','propD'].forEach(id => document.getElementById(id).value = '');
  }

  const pp = document.getElementById('propsPanel');
  if (pp) pp.classList.toggle('visible', selected3D.length > 0);
}

  document.getElementById('toolRect').addEventListener('click', () => setTool('rect'));
  document.getElementById('toolCircle').addEventListener('click', () => setTool('circle'));
  document.getElementById('toolPolyline').addEventListener('click', () => setTool('polyline'));
  document.getElementById('toolDim').addEventListener('click', () => setTool('dimension'));
  document.getElementById('toolText').addEventListener('click', () => setTool('text'));

  document.getElementById('btnSnap').addEventListener('click', () => {
    snapOn = !snapOn; document.getElementById('btnSnap').classList.toggle('active', snapOn);
  });
  document.getElementById('btnOrtho').addEventListener('click', () => {
    orthoOn = !orthoOn; document.getElementById('btnOrtho').classList.toggle('active', orthoOn);
  });
  document.getElementById('btnGrid').addEventListener('click', () => {
    gridOn = !gridOn; document.getElementById('btnGrid').classList.toggle('active', gridOn); requestRender();
  });

  document.getElementById('btnUndo').addEventListener('click', undo);
  document.getElementById('btnRedo').addEventListener('click', redo);

  document.getElementById('btnZoomFit').addEventListener('click', fitToView);

  document.getElementById('btnExportPDF').addEventListener('click', () => {
    document.getElementById('exportTitle').textContent = 'Export to PDF';
    document.getElementById('exportMessage').textContent = 'PDF export coming in next build!';
    document.getElementById('exportDialog').classList.add('visible');
  });
  document.getElementById('btnExportDXF').addEventListener('click', () => {
    document.getElementById('exportTitle').textContent = 'Export to DXF';
    document.getElementById('exportMessage').textContent = 'DXF export coming in next build!';
    document.getElementById('exportDialog').classList.add('visible');
  });

  document.getElementById('scaleSelect').addEventListener('change', (e) => {
    drawingScale = parseFloat(e.target.value);
    // Reposition blocks for new scale
    layoutBlocks();
    requestRender();
  });
  document.getElementById('gridSizeSelect').addEventListener('change', (e) => {
    gridSize = parseFloat(e.target.value); requestRender();
  });
  document.getElementById('nudgeSizeSelect').addEventListener('change', (e) => {
    nudgeSize = parseFloat(e.target.value);
  });

  document.getElementById('themeBtn').addEventListener('click', () => {
    const isDark = document.body.classList.contains('theme-dark');
    document.body.classList.toggle('theme-dark', !isDark);
    document.body.classList.toggle('theme-classic', isDark);
    document.getElementById('themeBtn').textContent = isDark ? 'Dark' : 'Classic';
    requestRender();
  });

  // Save/Load buttons
  document.getElementById('btnSave').addEventListener('click', saveProject);
  document.getElementById('btnLoad').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', (e) => {
    if (e.target.files.length > 0) { loadProject(e.target.files[0]); e.target.value = ''; }
  });

  // Bolt group dialog OK
  document.getElementById('bgOkBtn').addEventListener('click', () => {
    boltGroupConfig = {
      boltSize: document.getElementById('bgSize').value,
      rows: parseInt(document.getElementById('bgRows').value) || 2,
      cols: parseInt(document.getElementById('bgCols').value) || 4,
      gauge: parseFloat(document.getElementById('bgGauge').value) || 70,
      pitch: parseFloat(document.getElementById('bgPitch').value) || 140,
    };
    document.getElementById('boltGroupDialog').classList.remove('visible');
    tool = 'place-bolt-group'; canvas.style.cursor = 'crosshair';
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    updateStatus();
  });

  // Properties write-back
  ['propX', 'propY', 'propZ'].forEach(id => {
    document.getElementById(id).addEventListener('change', (ev) => {
      if (selected3D.length !== 1) return;
      const o = selected3D[0];
      const val = parseFloat(ev.target.value);
      if (isNaN(val)) return;
      if (id === 'propX') o.x = val;
      else if (id === 'propY') o.y = val;
      else o.z = val;
      requestRender();
    });
  });

  document.getElementById('btnSnap').classList.toggle('active', snapOn);
  document.getElementById('btnGrid').classList.toggle('active', gridOn);
}

// ============================================================
// FIT VIEW & LAYOUT
// ============================================================

function fitToView() {
  const padding = 60;
  const zoomX = (W - padding * 2) / SHEET.W;
  const zoomY = (H - padding * 2) / SHEET.H;
  viewport.zoom = Math.min(zoomX, zoomY);
  viewport.panX = (W - SHEET.W * viewport.zoom) / 2;
  viewport.panY = (H - SHEET.H * viewport.zoom) / 2;
  requestRender();
}

function layoutBlocks() {
  // Position the four detail blocks on the A1 sheet with generous spacing.
  // Elevation gets the largest area (top-left ~55%), Section A top-right,
  // Plan B bottom-left, Isometric bottom-right.
  const gap = 8; // sheet-mm gap between blocks

  // Elevation: large box, top-left
  const elevW = DA.width * 0.55;
  const elevH = DA.height * 0.55;
  blocks[0].boxW = elevW;
  blocks[0].boxH = elevH;
  blocks[0].sheetX = DA.left + elevW / 2 + gap;
  blocks[0].sheetY = DA.top + elevH / 2 + gap;

  // Section A: top-right, same height as elevation, narrower
  const secW = DA.width - elevW - gap * 3;
  const secH = elevH;
  blocks[1].boxW = secW;
  blocks[1].boxH = secH;
  blocks[1].sheetX = DA.left + elevW + gap * 2 + secW / 2;
  blocks[1].sheetY = DA.top + secH / 2 + gap;

  // Plan B: bottom-left, same width as elevation, shorter
  const planH = DA.height - elevH - gap * 3;
  blocks[2].boxW = elevW;
  blocks[2].boxH = planH;
  blocks[2].sheetX = DA.left + elevW / 2 + gap;
  blocks[2].sheetY = DA.top + elevH + gap * 2 + planH / 2;

  // Isometric: bottom-right
  if (blocks.length > 3) {
    blocks[3].boxW = secW;
    blocks[3].boxH = planH;
    blocks[3].sheetX = DA.left + elevW + gap * 2 + secW / 2;
    blocks[3].sheetY = DA.top + elevH + gap * 2 + planH / 2;
  }
}

// ============================================================
// RESIZE
// ============================================================

function resize() {
  const rect = container.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  requestRender();
}

// ============================================================
// 3D ISOMETRIC VIEW ENGINE (Three.js r128)
// Renders to an offscreen canvas, then blits into the 2D sheet
// as a 4th detail block at true 1:10 scale using OrthographicCamera.
// ============================================================

let v3dScene, v3dCamera, v3dRenderer, v3dGroup;
let v3dDirty = true;
let v3dOpts = { edges: true, transparent: false, wireframe: false };

// Orbit angle only — no zoom (scale is locked to drawingScale)
let v3dOrbit = { theta: Math.PI * 0.25, phi: Math.PI * 0.35 };
let v3dOrbiting = false;  // true when user is orbiting
let v3dOrbitDrag = null;   // { x, y, theta, phi }

// ---- Materials ----
let v3dMatSteel, v3dMatPlate, v3dMatBolt, v3dMatEdge;

// Offscreen render resolution (pixels) — re-calculated on each render
let v3dTexW = 512, v3dTexH = 512;

function v3dInit() {
  v3dScene = new THREE.Scene();
  v3dScene.background = null; // transparent

  // Orthographic camera — frustum set per-render to match 1:10 scale
  v3dCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100000);

  v3dRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, premultipliedAlpha: false });
  v3dRenderer.setClearColor(0x000000, 0);
  v3dRenderer.setPixelRatio(1); // we control resolution ourselves

  // Lighting
  const amb = new THREE.AmbientLight(0xffffff, 0.5);
  v3dScene.add(amb);
  const dir1 = new THREE.DirectionalLight(0xffffff, 0.7);
  dir1.position.set(300, 500, 400);
  v3dScene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0xffffff, 0.25);
  dir2.position.set(-200, -100, -300);
  v3dScene.add(dir2);

  // Geometry group
  v3dGroup = new THREE.Group();
  v3dScene.add(v3dGroup);

  // Materials
  v3dMatSteel = new THREE.MeshStandardMaterial({
    color: 0xb0b0b0, metalness: 0.05, roughness: 0.85,
    transparent: true, opacity: 0.82, side: THREE.DoubleSide,
    polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
  });
  v3dMatPlate = new THREE.MeshStandardMaterial({
    color: 0xc8c0a0, metalness: 0.05, roughness: 0.85,
    transparent: true, opacity: 0.78, side: THREE.DoubleSide,
    polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
  });
  v3dMatBolt = new THREE.MeshStandardMaterial({
    color: 0x606060, metalness: 0.15, roughness: 0.70,
    transparent: true, opacity: 0.65, side: THREE.DoubleSide,
    polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
  });
  v3dMatEdge = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1, transparent: true, opacity: 0.5 });

  v3dDirty = true;
}

// ---- Render the 3D scene to an offscreen image, return it ----
// Called from drawBlockContent when viewKey === 'isometric'
// blk has sheetX, sheetY; we compute the view extents from objects3D bounding box.
function v3dRenderToImage(blk) {
  if (!v3dRenderer || !v3dScene) return null;
  if (v3dDirty) { v3dRebuildScene(); v3dDirty = false; }

  // Compute 3D bounding box of all geometry
  const box = new THREE.Box3();
  if (v3dGroup.children.length > 0) {
    box.setFromObject(v3dGroup);
  } else {
    box.set(new THREE.Vector3(-200, -200, -200), new THREE.Vector3(200, 200, 200));
  }
  const centre = new THREE.Vector3();
  box.getCenter(centre);
  const size = new THREE.Vector3();
  box.getSize(size);

  // The view extent in real-world mm — add padding
  const pad = 40; // mm padding around content
  const extentX = size.x + pad * 2;
  const extentY = size.y + pad * 2;
  const extentZ = size.z + pad * 2;
  const maxExtent = Math.max(extentX, extentY, extentZ);

  // Sheet size of this block: maxExtent / drawingScale (in sheet-mm)
  const sheetSizeMM = maxExtent / drawingScale;
  // Convert to screen pixels
  const sheetSizePx = sheetSizeMM * viewport.zoom;

  // Set offscreen resolution (capped for performance)
  v3dTexW = Math.min(1024, Math.max(128, Math.round(sheetSizePx * DPR)));
  v3dTexH = v3dTexW; // square for isometric
  v3dRenderer.setSize(v3dTexW, v3dTexH);

  // Set orthographic frustum so 1mm real = 1 pixel / (texPx / maxExtent)
  // i.e. the frustum covers maxExtent mm in each direction
  const halfW = maxExtent / 2;
  const halfH = maxExtent / 2;
  v3dCamera.left = -halfW;
  v3dCamera.right = halfW;
  v3dCamera.top = halfH;
  v3dCamera.bottom = -halfH;
  v3dCamera.near = -maxExtent * 2;
  v3dCamera.far = maxExtent * 2;
  v3dCamera.updateProjectionMatrix();

  // Position camera based on orbit angles, looking at centre
  const dist = maxExtent;
  const sp = Math.sin(v3dOrbit.phi), cp = Math.cos(v3dOrbit.phi);
  const st = Math.sin(v3dOrbit.theta), ct = Math.cos(v3dOrbit.theta);
  v3dCamera.position.set(
    centre.x + dist * sp * ct,
    centre.y + dist * cp,
    centre.z + dist * sp * st
  );
  v3dCamera.lookAt(centre);

  // Render
  v3dRenderer.render(v3dScene, v3dCamera);

  // Return the canvas element and the sheet dimensions for blitting
  return {
    canvas: v3dRenderer.domElement,
    sheetW: sheetSizeMM,  // sheet-mm
    sheetH: sheetSizeMM
  };
}

// ---- Build I-section profile shape for extrusion ----
function v3dMakeIShape(d, bf, tf, tw, r1) {
  const shape = new THREE.Shape();
  const hd = d / 2, hbf = bf / 2, htw = tw / 2;
  const r = Math.min(r1 || 0, Math.min((bf - tw) / 4, (d - 2 * tf) / 4));

  // Start at bottom-left of bottom flange, go clockwise
  shape.moveTo(-hbf, -hd);
  shape.lineTo(hbf, -hd);
  shape.lineTo(hbf, -hd + tf);
  // Fillet to web right
  if (r > 0.1) {
    shape.lineTo(htw + r, -hd + tf);
    shape.quadraticCurveTo(htw, -hd + tf, htw, -hd + tf + r);
  } else {
    shape.lineTo(htw, -hd + tf);
  }
  // Web right side up
  if (r > 0.1) {
    shape.lineTo(htw, hd - tf - r);
    shape.quadraticCurveTo(htw, hd - tf, htw + r, hd - tf);
  } else {
    shape.lineTo(htw, hd - tf);
  }
  // Top flange
  shape.lineTo(hbf, hd - tf);
  shape.lineTo(hbf, hd);
  shape.lineTo(-hbf, hd);
  shape.lineTo(-hbf, hd - tf);
  // Fillet to web left
  if (r > 0.1) {
    shape.lineTo(-htw - r, hd - tf);
    shape.quadraticCurveTo(-htw, hd - tf, -htw, hd - tf - r);
  } else {
    shape.lineTo(-htw, hd - tf);
  }
  // Web left side down
  if (r > 0.1) {
    shape.lineTo(-htw, -hd + tf + r);
    shape.quadraticCurveTo(-htw, -hd + tf, -htw - r, -hd + tf);
  } else {
    shape.lineTo(-htw, -hd + tf);
  }
  // Bottom flange left
  shape.lineTo(-hbf, -hd + tf);
  shape.lineTo(-hbf, -hd);

  return shape;
}

// ---- Add mesh + edges helper ----
// Edges are added as CHILDREN of the mesh so they inherit all transforms
// (position, rotation, scale) automatically — no sync needed.
function v3dAddMesh(geom, mat, parent) {
  parent = parent || v3dGroup;
  const mesh = new THREE.Mesh(geom, mat);
  parent.add(mesh);
  if (v3dOpts.edges) {
    const edgeGeom = new THREE.EdgesGeometry(geom, 15);
    const edgeLine = new THREE.LineSegments(edgeGeom, v3dMatEdge);
    // Add as child of mesh — position (0,0,0) relative to mesh = perfect alignment
    mesh.add(edgeLine);
  }
  return mesh;
}

// ---- Rebuild 3D scene from objects3D ----
function v3dDisposeRecursive(obj) {
  while (obj.children.length) {
    const c = obj.children[0];
    v3dDisposeRecursive(c);
    if (c.geometry) c.geometry.dispose();
    obj.remove(c);
  }
}
function v3dRebuildScene() {
  // Clear old geometry (recursively — edges are children of meshes)
  v3dDisposeRecursive(v3dGroup);

  // Update material options
  const opacity = v3dOpts.transparent ? 0.75 : 1.0;
  v3dMatSteel.transparent = v3dOpts.transparent;
  v3dMatSteel.opacity = opacity;
  v3dMatSteel.wireframe = v3dOpts.wireframe;
  v3dMatPlate.transparent = v3dOpts.transparent;
  v3dMatPlate.opacity = v3dOpts.transparent ? 0.70 : 1.0;
  v3dMatPlate.wireframe = v3dOpts.wireframe;
  v3dMatBolt.transparent = v3dOpts.transparent;
  v3dMatBolt.opacity = v3dOpts.transparent ? 0.55 : 1.0;
  v3dMatBolt.wireframe = v3dOpts.wireframe;
  v3dMatEdge.visible = v3dOpts.edges;

  objects3D.forEach(obj => {
    if (obj.type === 'ub') v3dBuildUB(obj);
    else if (obj.type === 'shs') v3dBuildSHS(obj);
    else if (obj.type === 'plate') v3dBuildPlate(obj);
    else if (obj.type === 'bolt') v3dBuildBolt(obj);
  });
}

// ---- Build UB in 3D ----
// UB beams span along X-axis (horizontal). I-section profile sits in Y-Z plane
// (depth d along Y, flange width bf along Z). Extrude direction (local +Z) must
// map to world +X.  Rotation about Y by -90° achieves: localZ→X, localX→-Z, localY→Y.
function v3dBuildUB(obj) {
  const s = UB_DB[obj.section]; if (!s) return;
  const shape = v3dMakeIShape(s.d, s.bf, s.tf, s.tw, s.r1);
  const hl = obj.length / 2;

  const extrudeSettings = { depth: obj.length, bevelEnabled: false };
  const geom = new THREE.ExtrudeGeometry(shape, extrudeSettings);

  // Use a pivot group for the UB — keeps transforms clean
  // Extrude goes along local +Z. Rotate -90° about Y so it maps to world +X.
  // Profile: shape X (bf) → world -Z, shape Y (d) → world Y
  const pivot = new THREE.Group();
  pivot.position.set(obj.x || 0, obj.y || 0, obj.z || 0);
  if (obj.rot) pivot.rotation.z = (obj.rot || 0) * Math.PI / 180;
  v3dGroup.add(pivot);

  const mesh = v3dAddMesh(geom, v3dMatSteel, pivot);
  mesh.rotation.set(0, Math.PI / 2, 0);   // localZ → world +X (extrusion along beam span)
  mesh.position.set(-hl, 0, 0);            // centre beam span at pivot
}

// ---- Build SHS in 3D (hollow square tube) ----
function v3dBuildSHS(obj) {
  const s = SHS_DB[obj.section]; if (!s) return;
  const B = s.B, t = s.t;
  const hB = B / 2;

  const pivot = new THREE.Group();
  pivot.position.set(obj.x || 0, obj.y || 0, obj.z || 0);
  if (obj.rot) pivot.rotation.z = (obj.rot || 0) * Math.PI / 180;
  v3dGroup.add(pivot);

  // Four walls as thin boxes — length along X (matching UB convention & 2D views)
  // BoxGeometry(w=X, h=Y, d=Z), cross-section B×B in Y-Z plane
  const walls = [
    { w: obj.length, h: t, d: B, px: 0, py: hB - t / 2, pz: 0 },          // top (Y+)
    { w: obj.length, h: t, d: B, px: 0, py: -hB + t / 2, pz: 0 },         // bottom (Y-)
    { w: obj.length, h: B - 2 * t, d: t, px: 0, py: 0, pz: hB - t / 2 },  // front (Z+)
    { w: obj.length, h: B - 2 * t, d: t, px: 0, py: 0, pz: -hB + t / 2 }, // back (Z-)
  ];

  walls.forEach(w => {
    const geom = new THREE.BoxGeometry(w.w, w.h, w.d);
    const mesh = v3dAddMesh(geom, v3dMatSteel, pivot);
    mesh.position.set(w.px, w.py, w.pz);
  });
}

// ---- Build Plate in 3D ----
function v3dBuildPlate(obj) {
  if (obj.polyPts) {
    // Polygon plate: extrude a THREE.Shape along the normal axis
    const normal = obj.normal || 'z';
    const pt = obj.pt || 10;

    // Build the 2D shape from polyPts offsets
    const shape = new THREE.Shape();
    // Map polyPts to the 2D plane of the face
    const pts2d = obj.polyPts.map(p => {
      if (normal === 'z') return [p.dx, p.dy];       // face is X,Y
      if (normal === 'x') return [p.dz, p.dy];       // face is Z,Y
      return [p.dx, p.dz];                            // face is X,Z (normal=y)
    });

    shape.moveTo(pts2d[0][0], pts2d[0][1]);
    for (let i = 1; i < pts2d.length; i++) {
      shape.lineTo(pts2d[i][0], pts2d[i][1]);
    }
    shape.closePath();

    const geom = new THREE.ExtrudeGeometry(shape, { depth: pt, bevelEnabled: false });

    // Position and rotate to align extrusion direction with normal axis
    const mesh = v3dAddMesh(geom, v3dMatPlate);
    if (normal === 'z') {
      mesh.position.set(obj.x || 0, obj.y || 0, (obj.z || 0) - pt/2);
    } else if (normal === 'x') {
      mesh.rotation.set(0, Math.PI / 2, 0);
      mesh.position.set((obj.x || 0) - pt/2, obj.y || 0, obj.z || 0);
    } else { // y
      mesh.rotation.set(-Math.PI / 2, 0, 0);
      mesh.position.set(obj.x || 0, (obj.y || 0) - pt/2, obj.z || 0);
    }
    return;
  }

  // Legacy rectangular plate
  const pw = obj.pw || 200, ph = obj.ph || 200, pt = obj.pt || 10;
  const geom = new THREE.BoxGeometry(pw, ph, pt);
  const mesh = v3dAddMesh(geom, v3dMatPlate);
  mesh.position.set(obj.x || 0, obj.y || 0, obj.z || 0);
  if (obj.rot) mesh.rotation.z = (obj.rot || 0) * Math.PI / 180;
}

// ---- Build Bolt in 3D ----
function v3dBuildBolt(obj) {
  const b = BOLT_DB[obj.boltSize || 'M20']; if (!b) return;
  const grip = obj.grip || computeBoltGrip(obj);
  const bLen = obj.boltLength || computeBoltLength(grip, obj.boltSize || 'M20');
  const r = b.d / 2;
  const ox = obj.x || 0, oy = obj.y || 0, oz = obj.z || 0;
  const halfShank = bLen / 2;
  const threadProt = 2 * b.p;

  // All geometry built along Y axis (Three.js cylinder default), then
  // the bolt assembly is oriented along Z axis via a parent group.
  // But simpler: just position along Z directly.

  // Shank — cylinder along Z (use Y-oriented cylinder, rotate π/2 about X)
  const shaftGeom = new THREE.CylinderGeometry(r, r, bLen, 12);
  const shaft = v3dAddMesh(shaftGeom, v3dMatBolt);
  shaft.rotation.set(Math.PI / 2, 0, 0); // align along Z
  shaft.position.set(ox, oy, oz);

  // Head — hex prism (6 sides), positioned at head end of bolt
  const headR = b.headAF / 2 / Math.cos(Math.PI / 6); // AF → circumradius
  const headGeom = new THREE.CylinderGeometry(headR, headR, b.headH, 6);
  const head = v3dAddMesh(headGeom, v3dMatBolt);
  head.rotation.set(Math.PI / 2, 0, 0);
  head.position.set(ox, oy, oz - halfShank - b.washT - b.headH / 2);

  // Head-side washer — thin disc
  const washGeom = new THREE.CylinderGeometry(b.washOD / 2, b.washOD / 2, b.washT, 16);
  const washH = v3dAddMesh(washGeom, v3dMatBolt);
  washH.rotation.set(Math.PI / 2, 0, 0);
  washH.position.set(ox, oy, oz - halfShank - b.washT / 2);

  // Nut-side washer
  const washN = v3dAddMesh(washGeom.clone(), v3dMatBolt);
  washN.rotation.set(Math.PI / 2, 0, 0);
  washN.position.set(ox, oy, oz + halfShank + b.washT / 2);

  // Nut — hex prism
  const nutR = b.nutAF / 2 / Math.cos(Math.PI / 6);
  const nutGeom = new THREE.CylinderGeometry(nutR, nutR, b.nutH, 6);
  const nut = v3dAddMesh(nutGeom, v3dMatBolt);
  nut.rotation.set(Math.PI / 2, 0, 0);
  nut.position.set(ox, oy, oz + halfShank + b.washT + b.nutH / 2);

  // Thread protrusion — thin cylinder beyond nut
  if (threadProt > 0) {
    const thGeom = new THREE.CylinderGeometry(r * 0.9, r * 0.9, threadProt, 8);
    const th = v3dAddMesh(thGeom, v3dMatBolt);
    th.rotation.set(Math.PI / 2, 0, 0);
    th.position.set(ox, oy, oz + halfShank + b.washT + b.nutH + threadProt / 2);
  }
}

// ---- Mark scene dirty (call from addObj, delObj, render, etc.) ----
function v3dMarkDirty() { v3dDirty = true; }

// ---- Orbit interaction ----
// Activated by double-clicking the ISOMETRIC label. Locked by Enter/Escape/click elsewhere.
function v3dStartOrbit(px, py) {
  v3dOrbiting = true;
  v3dOrbitDrag = { x: px, y: py, theta: v3dOrbit.theta, phi: v3dOrbit.phi };
}
function v3dStopOrbit() {
  v3dOrbiting = false;
  v3dOrbitDrag = null;
  requestRender();
}
function v3dHandleOrbitMove(px, py) {
  if (!v3dOrbiting || !v3dOrbitDrag) return;
  const dx = px - v3dOrbitDrag.x, dy = py - v3dOrbitDrag.y;
  v3dOrbit.theta = v3dOrbitDrag.theta + dx * 0.007;
  v3dOrbit.phi = Math.max(0.05, Math.min(Math.PI - 0.05, v3dOrbitDrag.phi - dy * 0.007));
  requestRender();
}
function v3dHandleOrbitDown(px, py) {
  // Start a new drag reference
  v3dOrbitDrag = { x: px, y: py, theta: v3dOrbit.theta, phi: v3dOrbit.phi };
}
function v3dHandleOrbitUp() {
  v3dOrbitDrag = null;
}

// ============================================================
// INIT
// ============================================================

window.addEventListener('DOMContentLoaded', () => {
  container = document.getElementById('canvas-container');
  canvas = document.getElementById('mainCanvas');
  ctx = canvas.getContext('2d');

  // Create detail blocks (4 views) — positions/sizes set by layoutBlocks()
  const elevBlock = new DetailBlock('elevation', projElev, 0, 0);
  const secABlock = new DetailBlock('sectionA', projSecA, 0, 0);
  const planBBlock = new DetailBlock('planB', projPlanB, 0, 0);
  const isoBlock = new DetailBlock('isometric', null, 0, 0);
  blocks = [elevBlock, secABlock, planBBlock, isoBlock];
  activeBlock = elevBlock;

  // Set default positions and generous box sizes
  layoutBlocks();

  resize();
  initEvents();
  initKeyboard();
  populateLibrary();
  initToolbar();
  setTool('select');

  // Demo objects
  addObj(mkObj('ub', { section: '360UB 50.7', x: 0, y: 0, z: 0, length: 600 }));
  addObj(mkObj('shs', { section: '150x6', x: -350, y: 0, z: 0, length: 500 }));
  undoStack = []; redoStack = [];

  fitToView();

  // Init 3D isometric viewer (offscreen renderer)
  v3dInit();
  v3dDirty = true;

  // 3D toolbar toggle button
  const toggleBtn3D = document.getElementById('btn3DView');
  if (toggleBtn3D) {
    toggleBtn3D.classList.add('active');
    toggleBtn3D.addEventListener('click', () => {
      const isoBlk = blocks.find(b => b.viewKey === 'isometric');
      if (isoBlk) {
        isoBlk.hidden = !isoBlk.hidden;
        toggleBtn3D.classList.toggle('active', !isoBlk.hidden);
        requestRender();
      }
    });
  }

  // Enter/Escape to stop orbiting
  document.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === 'Escape') && v3dOrbiting) {
      v3dStopOrbit();
      e.preventDefault();
    }
  });
});

window.addEventListener('resize', () => { resize(); fitToView(); });

</script>
